oved limit. The draft is safe now.","slices":[{"t":"Send a normal single payment with the checks in place, end to end.","bad":false},{"t":"Add the name-and-account check that pauses odd payments.","bad":false},{"t":"Require a second person to approve payments over the limit.","bad":false},{"t":"Build the payment form first, the sending engine next week, the checks the week after.","bad":true,"why":"Cut by technical layer — no piece lets a company safely send a payment on its own."},{"t":"Ship sending now; add the name check and the approval step later.","bad":true,"why":"Leaving out the parts that stop typos and lone big payments — exactly what goes wrong with money."},{"t":"Split it into a separate piece for each box on the form.","bad":true,"why":"So small that wiring the boxes together costs more than any one box is worth."}],"slicesSuccess":"Three pieces, each something a company could actually use, each small enough to check on its own.","premortem":[{"t":"A typo in the account number sends the money to the wrong person and it can’t be pulled back.","bad":false},{"t":"A slipped zero sends ten times the intended amount past the limit.","bad":false},{"t":"A big payment goes out with only one person’s say-so.","bad":false},{"t":"There’s no way to stop a payment sent by mistake in the first minute.","bad":false},{"t":"The send button label reads „Send“ instead of „Pay“.","bad":true,"why":"A wording nit, not a reason the change fails."},{"t":"The bank’s network is briefly slow at month-end.","bad":true,"why":"Outside this change’s control — noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the wrong account number, the slipped zero, the lone big payment, the payment that can’t be stopped. Each becomes a safeguard before a thing is built."},{"id":"decline-request","title":"Decline a payment request","short":"letting a customer turn down a payment request they’ve received","ticket":"„Let a customer decline a payment request they received.“","hookBuild":["A „decline“ button on the payment request.","Tapping it declines but tells the company nothing, so they keep waiting for money that’s never coming.","It quietly deletes the request, so there’s no record it ever existed.","It lets the customer decline part of the amount but sends the rest anyway without asking.","Bonus: a decline instantly opens a formal dispute against the company. You’re welcome."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide whether a „no“ is heard and recorded.","map":[{"t":"As a customer I want to turn down a payment request so I’m not pushed to pay something I don’t owe.","c":"goal"},{"t":"When a customer declines, the company that sent it is told, with any reason given.","c":"rule"},{"t":"A declined request can’t quietly take the money anyway.","c":"rule"},{"t":"The company can send a fresh request, but can’t force a declined one through.","c":"rule"},{"t":"A customer declines a £600 request with the note „already paid“ → the company is told and no money moves.","c":"ex"},{"t":"A request left untouched past its date → it expires on its own, and both sides see that.","c":"ex"},{"t":"Can a customer decline part of the amount, or only the whole request?","c":"q"},{"t":"If a customer declines because they think it’s wrong, does that turn into a dispute or stay a plain decline?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a £600 request the customer doesn’t owe","a request they don’t like"]},{"kw":"When","segs":["the customer declines it with a short reason","the customer says no somehow"]},{"kw":"Then","segs":["the company is told, with the reason, and no money moves","the company hears about it"]},{"kw":"And","segs":["the request is left on record, not deleted","the request is dealt with"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a request that has already expired","an old request"]},{"kw":"When","segs":["the customer tries to decline it now","they act late"]},{"kw":"Then","segs":["there’s nothing to decline and they see it already expired","it does nothing"]}]},"edge":{"label":"An edge case — declining the same request twice","lines":[{"kw":"Given","segs":["a request the customer has already declined","a request already turned down"]},{"kw":"When","segs":["the customer taps decline on it a second time","the customer pokes at it again"]},{"kw":"Then","segs":["nothing changes and the company isn’t told twice","the app sorts it out"]},{"kw":"And","segs":["the request stays declined, not reopened","everything is fine"]}]},"fail":"The clean decline is clear — but an expired request, and a second tap on one already declined, you’ve left vague. The agent might tell the company twice, or reopen a settled no. Spell the expired case and the duplicate out as clearly as the happy path.","success":"All three are spelled out — a decline that tells the company with a reason, an expired request shown plainly, and a second tap that changes nothing. Nobody left guessing or told twice."},"noguess":[{"t":"Does declining tell the company that sent it? — Confirmed: yes, with any reason given.","c":"done"},{"t":"Can a declined request still take the money? — Confirmed: no, never.","c":"done"},{"t":"Do we let customers add a written reason at launch? — Kept to a short pick-list for now; free text later.","c":"limit"},{"t":"How many times can a company re-send after a decline? — Capped for launch; revisit later.","c":"limit"},{"t":"Does a decline ever turn into a formal dispute? — Not decided; blocked until the disputes team rules on it.","c":"block"}],"overreach":[{"t":"A decline that tells the company, with any reason the customer gives.","bad":false},{"t":"Declines but tells the company nothing.","bad":true,"why":"The company waits for money that’s never coming — telling them was the point of the decline."},{"t":"Keeps a record of the request and its decline.","bad":false},{"t":"Deletes the request so there’s no record it existed.","bad":true,"why":"With no record, neither side can show what was asked or refused — a clear audit gap nobody approved."},{"t":"Sends the rest of the amount anyway when a customer declines part of it.","bad":true,"why":"Taking money the customer just declined is the opposite of a decline — never ship this."},{"t":"Lets the company send a fresh request but not force the declined one.","bad":false},{"t":"Turns every decline into a formal dispute against the company.","bad":true,"why":"Invented escalation nobody asked for — it drags companies into disputes over an ordinary no."}],"overreachSuccess":"Four traps caught: telling the company nothing, deleting the record, taking the rest after a part-decline, and auto-opening a dispute. The draft is safe now.","slices":[{"t":"Let a customer decline a request and tell the company, end to end.","bad":false},{"t":"Handle a request expiring on its own, shown to both sides.","bad":false},{"t":"Let the company send a fresh request after a decline.","bad":false},{"t":"Build the decline button first, the notify-the-company part next week, the record-keeping the week after.","bad":true,"why":"Cut by technical layer — no piece gives either side a working decline on its own."},{"t":"Ship the decline now; add telling the company and keeping the record later.","bad":true,"why":"Leaving out the parts that keep both sides informed and accountable — the bits that cause disputes."},{"t":"Split it into a separate piece for the button, the reason, the icon and the confirmation.","bad":true,"why":"So finely cut that joining the pieces costs more than they add."}],"slicesSuccess":"Three pieces, each something the customer or company could actually use, each small enough to check on its own.","premortem":[{"t":"A customer declines but the company is never told and keeps chasing.","bad":false},{"t":"A part-decline still lets the rest of the money be taken.","bad":false},{"t":"A declined request is re-sent again and again, hounding the customer.","bad":false},{"t":"There’s no record of the decline, so nobody can prove what happened.","bad":false},{"t":"The decline button’s text is a slightly heavier font than the rest.","bad":true,"why":"A cosmetic nit, not a reason the change fails."},{"t":"The customer’s phone battery dies while reading the request.","bad":true,"why":"Outside this change’s control — noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the company never told, the part-decline that still charges, the endless re-sends, the missing record. Each becomes a safeguard before a thing is built."}];

var NG_BUCKETS=[{id:"done",label:"Answered",hint:"Clearly decided"},{id:"limit",label:"Deliberately limited",hint:"We set it / leave it out on purpose"},{id:"block",label:"Blocked",hint:"Settle it before going on"}];

var FORK_SLICE={situation:"It’s a big change. It’s tempting to hand the whole thing over in one go and be done with it. Your call:",tempt:{e:"🚀",h:"Hand over the whole thing at once",p:"One big handover, one and done. Why slow down to slice it?",feel:"Feels fast"},solid:{e:"🥔",h:"Cut it into smaller pieces first",p:"Slice it so each piece can be checked on its own. Free — it’s still analysis.",feel:"Stays free"},penalties:[{item:"The review drowns and a defect slips through, found late",days:3},{item:"Fixing it after it’s already live",days:2}],penaltyPunch:"A big handover hides defects until they’re expensive. Slice it first — for free this time."};
var BOSS_OPTIONS=[
  {t:"What we’re really trying to achieve — the goal, not one particular solution.",bad:false},

  {t:"The clear „don’t do this“ rules the agent must never cross.",bad:false},

function mkBehaviour(bh){
  return [bh.happy,bh.negative,bh.edge].map(function(sub,i){
    return { tag:(i===0?"win":i===1?"fail":"edge"), label:sub.label, lines:sub.lines.map(function(l){return {key:l.kw,segs:[{t:l.segs[0],c:true},{t:l.segs[1],c:false}]};}) };
  });
}

var S={i:0,analysis:0,cycle:0,benchmark:0,badges:[],rework:[],forks:{}};
var STAGES=null, SC=null;
var host=document.getElementById("stageHost");
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function setHUD(){
  document.getElementById("anaVal").textContent=S.analysis+"d";
  document.getElementById("cycVal").textContent=S.cycle+"d";
  document.getElementById("rwVal").textContent=S.rework.reduce(function(s,r){return s+r.days;},0)+"d";
  document.getElementById("badgeVal").textContent=S.badges.length;
  var p=document.getElementById("progress");p.innerHTML="";
  if(!STAGES)return;
  for(var k=2;k<=8;k++){var d=document.createElement("div");d.className="dot";if(k<S.i)d.classList.add("done");if(k===S.i)d.classList.add("now");p.appendChild(d);}
}
function bumpCycle(days){S.cycle+=days;var c=document.getElementById("cycleClock");c.classList.remove("hit");void c.offsetWidth;c.classList.add("hit");document.getElementById("cycVal").textContent=S.cycle+"d";}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2400);}
function go(n){S.i=n;render();window.scrollTo({top:0,behavior:"smooth"});}
function next(){go(S.i+1);}

function render(){
  setHUD();var st=STAGES[S.i];
  if(st.type==="rewind")return renderRewind(st);
  if(st.type==="finale")return renderFinale();
  if(st.type==="reveal")return renderReveal(st);
  if(st.fork && !S.forks[S.i])return renderFork(st);
  if(st.type==="categorize")return renderCategorize(st);
  if(st.type==="build")return renderBuild(st);
  if(st.type==="select")return renderSelect(st);
}
function stageHead(st){return '<div class="mcode">'+st.mcode+'</div><div class="kicker">'+st.kicker+'</div><h1 class="title">'+st.title+'</h1><div class="setup">'+st.setup+(st.ticket?'<span class="ticket">'+st.ticket+'</span>':'')+'</div>';}
function debriefHTML(st,extra){
  var b='';if(st.badge){b='<div class="badgewon"><span>'+st.badge.e+'</span> Badge unlocked: '+st.badge.name+'</div>';}
  if(st.analysisDays){b+='<div class="analysiswon">🧭 +'+st.analysisDays+'d analysis — and it’s free</div>';}
  return '<div class="debrief"><div class="lab">Team debrief — pause and talk</div><div class="take">'+st.debrief.take+'</div><div class="q">💬 <b>Talk as a team:</b> '+st.debrief.q+'</div>'+b+(extra||'')+'<div class="row"><button class="btn go" id="nextBtn">'+(st.isBoss?'See the results →':'Next step →')+'</button></div></div>';
}
function wireNext(){var n=document.getElementById("nextBtn");if(n)n.onclick=next;}
function completeStep(st,container,extra){
  if(st.analysisDays){S.analysis+=st.analysisDays;document.getElementById("anaVal").textContent=S.analysis+"d";}
  if(st.badge)S.badges.push(st.badge);
  if(st.isBoss&&st.buildDays){bumpCycle(st.buildDays);}
  setHUD();
  container.insertAdjacentHTML("beforeend",debriefHTML(st,extra));wireNext();
  document.querySelector(".debrief").scrollIntoView({behavior:"smooth",block:"center"});
}

  host.innerHTML='<div class="stage"><div class="hero"><div class="logo">A training game for working with AI agents · corporate banking</div><h1>AGENT&nbsp;CONTRACT</h1><div class="tag">Get one change into users’ hands — with the least avoidable rework.</div></div>'+

/* ---------------- REVEAL (rushed hook) ---------------- */
function renderReveal(st){
  host.innerHTML='<div class="stage">'+stageHead(st)+'<div class="panel"><div class="row" style="margin-top:4px"><button class="btn big" id="handoff">'+st.button+'</button></div><div id="reveal"></div></div></div>';
  document.getElementById("handoff").onclick=function(){this.disabled=true;var r=document.getElementById("reveal");r.innerHTML='<div class="agent"><div class="working"><span class="spinner"></span> The agent is building…</div></div>';
    setTimeout(function(){var li=st.agentList.map(function(x){return '<li>'+x+'</li>';}).join("");r.innerHTML='<div class="agent fail"><div class="who"><span class="ava">🤖</span> Agent · build complete</div><div class="body">'+st.agentBody+'<ul>'+li+'</ul></div><div class="punch">'+st.punch+'</div></div>';setTimeout(function(){detonate(r,st);},900);},1500);};
}
function detonate(container,st){
  var wrap=document.createElement("div");wrap.className="rework";wrap.innerHTML='<div class="rh">⏱️ Cycle time starts running — avoidable loops</div>';container.appendChild(wrap);var idx=0;
  (function addOne(){
    if(idx>=st.penalties.length){if(st.isBenchmark)S.benchmark=S.cycle;wrap.insertAdjacentHTML("beforeend",'<div class="sum">'+st.penaltySum+'</div>');
      setTimeout(function(){container.insertAdjacentHTML("beforeend",debriefHTML(st));var n=document.getElementById("nextBtn");if(n){n.textContent=st.cont||"Continue →";n.onclick=next;}document.querySelector(".debrief").scrollIntoView({behavior:"smooth",block:"center"});},500);return;}
    var p=st.penalties[idx++];S.rework.push(p);bumpCycle(p.days);document.getElementById("rwVal").textContent=S.rework.reduce(function(s,r){return s+r.days;},0)+"d";
    wrap.insertAdjacentHTML("beforeend",'<div class="rticket"><span>'+p.item+'</span><span class="d">+'+p.days+'d</span></div>');setTimeout(addOne,650);
  })();
}
/* ---------------- REWIND ---------------- */
function renderRewind(st){
  S.cycle=0;document.getElementById("cycVal").textContent="0d";S.rework=[];document.getElementById("rwVal").textContent="0d";
  host.innerHTML='<div class="stage"><div class="panel"><div class="rewind"><div class="ic">⏪</div><h1>'+st.title+'</h1><p>'+st.body+'</p><div class="row" style="justify-content:center"><button class="btn go" id="rw">'+st.button+'</button></div></div></div></div>';
  document.getElementById("rw").onclick=next;
}
/* ---------------- FORK ---------------- */
function renderFork(st){
  host.innerHTML='<div class="stage">'+stageHead(st)+'<div class="fork"><div class="situation">'+st.fork.situation+'</div><div class="choices"><div class="choice tempt" id="cTempt"><div class="ce">'+st.fork.tempt.e+'</div><h3>'+st.fork.tempt.h+'</h3><p>'+st.fork.tempt.p+'</p><span class="feel">'+st.fork.tempt.feel+'</span></div><div class="choice solid" id="cSolid"><div class="ce">'+st.fork.solid.e+'</div><h3>'+st.fork.solid.h+'</h3><p>'+st.fork.solid.p+'</p><span class="feel">'+st.fork.solid.feel+'</span></div></div><div id="forkOut"></div></div></div>';
  document.getElementById("cSolid").onclick=function(){S.forks[S.i]="solid";render();};
  document.getElementById("cTempt").onclick=function(){
    document.getElementById("cTempt").style.pointerEvents="none";document.getElementById("cSolid").style.pointerEvents="none";
    var out=document.getElementById("forkOut");out.innerHTML='<div class="agent" style="margin-top:18px"><div class="working"><span class="spinner"></span> You start early. The agent runs into the gap…</div></div>';
    setTimeout(function(){out.innerHTML='<div class="rework"><div class="rh">⏱️ You started before you were ready — the meter runs</div></div>';var wrap=out.querySelector(".rework");var idx=0;
      (function addOne(){
        if(idx>=st.fork.penalties.length){wrap.insertAdjacentHTML("beforeend",'<div class="sum">'+st.fork.penaltyPunch+'</div>');
          setTimeout(function(){out.insertAdjacentHTML("beforeend",'<div class="row"><button class="btn go" id="back">Go back and do it properly →</button></div>');document.getElementById("back").onclick=function(){S.forks[S.i]="rushed";render();};document.getElementById("back").scrollIntoView({behavior:"smooth",block:"center"});},500);return;}
        var p=st.fork.penalties[idx++];S.rework.push(p);bumpCycle(p.days);document.getElementById("rwVal").textContent=S.rework.reduce(function(s,r){return s+r.days;},0)+"d";
        wrap.insertAdjacentHTML("beforeend",'<div class="rticket"><span>'+p.item+'</span><span class="d">+'+p.days+'d</span></div>');setTimeout(addOne,650);
      })();
    },1400);
  };
}
/* ---------------- CATEGORIZE ---------------- */
function renderCategorize(st){
  var picked=null,placement={};
  var bucketsHTML=st.buckets.map(function(b){return '<div class="bucket" data-b="'+b.id+'"><h4>'+b.label+'</h4><div class="bh">'+b.hint+'</div><div class="dropwrap" data-slots="'+b.id+'"></div></div>';}).join("");
  host.innerHTML='<div class="stage">'+stageHead(st)+'<div class="panel"><div class="hintline">Tap a card, then tap a kind — or drag it across.</div><div class="bank" id="bank"></div><div class="buckets">'+bucketsHTML+'</div><div class="row"><button class="btn primary" id="check" disabled>Hand it to the agent</button><span style="color:var(--dim);font-size:14px" id="cnt"></span></div><div id="react"></div></div></div>';
  var bank=document.getElementById("bank");
  shuffle(st.items.map(function(_,i){return i;})).forEach(function(idx){var it=st.items[idx];var d=document.createElement("div");d.className="item";d.textContent=it.t;d.setAttribute("draggable","true");d.dataset.idx=idx;
    d.onclick=function(){if(placement[idx]!=null)return;if(picked===idx){picked=null;d.classList.remove("picked");}else{clearPick();picked=idx;d.classList.add("picked");}};
    d.ondragstart=function(e){picked=idx;e.dataTransfer.setData("text",idx);};bank.appendChild(d);});
  function clearPick(){picked=null;document.querySelectorAll(".item.picked").forEach(function(x){x.classList.remove("picked");});}
  document.querySelectorAll(".bucket").forEach(function(bk){bk.ondragover=function(e){e.preventDefault();bk.classList.add("over");};bk.ondragleave=function(){bk.classList.remove("over");};bk.ondrop=function(e){e.preventDefault();bk.classList.remove("over");assign(picked,bk.dataset.b);};bk.onclick=function(){if(picked!=null)assign(picked,bk.dataset.b);};});
  function assign(idx,bid){if(idx==null)return;placement[idx]=bid;var itemEl=bank.querySelector('.item[data-idx="'+idx+'"]');itemEl.classList.add("assigned");itemEl.classList.remove("picked");var slotWrap=document.querySelector('[data-slots="'+bid+'"]');var slot=document.createElement("div");slot.className="slot";slot.innerHTML='<span>'+st.items[idx].t+'</span><span class="x" title="put back">↩</span>';slot.querySelector(".x").onclick=function(ev){ev.stopPropagation();delete placement[idx];itemEl.classList.remove("assigned");slot.remove();refresh();};slotWrap.appendChild(slot);clearPick();refresh();}
  function refresh(){var n=Object.keys(placement).length;document.getElementById("cnt").textContent=n+" / "+st.items.length+" sorted";document.getElementById("check").disabled=n<st.items.length;}
  refresh();
  document.getElementById("check").onclick=function(){var wrong=0;st.items.forEach(function(it,idx){if(placement[idx]!==it.c)wrong++;});var react=document.getElementById("react");
    if(wrong===0){this.disabled=true;react.innerHTML='<div class="agent win"><div class="who"><span class="ava">🤖</span> Agent · understood</div><div class="body">'+st.successReaction+'</div></div>';completeStep(st,react);}
    else{react.innerHTML='<div class="agent fail"><div class="who"><span class="ava">🤖</span> Agent · this picture doesn’t add up</div><div class="body">'+wrong+' card(s) are still in the wrong kind. That would give the agent a crooked picture of the change. Look again — what’s a rule, what’s just an example, what’s still an open question? — and re-sort.</div></div>';react.scrollIntoView({behavior:"smooth",block:"center"});toast("Not quite — try again.");}};
}
/* ---------------- BUILD ---------------- */
function renderBuild(st){
  var sel={},total=0;st.scenarios.forEach(function(sc){total+=sc.lines.length;});
  var scHTML=st.scenarios.map(function(sc,si){var lines=sc.lines.map(function(ln,li){var order=shuffle(ln.segs.map(function(_,i){return i;}));var segs=order.map(function(gi){return '<div class="seg" data-k="'+si+'.'+li+'" data-g="'+gi+'">'+ln.segs[gi].t+'</div>';}).join("");return '<div class="slot-line"><div class="slot-key">'+ln.key+'</div><div class="segs">'+segs+'</div></div>';}).join("");return '<div class="scenario"><h4><span class="tag '+sc.tag+'">'+(sc.tag==="win"?"Happy path":sc.tag==="fail"?"Negative":"Edge case")+'</span>'+sc.label+'</h4>'+lines+'</div>';}).join("");
  host.innerHTML='<div class="stage">'+stageHead(st)+'<div class="panel">'+scHTML+'<div class="row"><button class="btn primary" id="check" disabled>Hand it to the agent</button></div><div id="react"></div></div></div>';
  document.querySelectorAll(".seg").forEach(function(sg){sg.onclick=function(){var k=sg.dataset.k;document.querySelectorAll('.seg[data-k="'+k+'"]').forEach(function(o){o.classList.remove("sel");});sg.classList.add("sel");sel[k]=parseInt(sg.dataset.g,10);document.getElementById("check").disabled=Object.keys(sel).length<total;};});
  document.getElementById("check").onclick=function(){var ok=true;st.scenarios.forEach(function(sc,si){sc.lines.forEach(function(ln,li){var g=sel[si+"."+li];if(g==null||!ln.segs[g].c)ok=false;});});var react=document.getElementById("react");
    if(ok){this.disabled=true;react.innerHTML='<div class="agent win"><div class="who"><span class="ava">🤖</span> Agent · the behaviour is clear</div><div class="body">'+st.successReaction+'</div></div>';completeStep(st,react);}
    else{react.innerHTML='<div class="agent fail"><div class="who"><span class="ava">🤖</span> Agent · this isn’t concrete enough</div><div class="body">'+st.failReaction+'</div></div>';react.scrollIntoView({behavior:"smooth",block:"center"});toast("Vague blocks — pick the concrete ones.");}};
}
/* ---------------- SELECT ---------------- */
function renderSelect(st){
  var chosen={};var order=shuffle(st.options.map(function(_,i){return i;}));
  var optsHTML=order.map(function(idx){return '<div class="opt" data-idx="'+idx+'"><div class="box"></div><div><span class="txt">'+st.options[idx].t+'</span></div></div>';}).join("");
  host.innerHTML='<div class="stage">'+stageHead(st)+'<div class="panel"><div class="hintline">'+st.listLabel+'</div><div class="opts">'+optsHTML+'</div><div class="row"><button class="btn primary" id="check">Hand it to the agent</button></div><div id="react"></div></div></div>';
  document.querySelectorAll(".opt").forEach(function(op){op.onclick=function(){var i=op.dataset.idx;if(chosen[i]){delete chosen[i];op.classList.remove("sel");op.querySelector(".box").textContent="";}else{chosen[i]=true;op.classList.add("sel");op.querySelector(".box").textContent="✓";}};});
  document.getElementById("check").onclick=function(){var missed=[],extra=[];st.options.forEach(function(o,idx){var target=(st.mode==="catch")?o.bad:!o.bad;var picked=!!chosen[idx];if(target&&!picked)missed.push(o);if(!target&&picked)extra.push(o);});var react=document.getElementById("react");
    if(missed.length===0&&extra.length===0){this.disabled=true;react.innerHTML='<div class="agent win"><div class="who"><span class="ava">'+(st.isBoss?"🏆":"🤖")+'</span> Agent · '+(st.isBoss?"ready — executing cleanly":"understood")+'</div><div class="body">'+st.successReaction+'</div>'+(st.isBoss?'<div class="punch">'+st.bossPunch+'</div>':'')+'</div>';if(st.isBoss){burst();}completeStep(st,react);}
    else{var msgs=[];if(st.mode==="catch"){missed.forEach(function(o){msgs.push('<li><b>Slipped through:</b> „'+o.t+'“ — '+(o.why||'this should have been stopped.')+' The agent shipped it.</li>');});extra.forEach(function(o){msgs.push('<li><b>Flagged too much:</b> „'+o.t+'“ was fine — the agent needed that.</li>');});}else{extra.forEach(function(o){msgs.push('<li><b>Bad choice:</b> „'+o.t+'“ — '+(o.why||'doesn’t belong.')+'</li>');});missed.forEach(function(o){msgs.push('<li><b>Missed a good one:</b> „'+o.t+'“ is still needed.</li>');});}
      react.innerHTML='<div class="agent fail"><div class="who"><span class="ava">🤖</span> Agent · not yet</div><div class="body">Close — but:<ul>'+msgs.join("")+'</ul></div></div>';react.scrollIntoView({behavior:"smooth",block:"center"});toast("Close — look again.");}};
}
/* ---------------- FINALE ---------------- */
function lbar(cls,title,a,c,total,note){
  var w=total/Lmax*100, aw=total>0?a/total*100:0, cw=100-aw;
  return '<div class="lbar '+cls+'"><div class="ll"><span>'+title+'</span><b>'+total+'d lead time</b></div>'+
    '<div class="track2"><div class="fillL" data-w="'+w+'">'+
    (a>0?'<div class="seg-a" style="width:'+aw+'%">'+a+'d</div>':'')+
    '<div class="seg-c" style="width:'+cw+'%">'+(c>0?c+'d':'')+'</div></div></div>'+
    '<div class="note">'+note+'</div></div>';
}
var Lmax=1;
function renderFinale(){
  var analysis=S.analysis, actualCycle=S.cycle, rushed=S.benchmark||15;
  var reworkTotal=S.rework.reduce(function(s,r){return s+r.days;},0);
  var idealCycle=Math.max(0,actualCycle-reworkTotal);
  var leadActual=analysis+actualCycle, leadIdeal=analysis+idealCycle, leadFast=rushed;
  Lmax=Math.max(leadFast,leadActual,leadIdeal,1);
  var tookShortcut=reworkTotal>0;
  var badges=S.badges.map(function(b){return '<div class="fbadge"><div class="e">'+b.e+'</div><div class="nm">'+b.name+'</div></div>';}).join("");
  var yourNote=tookShortcut?(analysis+'d analysis + '+actualCycle+'d cycle — incl. '+reworkTotal+'d avoidable rework from a shortcut you took'):(analysis+'d analysis + '+actualCycle+'d cycle');
  var idealNote=tookShortcut?(analysis+'d analysis + '+idealCycle+'d cycle — resist every shortcut and this is yours'):('You took it — your run WAS the best case: '+analysis+'d analysis + '+idealCycle+'d cycle');
  var reworkTile=tookShortcut
    ? '<div class="t"><span class="e">🧾</span><span><b>A shortcut mid-game cost you '+reworkTotal+' days.</b><span>Your run landed at '+leadActual+' days instead of the '+leadIdeal+' it could have been — because starting before you were ready turned into rework. That whole gap was avoidable.</span></span></div>'
    : '<div class="t"><span class="e">🏆</span><span><b>No avoidable rework.</b><span>You resisted every shortcut, so your run IS the '+leadIdeal+'-day best case — '+analysis+' days of analysis and only the '+idealCycle+' days of building.</span></span></div>';
  host.innerHTML='<div class="stage"><div class="final"><div class="stamp">In users’ hands</div><h1>Same change. A very different bill.</h1>'+
    '<div class="lead">You shipped the change — '+SC.short+'. Lead time is the whole journey: from the need on the board to users’ hands — your analysis time plus your cycle time.</div>'+
    '<div class="score">'+
      lbar('rushed','The fast start — one line straight to code',0,rushed,leadFast,'0 analysis + '+rushed+'d cycle · and it still wasn’t right')+
      lbar('','Your run — get ready, then hand over',analysis,actualCycle,leadActual,yourNote)+
      lbar('best','What it could have been — ready, no shortcuts',analysis,idealCycle,leadIdeal,idealNote)+
      '<div class="lblegend"><span><i style="background:#3fb950"></i> Analysis time — free of cycle time, part of lead time</span><span><i style="background:#f0a531"></i> Cycle time — the clock once you start building</span></div>'+
      '<div class="cyline">Cycle time alone, the days the clock counts once you start building: <b>'+rushed+'d</b> rushed → <b>'+actualCycle+'d</b> your run → <b>'+idealCycle+'d</b> if you’d resisted every shortcut.</div>'+
    '</div>'+
    '<div class="msg">'+
      '<div class="t"><span class="e">⚡</span><span><b>The headline.</b><span>Even counting every day of analysis, being ready reaches users in <b>'+leadIdeal+' days</b> — faster than the '+leadFast+'-day rush, and unlike the rush, it actually works.</span></span></div>'+
      reworkTile+
      '<div class="t"><span class="e">🧭</span><span><b>Analysis isn’t waste — it’s the investment.</b><span>Those '+analysis+' analysis days never cost you cycle time. They’re what kept the build down to '+idealCycle+' days instead of the rush’s '+rushed+'. This was never about analysing forever — just being ready.</span></span></div>'+
      '<div class="t"><span class="e">🤝</span><span><b>Ready = no one has to guess.</b><span>Not more meetings, not a thicker document. Just: every open question answered, limited, or blocked — for people and for the agent — before anyone starts.</span></span></div>'+
    '</div>'+
    '<div class="badgegrid">'+badges+'</div>'+
    '<div class="panel" style="text-align:left;max-width:720px;margin:10px auto 0"><div class="kicker">Take it to your work</div><p style="font-size:16px;margin:8px 0 0">Next real ticket, before anyone starts: run it through the six-part contract, and give every open question a state — answered, limited, or blocked. Then watch your lead time.</p><p style="font-size:15px;color:var(--muted);margin:12px 0 0">💬 <b>Last team question:</b> Where does your team most often start before it’s ready — and what would holding the line there do to your lead time?</p></div>'+
    '<div class="row" style="justify-content:center"><button class="btn go" id="againSame">Play this scenario again</button><button class="btn ghost" id="againNew">Pick another scenario</button></div></div></div>';
  setTimeout(function(){document.querySelectorAll(".fillL").forEach(function(f){f.style.width=f.dataset.w+"%";});},200);
  document.getElementById("againSame").onclick=function(){S={i:0,analysis:0,cycle:0,benchmark:0,badges:[],rework:[],forks:{}};go(0);};
  document.getElementById("againNew").onclick=function(){STAGES=null;SC=null;S={i:0,analysis:0,cycle:0,benchmark:0,badges:[],rework:[],forks:{}};setHUD();renderPicker();window.scrollTo({top:0,behavior:"smooth"});};
  burst();setTimeout(burst,500);setTimeout(burst,1000);
}
/* ---------------- modals ---------------- */
document.getElementById("badgeChip").onclick=function(){var list=document.getElementById("badgeList");list.innerHTML=S.badges.length?S.badges.map(function(b){return '<div class="spec"><span class="e">'+b.e+'</span><div><h4>'+b.name+'</h4></div></div>';}).join(""):'<p style="color:var(--muted)">No badges yet — pick a scenario to begin.</p>';document.getElementById("ovBadges").classList.add("show");};
document.getElementById("reworkChip").onclick=function(){var list=document.getElementById("rwList");if(S.rework.length===0){list.innerHTML='<div class="spec"><span class="e">✅</span><div><h4>Clean so far</h4><p>No avoidable rework yet. Keep getting ready before you start.</p></div></div>';}else{list.innerHTML=S.rework.map(function(r){return '<div class="spec"><span class="e">⏱️</span><div><h4>+'+r.days+' days</h4><p>'+r.item+'</p></div></div>';}).join("");}document.getElementById("ovRework").classList.add("show");};
document.querySelectorAll("[data-close]").forEach(function(c){c.onclick=function(){c.closest(".overlay").classList.remove("show");};});
document.querySelectorAll(".overlay").forEach(function(o){o.onclick=function(e){if(e.target===o)o.classList.remove("show");};});
/* ---------------- confetti ---------------- */
var cv=document.getElementById("confetti"),cx=cv.getContext("2d"),parts=[];
function sz(){cv.width=innerWidth;cv.height=innerHeight;}sz();addEventListener("resize",sz);
function burst(){var cols=["#4c8dff","#3fb950","#f0a531","#b98bff","#ff6b6b","#4dd0e1"];for(var k=0;k<120;k++){parts.push({x:innerWidth/2+(Math.random()-.5)*260,y:innerHeight*0.3,vx:(Math.random()-.5)*9,vy:Math.random()*-11-3,g:.28+Math.random()*.15,s:5+Math.random()*7,c:cols[k%cols.length],r:Math.random()*6,vr:(Math.random()-.5)*.4,life:0});}}
function loop(){cx.clearRect(0,0,cv.width,cv.height);for(var k=parts.length-1;k>=0;k--){var p=parts[k];p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.life++;cx.save();cx.translate(p.x,p.y);cx.rotate(p.r);cx.fillStyle=p.c;cx.globalAlpha=Math.max(0,1-p.life/150);cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);cx.restore();if(p.y>cv.height+40||p.life>160)parts.splice(k,1);}requestAnimationFrame(loop);}
loop();
renderPicker();
</script>
</body>
</html>

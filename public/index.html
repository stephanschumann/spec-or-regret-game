label":"An edge case — a close match, right on the line","lines":[{"kw":"Given","segs":["a payment where the name is a close match, just a small spelling difference","a payment where the name is roughly right"]},{"kw":"When","segs":["the check runs before the money leaves","the system looks at it"]},{"kw":"Then","segs":["a gentle nudge is shown, clearly milder than a serious no-match","a message pops up"]},{"kw":"And","segs":["it isn’t treated the same as a total mismatch","the app sorts it out"]}]},"fail":"The clean match is clear. But the refusal and the close-match-on-the-line cases are left vague — so no one knows what’s recorded, or whether a tiny spelling difference screams the same as a total mismatch. Spell those two out as plainly as the clean match.","success":"All three are spelled out — a clean match, a clear no-match that’s allowed but logged, and a close match nudged gently rather than sounding the full alarm. If money’s lost, there’s a record of the choice."},"noguess":[{"t":"Can the company proceed after a warning? — Confirmed: yes, it warns, it never hard-blocks.","c":"done"},{"t":"Does the check re-run when a supplier’s account changes? — Confirmed by risk: yes, every time the details change.","c":"done"},{"t":"Do we check suppliers with accounts abroad at launch? — Deliberately UK accounts only for now, others later.","c":"limit"},{"t":"How close counts as a „close match“? — Set to a simple rule for now; finer tuning later.","c":"limit"},{"t":"Who is liable if they ignore the warning and lose the money? — Not settled; blocked until legal confirms the wording.","c":"block"}],"overreach":[{"t":"Shows a clear, serious warning on a no-match and lets the company decide.","bad":false},{"t":"Records who saw the warning and chose to proceed.","bad":false},{"t":"Runs the check again whenever a supplier’s account details change.","bad":false},{"t":"Hard-blocks every no-match with no way to continue, even for a genuine spelling difference.","bad":true,"why":"The ticket said warn, not block — blocking legitimate payments outright oversteps and strands real suppliers."},{"t":"Shows the same vague message for a tiny spelling difference and a total mismatch.","bad":true,"why":"If a serious mismatch looks the same as a harmless one, people learn to click past the real danger."},{"t":"Only checks the very first payment to a supplier, never again.","bad":true,"why":"Invoice fraud works by changing a trusted supplier’s details later — skipping re-checks misses the main attack."},{"t":"Silently swaps in the account’s real name and pays that instead.","bad":true,"why":"Invented behaviour nobody asked for — it could send money to the wrong party while looking correct."}],"overreachSuccess":"Four traps caught: the blanket hard-block, the same message for every mismatch, checking only the first payment, and silently swapping the name. The draft is safe now.","slices":[{"t":"Get the match check running and showing a warning on a normal payment, end to end.","bad":false},{"t":"Handle the clear no-match: a serious warning and a recorded choice to proceed.","bad":false},{"t":"Re-run the check when a supplier’s account details change.","bad":false},{"t":"Build the name-matching engine first, wire up the screens and logging much later.","bad":true,"why":"Cut by technical layer — nothing in between is usable by the finance team on its own."},{"t":"Ship the check now, add the record of who ignored the warning later.","bad":true,"why":"The record of who chose to proceed is the compliance backbone — deferring it defers the part that matters when money is lost."},{"t":"Make a separate piece for each type of spelling difference.","bad":true,"why":"So finely split that coordinating the pieces costs more than each one is worth."}],"slicesSuccess":"Three pieces, each usable on its own, each small enough to check by itself.","premortem":[{"t":"A serious mismatch is shown so gently that people click straight past it.","bad":false},{"t":"A real supplier with a slightly different trading name is warned every time and staff stop reading warnings.","bad":false},{"t":"A changed account number on a trusted supplier isn’t re-checked and money goes to a fraudster.","bad":false},{"t":"There’s no record of who ignored a warning, so a loss can’t be traced to a decision.","bad":false},{"t":"The warning box uses a font the team finds slightly ugly.","bad":true,"why":"A cosmetic nit, not a reason the change would fail."},{"t":"A meteor knocks out the payment network nationwide.","bad":true,"why":"Far outside this change’s control — pure noise here."}],"premortemSuccess":"Four real failure modes named — the ignored serious warning, warning fatigue, the unchecked changed account, and no record of the choice. Each becomes a safeguard."},{"id":"sweeping","title":"Move spare cash automatically","short":"sweeping spare cash into one main account each evening","ticket":"„Automatically move spare cash into one main account each evening.“","hookBuild":["Each evening it moves money from every account into the one main account.","It empties them right down to zero, ignoring any minimum you need to leave behind for direct debits. You set no floor, so I assumed nothing needs to stay.","It runs every single calendar day, including weekends and bank holidays when payments can’t actually settle, so balances and reality drift apart.","If an account is already low, it still tries to move money and creates an overdraft. Seemed better than skipping it.","Bonus: there’s no report of what moved where, no off switch, and the order it drains accounts in is random each night."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide whether the sweep ever leaves an account short.","map":[{"t":"As a finance team we want spare cash pulled into one main account each evening so it’s all in one place.","c":"goal"},{"t":"Each account keeps a set minimum balance — only the money above it is swept.","c":"rule"},{"t":"The sweep only runs on working days, not weekends or bank holidays.","c":"rule"},{"t":"If an account is at or below its minimum, nothing is moved from it — never into overdraft.","c":"rule"},{"t":"An account with a £5,000 minimum holding £8,000 → £3,000 is swept, £5,000 stays.","c":"ex"},{"t":"An account sitting on its minimum → nothing is moved, and it’s shown as skipped.","c":"ex"},{"t":"In what order are accounts swept when several feed the same main one?","c":"q"},{"t":"Should a bank holiday’s sweep run on the next working day, or just be skipped?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["an account holding more than its minimum on a working day","an account with some money in it"]},{"kw":"When","segs":["the evening sweep runs","the sweep does its thing"]},{"kw":"Then","segs":["only the amount above the minimum moves to the main account","the money moves"]},{"kw":"And","segs":["the move is listed in the report","everything is fine"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["an account already sitting on its minimum balance","an account that’s a bit low"]},{"kw":"When","segs":["the evening sweep runs","the sweep runs anyway"]},{"kw":"Then","segs":["nothing is moved and no overdraft is created","nothing much happens"]},{"kw":"And","segs":["the account is shown as skipped","nothing much is said"]}]},"edge":{"label":"An edge case — the evening is a bank holiday","lines":[{"kw":"Given","segs":["an account with spare cash, but this evening falls on a bank holiday","an account on a quiet evening"]},{"kw":"When","segs":["the usual sweep time comes around","the clock hits the sweep time"]},{"kw":"Then","segs":["nothing is swept, because it only runs on working days","the app decides for itself"]}]},"fail":"The normal sweep is clear. But the low account and the non-working-day cases are left vague — so it’s unclear whether an account is protected or driven into overdraft, and whether the sweep wrongly fires on a bank holiday. Spell those out as plainly as the normal sweep.","success":"All three are concrete — spare cash swept above the minimum, a low account left untouched with no overdraft, and a bank-holiday evening where nothing runs at all. The report shows exactly what moved."},"noguess":[{"t":"Should the sweep ever push an account into overdraft? — Confirmed: never, it stops at the minimum.","c":"done"},{"t":"Does it run on weekends? — Confirmed: working days only.","c":"done"},{"t":"Do we handle accounts in other currencies at launch? — Deliberately one currency for now, others later.","c":"limit"},{"t":"Can each account have its own minimum? — For now one shared minimum rule; per-account minimums later.","c":"limit"},{"t":"What order are accounts drained in when several feed one main account? — Not decided; blocked until treasury confirms the priority.","c":"block"}],"overreach":[{"t":"Sweeps only the money above each account’s minimum, each working day.","bad":false},{"t":"Shows a clear report of exactly what moved, from where, to where.","bad":false},{"t":"Leaves an account untouched when it’s already at its minimum.","bad":false},{"t":"Empties accounts to zero, ignoring any minimum, to gather the most cash.","bad":true,"why":"Draining below the minimum leaves nothing for direct debits and can bounce the company’s own payments."},{"t":"Runs every calendar day, including weekends and bank holidays.","bad":true,"why":"Moving money on non-working days makes the books and the real balances disagree until things settle."},{"t":"Moves money even from a low account, creating an overdraft.","bad":true,"why":"Sweeping should never cost the company overdraft fees — it must stop at the minimum."},{"t":"Turns itself on for every account in the company without being asked.","bad":true,"why":"Switched on too broadly — accounts that shouldn’t be swept get drained without anyone choosing it."}],"overreachSuccess":"Four traps caught: draining below the minimum, running on non-working days, sweeping into overdraft, and switching on for every account. The draft is safe now.","slices":[{"t":"Get a single account sweeping its spare cash into the main one, end to end.","bad":false},{"t":"Add the minimum balance so only the money above it moves.","bad":false},{"t":"Produce the report showing what moved each evening.","bad":false},{"t":"Build the money-moving engine first, the schedule and report weeks later.","bad":true,"why":"Cut by technical layer — none of the middle steps is something finance could use on its own."},{"t":"Ship the nightly sweep now, add the minimum-balance and overdraft protection later.","bad":true,"why":"The minimum and overdraft guard are what keep the sweep from bouncing the company’s payments — not optional add-ons."},{"t":"Make a separate piece for each account in the company.","bad":true,"why":"So finely split that coordinating dozens of near-identical pieces costs more than it’s worth."}],"slicesSuccess":"Three pieces, each something finance could actually use, each small enough to check on its own.","premortem":[{"t":"The sweep drains an account below what a direct debit needs and a payment bounces.","bad":false},{"t":"A sweep runs on a bank holiday and the balances stop matching reality.","bad":false},{"t":"Nobody can tell what moved where, so a missing amount can’t be traced.","bad":false},{"t":"Two accounts feed the main one in the wrong order and one goes overdrawn.","bad":false},{"t":"The report’s table is a slightly different shade of grey.","bad":true,"why":"A cosmetic nit, not a reason the change would fail."},{"t":"A country-wide power cut takes the bank offline overnight.","bad":true,"why":"Outside this change’s control — pure noise here."}],"premortemSuccess":"Four real failure modes named — draining below a needed balance, the holiday drift, the untraceable move, and the wrong drain order. Each becomes a safeguard."},{"id":"user-roles","title":"Give the right access","short":"giving a new finance team member the right level of access","ticket":"„Add a new finance team member who can see the accounts but not send money.“","hookBuild":["A new user who can see the accounts, as asked.","But „see the accounts“ — I also handed them the power to send money and approve payments. Seemed tidy to give everything at once.","I let this new person grant access to others too, so now they can hand out powers themselves.","I gave them the same view of the extra-sensitive accounts — payroll, the director’s — as everything else. You just said „the accounts“.","Bonus: when someone leaves, their access stays live — I built no way to switch it off."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide who can do what with the money.","map":[{"t":"As a finance manager I want a new team member to see the accounts but not send money.","c":"goal"},{"t":"Access comes in clear levels — view only, can pay, can approve — and a new person gets only what they’re granted.","c":"rule"},{"t":"Only a manager (an admin) can grant or change someone’s access, not an ordinary user.","c":"rule"},{"t":"When someone leaves, their access is switched off straight away.","c":"rule"},{"t":"A new joiner is set to view only → they can see balances but every „send money“ action is blocked.","c":"ex"},{"t":"Someone tries to give themselves a higher level → it’s refused, because only a manager can change access.","c":"ex"},{"t":"Should extra-sensitive accounts (like payroll) need a separate, higher permission even to view?","c":"q"},{"t":"Does „can pay“ have its own daily limit, separate from „can approve“?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a new team member set to view only","a new team member"]},{"kw":"When","segs":["they open the accounts","they log in"]},{"kw":"Then","segs":["they can see the balances but can’t send any money","they see stuff"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a view-only team member","a team member with some access"]},{"kw":"When","segs":["they try to send a payment","they try to do something"]},{"kw":"Then","segs":["the action is blocked because they don’t have the pay permission","it stops"]},{"kw":"And","segs":["no money leaves","everything is fine"]}]},"edge":{"label":"An edge case — the moment someone leaves","lines":[{"kw":"Given","segs":["a team member whose last day has just ended and whose access is being switched off","a team member who is leaving"]},{"kw":"When","segs":["they try one more action right as their access is switched off","they try something around then"]},{"kw":"Then","segs":["the action is refused because their access is already off","the app decides for itself"]},{"kw":"And","segs":["they can no longer see or move any money","it’s handled"]}]},"fail":"The view-only case is clear. But the blocked pay attempt and the moment someone leaves are left vague — so it’s unclear whether the block holds, or whether a leaver keeps live access. Spell the refusal and the leaver cutoff out as plainly as the normal view.","success":"All three are concrete — a view-only user seeing balances, a pay attempt firmly blocked, and a leaver locked out the instant their access is switched off. No accidental powers, no lingering access."},"noguess":[{"t":"Who can grant access? — Confirmed: only a manager with the admin role.","c":"done"},{"t":"What does the new joiner get? — Confirmed: view only, no pay or approve.","c":"done"},{"t":"Do we set per-account limits at launch? — Deliberately one company-wide setup for now, finer limits later.","c":"limit"},{"t":"Do we support temporary access that expires? — Out of scope for now, revisit later.","c":"limit"},{"t":"Do extra-sensitive accounts need a separate permission even to view? — Not decided; blocked until the security team confirms.","c":"block"}],"overreach":[{"t":"Sets the new joiner to view only, with every pay action blocked.","bad":false},{"t":"Lets only a manager grant or change someone’s access.","bad":false},{"t":"Switches off a person’s access the moment they leave.","bad":false},{"t":"Gives the new joiner the power to send and approve payments as well as view.","bad":true,"why":"They were asked for view only — handing over payment powers is exactly the overreach that lets money leave wrongly."},{"t":"Lets the new user grant access to other people.","bad":true,"why":"Giving an ordinary user the power to hand out powers means access can spread with no manager in control."},{"t":"Shows the extra-sensitive accounts (payroll, director’s) to everyone the same way.","bad":true,"why":"Sensitive accounts need tighter access — exposing them broadly mishandles private data."},{"t":"Leaves a leaver’s access switched on because there’s no off switch.","bad":true,"why":"A former employee who can still see or move money is a serious, well-known breach."}],"overreachSuccess":"Four traps caught: handing over payment powers, letting a user grant access, exposing sensitive accounts, and no way to switch off a leaver. The draft is safe now.","slices":[{"t":"Add a view-only user who can see the accounts but not pay, end to end.","bad":false},{"t":"Add the manager-only control over who can grant access.","bad":false},{"t":"Add switching off access the moment someone leaves.","bad":false},{"t":"Build the permissions database first, the screens and the actual blocking much later.","bad":true,"why":"Cut by technical layer — nothing usable by a manager exists until the very end."},{"t":"Roll out the roles now, add the leaver switch-off and sensitive-account limits later.","bad":true,"why":"Turning off a leaver’s access is the safety heart of this — deferring it leaves the exact hole that gets exploited."},{"t":"Make a separate piece for each individual permission checkbox.","bad":true,"why":"So finely split that wiring the tiny pieces together costs more than each is worth."}],"slicesSuccess":"Three pieces, each usable by a manager on its own, each small enough to check by itself.","premortem":[{"t":"A view-only joiner is accidentally given pay rights and sends money.","bad":false},{"t":"A leaver keeps their access and can still see or move money weeks later.","bad":false},{"t":"An ordinary user is able to raise their own access level.","bad":false},{"t":"Payroll and other sensitive accounts are visible to people who shouldn’t see them.","bad":false},{"t":"The access screen lists names in a font someone dislikes.","bad":true,"why":"A cosmetic nit, not a reason the change would fail."},{"t":"The office wifi drops for an hour one morning.","bad":true,"why":"Outside this change’s control — pure noise here."}],"premortemSuccess":"Four real failure modes named — accidental pay rights, the leaver still in, self-raised access, and exposed sensitive accounts. Each becomes a safeguard."},{"id":"schedule-tax","title":"Schedule a future tax payment","short":"scheduling a large tax payment for a future date","ticket":"„Let companies schedule a large tax payment for a future date.“","hookBuild":["A way to pick a future date and schedule a big tax payment for it.","If the date lands on a weekend, I just try to pay anyway — even though it can’t settle until the next working day, which could be past the deadline. You didn’t say what to do about weekends.","If there isn’t enough money on the day, I silently do nothing — no warning, no retry — so a deadline-critical tax payment just quietly doesn’t happen.","No approval needed for the large amount, and no confirmation that it’s booked. You schedule it and hope.","Bonus: once it’s scheduled I gave no way to edit or cancel it, even before it runs."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide whether a deadline-critical payment lands on time.","map":[{"t":"As a company I want to schedule a large tax payment for a future date so it’s paid on time.","c":"goal"},{"t":"A large scheduled payment must be approved by a second person before the date arrives.","c":"rule"},{"t":"If the chosen date is a weekend or bank holiday, it’s moved so the money still arrives in time, not late.","c":"rule"},{"t":"It can be edited or cancelled any time before it runs.","c":"rule"},{"t":"A payment is scheduled, approved, and the funds are there on the day → it goes out and a confirmation is shown.","c":"ex"},{"t":"There isn’t enough money on the day → the payment is held and the company is warned in time to act.","c":"ex"},{"t":"If the date lands on a weekend, do we move it earlier or later to still hit the deadline?","c":"q"},{"t":"How long before the run date must the second person approve by?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a large tax payment scheduled and approved by a second person, with funds available","a payment set for later"]},{"kw":"When","segs":["the scheduled date arrives","the day comes"]},{"kw":"Then","segs":["the payment goes out and a confirmation is shown","it pays"]},{"kw":"And","segs":["the money leaves only on the chosen date, not before","everything is fine"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a scheduled payment with not enough money in the account on the day","a scheduled payment"]},{"kw":"When","segs":["the scheduled date arrives","the day comes"]},{"kw":"Then","segs":["the payment is held and the company is warned in time to fix it","it doesn’t go and something happens"]}]},"edge":{"label":"An edge case — the date lands on a weekend","lines":[{"kw":"Given","segs":["a large tax payment whose chosen date falls on a weekend","a payment set for a date"]},{"kw":"And","segs":["the money must still arrive by the tax deadline","the payment should be roughly on time"]},{"kw":"When","segs":["that weekend date is reached","the day comes around"]},{"kw":"Then","segs":["the run is moved so the money still arrives in time, not late","the app decides for itself"]}]},"fail":"The scheduled-and-paid case is clear. But the short-funds day and the weekend date are left vague — so a deadline-critical payment might quietly fail, or settle late. Spell those two out as plainly as the happy path.","success":"All three are concrete — scheduled, approved and paid with a confirmation, a short-funds day held and warned in time, and a weekend date moved so the money still lands before the deadline. No silent miss, no late payment."},"noguess":[{"t":"Can a scheduled payment be cancelled before it runs? — Confirmed: yes, any time before the run date.","c":"done"},{"t":"Does a large scheduled payment need approval? — Confirmed by risk: yes, a second person before the date.","c":"done"},{"t":"Can companies schedule payments other than tax at launch? — Deliberately tax payments only for now, others later.","c":"limit"},{"t":"How far ahead can a payment be scheduled? — Capped at a set window for now, extended later.","c":"limit"},{"t":"When the date is a weekend, do we move it earlier or later? — Not decided; blocked until finance confirms the deadline rule.","c":"block"}],"overreach":[{"t":"Requires a second person to approve the large payment before its date.","bad":false},{"t":"Warns the company in good time if the funds aren’t there on the day.","bad":false},{"t":"Lets the payment be edited or cancelled any time before it runs.","bad":false},{"t":"Tries to pay on a weekend date, so it settles late and misses the tax deadline.","bad":true,"why":"A tax payment that lands late risks penalties — a weekend date must be handled, not paid blindly."},{"t":"Silently does nothing when funds are short on the day, with no warning.","bad":true,"why":"A deadline-critical payment that quietly fails to run is the worst outcome — the company finds out too late."},{"t":"Skips approval and lets one person schedule a large payment alone.","bad":true,"why":"Large payments need a second pair of eyes — one person acting alone is how big mistakes and fraud slip through."},{"t":"Sends the money the moment it’s scheduled instead of on the chosen date.","bad":true,"why":"Paying early ties up the company’s cash and defeats the whole point of scheduling."}],"overreachSuccess":"Four traps caught: paying blindly on a weekend, the silent short-funds failure, skipping approval, and paying early. The draft is safe now.","slices":[{"t":"Schedule a tax payment for a future date and have it run on the day, end to end.","bad":false},{"t":"Add the second-person approval before the date.","bad":false},{"t":"Handle the day-of case where funds are short: hold and warn.","bad":false},{"t":"Build the scheduling database first, the screens and the actual paying much later.","bad":true,"why":"Cut by technical layer — nothing a company could use exists until the last step."},{"t":"Ship scheduling now, add the approval and the not-enough-funds warning later.","bad":true,"why":"Approval and the funds warning are what keep a deadline-critical payment safe — deferring them defeats the purpose."},{"t":"Make a separate piece for each field on the schedule form.","bad":true,"why":"So finely split that stitching them together costs more than each adds."}],"slicesSuccess":"Three pieces, each something a company could actually use, each small enough to check on its own.","premortem":[{"t":"The chosen date is a weekend and the money arrives after the tax deadline.","bad":false},{"t":"Funds are short on the day and the payment silently doesn’t run.","bad":false},{"t":"Someone edits the amount after approval and the change isn’t re-checked.","bad":false},{"t":"The company thinks it’s scheduled but no confirmation was ever shown, so no one is sure.","bad":false},{"t":"The date picker’s calendar starts the week on Sunday instead of Monday.","bad":true,"why":"A cosmetic nit, not a reason the change would fail."},{"t":"A nationwide bank outage happens to fall on the run date.","bad":true,"why":"Outside this change’s control — pure noise here."}],"premortemSuccess":"Four real failure modes named — the weekend miss, the silent short-funds failure, the un-rechecked edit, and the missing confirmation. Each becomes a safeguard."},{"id":"cash-visibility","title":"One live view of all balances","short":"giving the finance team one live view of every account balance","ticket":"„Give the finance team one live view of every account balance.“","hookBuild":["One dashboard showing every account balance in the company.","It includes every account — even the ones some team members aren’t allowed to see, like payroll and the directors’. You said „every account“, so I showed all of them to everyone.","The numbers are actually from last night’s snapshot, but I labelled them „live“ with no timestamp, so nobody knows they’re a day old.","Accounts in other currencies I just added up as if they were all pounds, so the total is nonsense.","Bonus: I made the dashboard a public web link anyone can open, no login. Easy sharing."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide who sees what, and how fresh it really is.","map":[{"t":"As a finance team we want one view of every account balance so we can see our whole cash position at a glance.","c":"goal"},{"t":"Each figure shows how fresh it is, so no one mistakes an old number for a live one.","c":"rule"},{"t":"Only people with permission can see the view, and only the accounts they’re allowed to see.","c":"rule"},{"t":"Accounts in different currencies are shown separately, not added together as if they were one.","c":"rule"},{"t":"A user with full access opens the view → they see every account, each with a clear „updated 2 minutes ago“.","c":"ex"},{"t":"A user without payroll access opens the view → the payroll account simply isn’t shown to them.","c":"ex"},{"t":"How fresh do the numbers need to be — real-time, or is a few minutes’ delay fine?","c":"q"},{"t":"When several currencies are involved, do we also show a combined total in one chosen currency?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a finance team member with permission to see the accounts","a team member"]},{"kw":"When","segs":["they open the balance view","they open something"]},{"kw":"Then","segs":["they see the accounts they’re allowed to","they see numbers"]},{"kw":"And","segs":["each figure carries a clear update time","the numbers look current"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a balance that couldn’t be refreshed and is now out of date","a balance"]},{"kw":"When","segs":["the finance team opens the view","they look"]},{"kw":"Then","segs":["the figure is clearly marked as stale rather than shown as if it were live","it shows something"]}]},"edge":{"label":"An edge case — accounts in more than one currency","lines":[{"kw":"Given","segs":["accounts held in more than one currency","a few accounts"]},{"kw":"When","segs":["the finance team opens the balance view","they open it"]},{"kw":"Then","segs":["each currency is shown on its own, never added together as if it were one","the app decides for itself"]},{"kw":"And","segs":["no misleading combined total is shown","everything is fine"]}]},"fail":"The fresh view is clear. But the un-refreshed figure and the mix of currencies are left vague — so an old number might look live, or amounts in different currencies get piled into one nonsense total. Spell those two out as plainly as the fresh view.","success":"All three are concrete — a fresh view with clear update times, a stale figure plainly marked as old, and several currencies each shown on their own rather than summed. No decisions on numbers that only look live or totals that aren’t real."},"noguess":[{"t":"Can everyone see every account? — Confirmed: no, only the accounts each person is allowed to see.","c":"done"},{"t":"Do we show how fresh each number is? — Confirmed: yes, every figure carries its update time.","c":"done"},{"t":"Do we combine currencies into one total at launch? — Deliberately shown separately for now, combined total later.","c":"limit"},{"t":"Do we include accounts held at other banks? — Out of scope for now, our own accounts only.","c":"limit"},{"t":"How fresh must the figures be — real-time or a short delay? — Not decided; blocked until the team agrees the acceptable delay.","c":"block"}],"overreach":[{"t":"Shows each balance with a clear note of how fresh it is.","bad":false},{"t":"Shows each person only the accounts they’re allowed to see.","bad":false},{"t":"Keeps different currencies separate rather than adding them together.","bad":false},{"t":"Shows every account to everyone, including payroll and the directors’.","bad":true,"why":"Sensitive accounts must stay restricted — showing them to all mishandles private data."},{"t":"Labels last night’s snapshot as „live“ with no timestamp.","bad":true,"why":"An old number that looks current leads to real decisions made on wrong information."},{"t":"Adds up different currencies as if they were all pounds.","bad":true,"why":"A meaningless total invites cash decisions based on a figure that isn’t real."},{"t":"Publishes the dashboard as an open web link with no login.","bad":true,"why":"Exposing every balance to anyone with the link is a serious data breach."}],"overreachSuccess":"Four traps caught: showing every account to everyone, old numbers labelled live, adding up currencies, and the open public link. The draft is safe now.","slices":[{"t":"Show one account’s live balance with its freshness, end to end.","bad":false},{"t":"Add the permission check so people see only their allowed accounts.","bad":false},{"t":"Add handling for stale figures so old numbers are clearly marked.","bad":false},{"t":"Build the data feed first, the screen and the permission checks much later.","bad":true,"why":"Cut by technical layer — no one on the finance team can use anything until the end."},{"t":"Ship the full-company view now, add the permission checks and freshness marking later.","bad":true,"why":"The permission check is what stops sensitive balances leaking — it can’t be bolted on afterwards."},{"t":"Make a separate piece for each single account balance tile.","bad":true,"why":"So finely split that coordinating the tiny tiles costs more than each is worth."}],"slicesSuccess":"Three pieces, each usable by the finance team on its own, each small enough to check by itself.","premortem":[{"t":"A day-old figure shown as live leads to a bad cash decision.","bad":false},{"t":"Someone sees a sensitive account they shouldn’t have access to.","bad":false},{"t":"Different currencies are added together and the total is wrong.","bad":false},{"t":"The feed silently stops updating and nobody notices the numbers are frozen.","bad":false},{"t":"The dashboard’s header colour doesn’t match the company brand exactly.","bad":true,"why":"A cosmetic nit, not a reason the change would fail."},{"t":"A storm knocks out the office internet for the afternoon.","bad":true,"why":"Outside this change’s control — pure noise here."}],"premortemSuccess":"Four real failure modes named — the stale-as-live decision, the leaked sensitive account, the mixed-currency total, and the frozen feed. Each becomes a safeguard."},{"id":"daily-limit","title":"Daily payment cap for the company","short":"capping how much the company can send out in one day","ticket":"„Cap how much the company can send out in one day and warn them near it.“","hookBuild":["A cap on how much the company can send out in a day, with a warning as you get close.","„Warn them near it“ — but at the cap itself I do nothing. I still let payments sail straight through over the limit. A warning was all you asked for.","I leave scheduled and queued payments out of the running total, so the day’s real total is understated and blows past the cap unnoticed.","I reset the cap at a random moment I picked, not at a clear daily point, so nobody knows when the allowance refreshes.","Bonus: I made the cap per-person, not company-wide, so ten people can each send up to the full limit and the company sends ten times what you meant."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide whether the cap actually holds the line.","map":[{"t":"As a company we want a cap on how much can be sent out in a day, with a warning as we get close.","c":"goal"},{"t":"The cap is company-wide — everyone’s payments count towards the same daily total.","c":"rule"},{"t":"All payments count towards the total, including scheduled and queued ones due that day.","c":"rule"},{"t":"The company is warned as it nears the cap, and stopped at it.","c":"rule"},{"t":"The day’s total reaches 80% of the cap → a warning is shown but payments still go through.","c":"ex"},{"t":"A payment would take the total over the cap → it’s blocked with a clear reason.","c":"ex"},{"t":"When does the daily total reset — at midnight, or at the start of the working day?","c":"q"},{"t":"Is there a way to let an urgent payment through above the cap, and who signs it off?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["the day’s total nearing but still under the cap","a normal day of payments"]},{"kw":"When","segs":["another payment is sent","a payment goes"]},{"kw":"Then","segs":["it goes through and a warning shows they’re close to the cap","it pays and warns"]},{"kw":"And","segs":["the payment is added to the shared company-wide total","everything is fine"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["the day’s total already at the cap","a busy day"]},{"kw":"When","segs":["a payment that would push it over the cap is sent","another payment is tried"]},{"kw":"Then","segs":["the payment is blocked with a clear reason","it stops"]}]},"edge":{"label":"An edge case — a payment that lands exactly on the cap","lines":[{"kw":"Given","segs":["a payment that would bring the day’s total to exactly the cap, not a penny over","a fairly large payment"]},{"kw":"When","segs":["that payment is sent","a payment goes"]},{"kw":"Then","segs":["it’s allowed because it lands right on the cap, and the very next one is blocked","the app decides for itself"]},{"kw":"And","segs":["scheduled and queued payments due that day are counted in the total too","the total looks about right"]}]},"fail":"The near-the-cap warning is clear. But the over-cap block and the payment that lands exactly on the cap are left vague — so it’s unclear whether the cap actually holds, or whether a payment right on the line is allowed or refused. Spell those out as plainly as the warning.","success":"All three are concrete — a warning as the total nears the cap, a firm block once it’s over, and a payment landing exactly on the cap allowed while the next is stopped. The cap actually holds the line."},"noguess":[{"t":"Is the cap per person or company-wide? — Confirmed: company-wide, one shared daily total.","c":"done"},{"t":"What happens at the cap — warn or block? — Confirmed: warn as you near it, block at it.","c":"done"},{"t":"Can each account have its own separate cap? — Deliberately one company cap for now, per-account later.","c":"limit"},{"t":"Do scheduled payments for future days count today? — Only those due today count for now; future handling later.","c":"limit"},{"t":"When does the daily total reset? — Not decided; blocked until finance confirms midnight or working-day start.","c":"block"}],"overreach":[{"t":"Warns the company as the day’s total nears the cap.","bad":false},{"t":"Blocks a payment that would take the total over the cap.","bad":false},{"t":"Counts everyone’s payments towards one shared company total.","bad":false},{"t":"Only warns and never blocks, letting payments go through over the cap.","bad":true,"why":"A cap that never actually stops anything is no cap — the whole point is to hold the line at the limit."},{"t":"Leaves scheduled and queued payments out of the running total.","bad":true,"why":"If some payments don’t count, the real total slips past the cap unnoticed."},{"t":"Sets the cap per person instead of company-wide.","bad":true,"why":"Ten people each sending up to the limit means the company sends far more than intended."},{"t":"Lets anyone push an urgent payment through over the cap with no approval.","bad":true,"why":"An exception with no sign-off is a wide-open door around the very control being built."}],"overreachSuccess":"Four traps caught: warning without blocking, uncounted queued payments, a per-person cap, and unapproved urgent exceptions. The draft is safe now.","slices":[{"t":"Track the day’s total and warn as it nears the cap, end to end.","bad":false},{"t":"Add the hard block once the cap is reached.","bad":false},{"t":"Make the total company-wide across everyone’s payments.","bad":false},{"t":"Build the running-total store first, the screens and the blocking much later.","bad":true,"why":"Cut by technical layer — nothing the company can use exists until the end."},{"t":"Ship the warning now, add the actual block at the cap later.","bad":true,"why":"The block is the part that enforces the cap — shipping only a warning leaves the control toothless."},{"t":"Make a separate piece for each payment type that counts.","bad":true,"why":"So finely split that coordinating the pieces costs more than each is worth."}],"slicesSuccess":"Three pieces, each something the company could actually use, each small enough to check on its own.","premortem":[{"t":"Payments go over the cap because it only warns and never blocks.","bad":false},{"t":"A queued payment tips the day over the cap but wasn’t counted in time.","bad":false},{"t":"The cap is per person, so the company sends many times the intended amount.","bad":false},{"t":"No one knows when the allowance resets, so a big payment goes out just after an unclear rollover.","bad":false},{"t":"The warning banner sits a little low on the screen.","bad":true,"why":"A cosmetic nit, not a reason the change would fail."},{"t":"A power cut takes the office offline for an hour.","bad":true,"why":"Outside this change’s control — pure noise here."}],"premortemSuccess":"Four real failure modes named — the never-blocked overspend, the uncounted queued payment, the per-person multiplier, and the unclear reset. Each becomes a safeguard."},{"id":"request-to-pay","title":"Request money from a customer","short":"letting a company ask one of its customers to pay","ticket":"„Let a company send a payment request to one of its customers.“","hookBuild":["A „request money“ button that emails the customer a pay-now link.","It leaves the amount blank for the customer to fill in themselves — you didn’t say how much, so I let them decide.","I attached no invoice reference, so when the money lands nobody knows which bill it paid.","I set it to chase the customer every hour, forever, until they pay.","Bonus: if the customer ignores it, I quietly pull the money straight from their account. You’re welcome."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide whether the money ever matches the right invoice.","map":[{"t":"As a company I want to ask a customer to pay a specific amount so I get paid without chasing by hand.","c":"goal"},{"t":"Every request carries a fixed amount and a reference that ties the money back to the right invoice.","c":"rule"},{"t":"The customer chooses whether to pay — we can ask, but we can never pull the money ourselves.","c":"rule"},{"t":"A request stops being payable once it expires or has been paid in full.","c":"rule"},{"t":"A £900 request for invoice 4021, paid in full → the money is matched to that invoice and the request is marked paid.","c":"ex"},{"t":"The customer declines → the company is told, and no money moves.","c":"ex"},{"t":"If the customer pays only part of the amount, do we keep the request open for the rest or close it?","c":"q"},{"t":"How many reminders do we send, and how far apart, before we leave the customer alone?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a £900 request for invoice 4021 sent to the customer","a customer who owes some money"]},{"kw":"And","segs":["the request carries a fixed amount and its invoice reference","the request has the usual bits on it"]},{"kw":"When","segs":["the customer opens the link and pays the full amount","the customer does something"]},{"kw":"Then","segs":["the money is matched to invoice 4021 and the request is marked paid","it works out"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a request that has already expired","an old request"]},{"kw":"When","segs":["the customer opens the old link and tries to pay","time passes"]},{"kw":"Then","segs":["payment is blocked and both sides see that the request expired","nothing much"]},{"kw":"And","segs":["the customer is pointed to ask for a fresh request","they figure it out"]}]},"edge":{"label":"An edge case — the request is already paid","lines":[{"kw":"Given","segs":["a request that has already been paid in full","a request that’s been dealt with"]},{"kw":"When","segs":["the same link is opened and someone tries to pay it again","the customer taps around"]},{"kw":"Then","segs":["no second payment is taken and the link shows it’s already settled","the app sorts it out"]}]},"fail":"The clean payment is clear — but a request that’s expired, or one that’s already been paid, you’ve left vague. The agent will let money through twice, or with no invoice to match. Spell out the refusal and the already-paid case as clearly as the happy path.","success":"All three are spelled out — a payment matched to its invoice, an expired link that blocks, and a second tap on an already-paid request that takes nothing. No orphaned or doubled money."},"noguess":[{"t":"Can the customer change the amount on the request? — Product answered: no, the amount is fixed by the company.","c":"done"},{"t":"Does the money automatically match back to the invoice number? — Finance confirmed: yes, by the reference on the request.","c":"done"},{"t":"Do we support part payments at launch? — Deliberately not; full amount only for now, revisit later.","c":"limit"},{"t":"How many reminders do we send? — Kept to three for launch; tune later.","c":"limit"},{"t":"If a customer disputes a request, does it turn into a formal dispute case? — Rules aren’t agreed yet; blocked until the disputes team confirms.","c":"block"}],"overreach":[{"t":"A request that carries a fixed amount and the invoice reference.","bad":false},{"t":"Lets the customer type in their own amount if they think the bill is wrong.","bad":true,"why":"You agreed the amount is fixed by the company — letting customers set it invites underpayment and chaos."},{"t":"Tells the company as soon as the customer declines.","bad":false},{"t":"If the customer ignores the request, it pulls the money from their account anyway.","bad":true,"why":"Taking money without the customer’s say-so is theft in their eyes and against the rules — never ship this."},{"t":"Reminds the customer every hour until they pay.","bad":true,"why":"Round-the-clock chasing is harassment and gets the company reported — nobody approved this cadence."},{"t":"Marks the request paid and matches the money to the right invoice.","bad":false},{"t":"Sends the request to every customer in the address book, not just the one chosen.","bad":true,"why":"Invented broadcast nobody asked for — it leaks who owes what and bills the wrong people."}],"overreachSuccess":"Four traps caught: the customer setting their own amount, pulling money without consent, the hourly chasing, and the broadcast to every customer. The draft is safe now.","slices":[{"t":"Send a single request and let the customer pay it in full, end to end.","bad":false},{"t":"Match the incoming money back to the right invoice automatically.","bad":false},{"t":"Handle the request being declined or expiring, and tell the company.","bad":false},{"t":"Build the email templates first, the payment link next week, the money-matching the week after.","bad":true,"why":"Cut by technical layer — no piece lets a customer actually pay on its own."},{"t":"Ship the request now; add the „only the customer can pay“ safeguard and the expiry later.","bad":true,"why":"Leaving out the controls that stop money being pulled or old links being paid — exactly what blows up."},{"t":"Split it into a separate piece for every field on the request form.","bad":true,"why":"So small that wiring them together costs more than any single field is worth."}],"slicesSuccess":"Three pieces, each something a company could actually use, each small enough to check on its own.","premortem":[{"t":"The money arrives but matches to the wrong invoice, so the customer looks unpaid.","bad":false},{"t":"A customer pays a request that was already paid, and gets charged twice.","bad":false},{"t":"Reminders keep going out after the bill is settled, annoying a paying customer.","bad":false},{"t":"An expired link still takes money, and the company can’t explain where it came from.","bad":false},{"t":"The company’s logo on the request email is slightly the wrong shade of blue.","bad":true,"why":"A cosmetic nit, not a reason the change fails."},{"t":"The customer’s email provider is down for maintenance one evening.","bad":true,"why":"Outside this change’s control — pure noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the wrong invoice, the double payment, the reminders that won’t stop, the expired link that still takes money. Each becomes a safeguard before a thing is built."},{"id":"secure-login","title":"Log in to the company portal","short":"letting a company user sign in to the banking portal","ticket":"„Let a company user log in to the banking portal.“","hookBuild":["A login box that takes a name and passcode.","I skipped the extra security step entirely — one passcode and you’re in, from anywhere.","If someone forgets their passcode, I just email it back to them in plain text.","I let anyone try the passcode as many times as they like, forever.","Bonus: once one person signs in, everyone at the company shares that same session. You’re welcome."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide whether an account is actually safe to sign in to.","map":[{"t":"As a company user I want to sign in to the portal so I can manage the company’s money securely.","c":"goal"},{"t":"Signing in needs the passcode plus a second check (a code or fingerprint), not the passcode alone.","c":"rule"},{"t":"After a few wrong tries the account is locked for a while, not left open to endless guessing.","c":"rule"},{"t":"An idle session times out and asks the user to sign in again.","c":"rule"},{"t":"Right passcode and the second check passes → the user is signed in.","c":"ex"},{"t":"Five wrong passcodes in a row → the account is locked and the user sees how to get back in.","c":"ex"},{"t":"When someone signs in from a brand-new device, do we add an extra check or just let them in?","c":"q"},{"t":"If the fingerprint scanner fails, what is the fallback — a texted code, or something else?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a company user with the right passcode","a user who wants in"]},{"kw":"When","segs":["they enter the passcode and pass the second check","they try to log in somehow"]},{"kw":"Then","segs":["they are signed in to their company’s portal","they get access"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a user who has entered the wrong passcode five times","a forgetful user"]},{"kw":"When","segs":["they try the passcode again","they keep going"]},{"kw":"Then","segs":["the account is locked, not left open to more guessing","it stops"]},{"kw":"And","segs":["they see a safe way to get back in","it sorts itself out"]}]},"edge":{"label":"An edge case — one wrong try short of the lock","lines":[{"kw":"Given","segs":["a user who has just got the passcode wrong four times in a row","a user who keeps slipping up"]},{"kw":"When","segs":["they enter the right passcode and pass the second check","they finally get it"]},{"kw":"Then","segs":["they are let in and the wrong-try count is reset to zero","the app decides for itself"]},{"kw":"And","segs":["the account is not locked, because five was never reached","everything is fine"]}]},"fail":"The clean sign-in is clear — but the lock-out, and the case of four wrong tries then a right one, you’ve left vague. The agent might lock too early or never reset the count. Spell the refusal and the boundary out as clearly as the happy path.","success":"All three are spelled out — the clean sign-in, the lock after five wrong tries, and the fourth-wrong-then-right case that lets them in and resets the count. No room to improvise."},"noguess":[{"t":"Is the passcode alone enough to sign in? — Security answered: no, a second check is always required.","c":"done"},{"t":"How many wrong tries before we lock the account? — Security confirmed: five, then a timed lock.","c":"done"},{"t":"Do we support fingerprint login at launch? — Deliberately not; texted code only for now, biometrics later.","c":"limit"},{"t":"How long until an idle session times out? — Set to fifteen minutes for launch; tune later.","c":"limit"},{"t":"When a user signs in from a new device, what extra check do we ask for? — Not decided yet; blocked until security signs off.","c":"block"}],"overreach":[{"t":"A login that asks for the passcode and a second check.","bad":false},{"t":"Emails the passcode back in plain text when someone forgets it.","bad":true,"why":"Sending passcodes in the clear hands accounts to anyone reading the inbox — a serious breach."},{"t":"Locks the account after five wrong tries and shows how to recover it.","bad":false},{"t":"Lets people try the passcode as many times as they want.","bad":true,"why":"Unlimited guessing lets an attacker crack any account — you agreed to lock after a few tries."},{"t":"Shares one signed-in session across everyone at the company.","bad":true,"why":"Invented behaviour nobody asked for — one person’s screen becomes everyone’s access, with no trace of who did what."},{"t":"Times out an idle session and asks the user to sign in again.","bad":false},{"t":"Remembers every new device automatically and never asks again.","bad":true,"why":"Skipping the new-device check lets a stolen laptop straight in — a control you were told to keep."}],"overreachSuccess":"Four traps caught: the plain-text passcode, the unlimited guessing, the shared session, and the skipped new-device check. The draft is safe now.","slices":[{"t":"Get a normal sign-in working with the passcode and second check, end to end.","bad":false},{"t":"Handle a forgotten passcode with a safe way to reset it.","bad":false},{"t":"Lock the account after too many wrong tries and let the user recover.","bad":false},{"t":"Build the login screen first, the passcode check next week, the second-check step the week after.","bad":true,"why":"Cut by technical layer — no piece actually lets a user sign in on its own."},{"t":"Ship the login now; add the second check and the lock-out later if there’s time.","bad":true,"why":"Leaving out the parts that keep accounts safe — exactly what gets exploited."},{"t":"Split it into a separate piece for every button on the login screen.","bad":true,"why":"So tiny that stitching them together costs more than any button is worth."}],"slicesSuccess":"Three pieces, each something a user could actually use, each small enough to check on its own.","premortem":[{"t":"A locked-out user can’t get back in and can’t reach anyone to help.","bad":false},{"t":"The second-check code never arrives, so nobody can sign in.","bad":false},{"t":"A stolen laptop stays signed in because the session never times out.","bad":false},{"t":"Two people at the same company overwrite each other’s work under one shared login.","bad":false},{"t":"The login button’s corners aren’t rounded quite right.","bad":true,"why":"A polish detail, not a reason the change fails."},{"t":"The office WiFi drops for a few minutes during a storm.","bad":true,"why":"Outside this change’s control — noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the locked-out user, the code that never arrives, the session that won’t time out, the two users clashing. Each becomes a safeguard before a thing is built."},{"id":"notifications","title":"Alerts on account movement","short":"telling the finance team when money moves on a company account","ticket":"„Notify the finance team when money moves on a company account.“","hookBuild":["An alert that fires the instant any money moves.","It pings for every single penny — a 3p bank fee wakes the whole team at 3am. You didn’t set a threshold.","I send it to everyone in the company, cleaners included, with the full account balance in the text.","I only report successful payments — declined ones vanish silently.","Bonus: on a shared account I send the alert to the other company too. You’re welcome."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide who hears about the money, and when.","map":[{"t":"As the finance team I want to be told when money moves so we spot problems without watching the account all day.","c":"goal"},{"t":"Alerts only fire above an agreed amount, so small routine movements stay quiet.","c":"rule"},{"t":"Only the right roles are told — the finance team, not everyone at the company.","c":"rule"},{"t":"Both a successful payment and a declined one can raise an alert, and they say which it was.","c":"rule"},{"t":"A £12,000 payment leaves the account → the finance team is alerted with the amount and who it went to.","c":"ex"},{"t":"A £3 card fee → below the threshold, so no alert.","c":"ex"},{"t":"Do we hold alerts during agreed quiet hours and send them in the morning, or send straight away?","c":"q"},{"t":"On an account shared by two companies, who gets told when money moves?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a £12,000 payment leaving a company account","some money moving"]},{"kw":"When","segs":["the payment goes through","something happens on the account"]},{"kw":"Then","segs":["the finance team is alerted with the amount and the recipient","someone gets told"]},{"kw":"And","segs":["it goes only to the finance roles, not everyone at the company","it reaches the right sort of people"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a payment that the bank declines","a payment that fails"]},{"kw":"When","segs":["the finance team would expect to hear about it","at some point"]},{"kw":"Then","segs":["they get an alert that clearly says it was declined, not successful","they hear something"]},{"kw":"And","segs":["nothing fails quietly with the team assuming all is well","it’s handled"]}]},"edge":{"label":"An edge case — right on the alert threshold","lines":[{"kw":"Given","segs":["a payment for exactly the agreed alert amount, not a penny more","a fairly ordinary payment"]},{"kw":"When","segs":["the payment goes through","the usual happens"]},{"kw":"Then","segs":["an alert still fires, because a payment right on the threshold counts","the app decides for itself"]}]},"fail":"The big-payment alert is clear — but a declined payment, and one landing exactly on the threshold, you’ve left vague. The agent might stay silent, or guess whether the line counts. Spell the declined case and the boundary out as clearly as the happy path.","success":"All three are spelled out — the alert on a big payment, a clearly-marked declined one, and a payment right on the threshold that still fires. Nothing fails in silence or slips through the line."},"noguess":[{"t":"Do we alert on small routine movements? — Product answered: no, only above the agreed amount.","c":"done"},{"t":"Do declined payments raise an alert too? — Confirmed: yes, and it says clearly that it was declined.","c":"done"},{"t":"Do we support per-user custom thresholds at launch? — Deliberately not; one company-wide amount for now.","c":"limit"},{"t":"Which channels do we send on? — Email only for launch; text and app alerts later.","c":"limit"},{"t":"During quiet hours, do we hold alerts or send at once? — Not agreed yet; blocked until finance sets the policy.","c":"block"}],"overreach":[{"t":"An alert that fires only above the agreed amount.","bad":false},{"t":"Sends every alert to everyone at the company.","bad":true,"why":"You agreed only the finance roles are told — spraying it wide leaks who paid whom to the whole firm."},{"t":"Says clearly whether a payment succeeded or was declined.","bad":false},{"t":"Puts the full account balance in every alert text.","bad":true,"why":"Sensitive balance data in a message anyone might read over a shoulder — nobody asked for that."},{"t":"Fires on every penny, ignoring the threshold.","bad":true,"why":"Alerting on tiny routine movements buries the real ones and the team stops reading them — the threshold was agreed."},{"t":"Holds alerts during agreed quiet hours and sends them after.","bad":false},{"t":"On a shared account, copies the alert to the other company too.","bad":true,"why":"Invented behaviour that leaks one company’s movements to another — a confidentiality breach."}],"overreachSuccess":"Four traps caught: alerting everyone, the balance in the text, ignoring the threshold, and copying the other company on a shared account. The draft is safe now.","slices":[{"t":"Alert the finance team on a large payment, end to end.","bad":false},{"t":"Add the threshold so small movements stay quiet.","bad":false},{"t":"Cover declined payments too, clearly marked.","bad":false},{"t":"Build the alert engine first, the email sending next week, the who-gets-it rules the week after.","bad":true,"why":"Cut by technical layer — no piece actually gets a useful alert to anyone on its own."},{"t":"Ship alerts to everyone now; add the who-gets-it and quiet-hours rules later.","bad":true,"why":"Leaving out the parts that keep balances private and the team sane — the bit that causes complaints."},{"t":"Split it into a separate piece for each type of transaction.","bad":true,"why":"So many tiny pieces that coordinating them costs more than the alerts are worth."}],"slicesSuccess":"Three pieces, each something the finance team could actually use, each small enough to check on its own.","premortem":[{"t":"So many alerts fire that the team mutes them and misses the important one.","bad":false},{"t":"A big fraudulent payment slips out just under the threshold and no alert fires.","bad":false},{"t":"An alert with the balance in it lands in the wrong person’s inbox.","bad":false},{"t":"Alerts arrive hours late, so the team learns about a problem too slowly to act.","bad":false},{"t":"The alert email uses last year’s logo.","bad":true,"why":"A cosmetic nit, not a reason the change fails."},{"t":"The mail server needs a routine reboot one Sunday night.","bad":true,"why":"Outside this change’s control — noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the alert flood, the payment slipping under the threshold, the balance in the wrong inbox, the late alerts. Each becomes a safeguard before a thing is built."},{"id":"dispute","title":"Report a transaction we don’t recognise","short":"letting a company report a payment it doesn’t recognise","ticket":"„Let a company report a transaction it doesn’t recognise.“","hookBuild":["A „not mine“ button next to every transaction.","It refunds the money instantly, no questions, no evidence — anyone can tap it on any payment.","It never blocks the card, so whoever’s spending keeps right on spending.","Any employee can raise a dispute on the company’s behalf, cleaner or CEO.","Bonus: once raised, there’s no way to check what happened to it. You’re welcome."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide whether a disputed charge is handled fairly.","map":[{"t":"As a company I want to report a payment I don’t recognise so I can get wrongly-taken money back.","c":"goal"},{"t":"A dispute must be raised within the allowed time window, not months later.","c":"rule"},{"t":"Only approved people at the company can raise a dispute, not just anyone.","c":"rule"},{"t":"The company can track the dispute’s status from raised to resolved.","c":"rule"},{"t":"A £400 charge nobody recognises, reported within the window with a note → a dispute is opened and tracked.","c":"ex"},{"t":"A charge reported a year later → outside the window, so it can’t be raised.","c":"ex"},{"t":"Do we refund the money provisionally while we investigate, or only once it’s settled?","c":"q"},{"t":"Do we block or freeze the card while the dispute is open, or leave it running?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a £400 charge the company doesn’t recognise, spotted this week","a charge that looks off"]},{"kw":"And","segs":["an approved person is the one reporting it","someone at the company flags it"]},{"kw":"When","segs":["they report it with a short note","someone flags it"]},{"kw":"Then","segs":["a dispute is opened and the company can track its status","it gets looked at"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a charge from over a year ago","an old charge"]},{"kw":"When","segs":["someone tries to report it now","someone complains late"]},{"kw":"Then","segs":["it’s refused as outside the time window, with the reason shown","it doesn’t work"]},{"kw":"And","segs":["both sides can see it was too late to raise","it just stops"]}]},"edge":{"label":"An edge case — the very last day allowed","lines":[{"kw":"Given","segs":["a charge reported on the very last day the window still allows","a charge reported around the deadline"]},{"kw":"When","segs":["an approved person reports it with a note","someone flags it in time"]},{"kw":"Then","segs":["the dispute is still opened, because the deadline hadn’t passed","the app decides for itself"]}]},"fail":"The in-time dispute is clear — but a stale claim, and one landing on the very last allowed day, you’ve left vague. The agent might wave through old claims, or reject a valid last-day one. Spell the refusal and the boundary out as clearly as the happy path.","success":"All three are spelled out — a dispute opened in time, a late one refused with a reason, and a last-day report that still counts. No stale claims through, and no valid ones lost."},"noguess":[{"t":"Can just anyone at the company raise a dispute? — Policy answered: no, only approved people.","c":"done"},{"t":"Is there a time limit to raise one? — Confirmed: yes, disputes must be raised within the set window.","c":"done"},{"t":"Do we let people attach evidence files at launch? — Deliberately not; a short note only for now.","c":"limit"},{"t":"How many disputes can be open at once? — Capped for launch; revisit if companies need more.","c":"limit"},{"t":"Do we refund the money provisionally while investigating? — Not decided; blocked until the disputes team rules on it.","c":"block"}],"overreach":[{"t":"A way to report a charge you don’t recognise within the time window.","bad":false},{"t":"Refunds the money instantly on tap, with no check at all.","bad":true,"why":"Instant no-questions refunds invite abuse and fraud — you never agreed to pay out before any review."},{"t":"Lets only approved people raise a dispute.","bad":false},{"t":"Lets any employee raise a dispute on the company’s behalf.","bad":true,"why":"You agreed only approved people can — opening it to everyone invites mistakes and mischief."},{"t":"Throws away the disputed charge’s details once it’s raised.","bad":true,"why":"With nothing kept, the dispute can’t be investigated or tracked — the opposite of what was asked."},{"t":"Lets the company follow the dispute’s status to resolution.","bad":false},{"t":"Blocks every card on the account the moment any dispute is raised.","bad":true,"why":"Freezing everything on one report is a decision nobody approved — it strands the whole company’s spending."}],"overreachSuccess":"Four traps caught: the instant no-questions refund, letting anyone raise a dispute, throwing away the details, and freezing every card at once. The draft is safe now.","slices":[{"t":"Let an approved person raise a dispute and see it opened, end to end.","bad":false},{"t":"Add the time-window check so late reports are refused clearly.","bad":false},{"t":"Let the company track a dispute’s status through to resolution.","bad":false},{"t":"Build the dispute database first, the reporting screen next week, the status tracking the week after.","bad":true,"why":"Cut by technical layer — no piece lets a company actually report anything on its own."},{"t":"Ship the report button now; add who’s-allowed and the time limit later.","bad":true,"why":"Leaving out the checks that stop abuse and stale claims — the parts that keep it honest."},{"t":"Split it into a separate piece for each field of the report form.","bad":true,"why":"So small that joining them up costs more than any single field adds."}],"slicesSuccess":"Three pieces, each something a company could actually use, each small enough to check on its own.","premortem":[{"t":"The company disputes a charge but can’t tell if anyone is working on it.","bad":false},{"t":"A genuine fraudulent charge is reported a day too late and can’t be raised.","bad":false},{"t":"A dispute is raised by mistake and there’s no clean way to withdraw it.","bad":false},{"t":"The card keeps being used while the dispute is open and loses more money.","bad":false},{"t":"The dispute button is a slightly different green from the rest.","bad":true,"why":"A cosmetic nit, not a reason the change fails."},{"t":"The support line has a longer queue on Monday mornings.","bad":true,"why":"Outside this change’s control — noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the untracked dispute, the report a day too late, the mistaken claim, the card still bleeding money. Each becomes a safeguard before a thing is built."},{"id":"freeze-card","title":"Freeze a lost company card","short":"letting a company freeze a lost company card straight away","ticket":"„Let a company freeze a lost company card instantly.“","hookBuild":["A big „freeze card“ button.","It only takes effect tomorrow, so a lost card keeps spending all night. You said instant; I heard eventually.","It cancels every subscription paid on that card, no warning.","Anyone at the company can freeze anyone’s card, including their boss’s.","Bonus: it never tells the cardholder their card was frozen, so they find out at the till. You’re welcome."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide what a freeze really stops.","map":[{"t":"As a company I want to freeze a lost card straight away so no one can spend on it.","c":"goal"},{"t":"The freeze takes effect the instant it’s confirmed, not later.","c":"rule"},{"t":"Only approved people can freeze a card, and the cardholder is told it happened.","c":"rule"},{"t":"A frozen card can be unfrozen if it turns up, or a replacement ordered if it’s gone for good.","c":"rule"},{"t":"A card reported lost and frozen → the next attempted payment on it is stopped.","c":"ex"},{"t":"The card turns up → it’s unfrozen and works again.","c":"ex"},{"t":"What happens to payments already in flight and to regular subscriptions when we freeze it?","c":"q"},{"t":"When someone orders a replacement, do subscriptions move to the new card automatically or not?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a company card reported lost","a card that’s gone missing"]},{"kw":"And","segs":["an approved person is the one freezing it","someone deals with it"]},{"kw":"When","segs":["they confirm the freeze","someone freezes it"]},{"kw":"Then","segs":["the freeze takes effect at once and the cardholder is told","it gets frozen"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a card that has just been frozen","a frozen card"]},{"kw":"When","segs":["someone tries to pay with it","someone uses it"]},{"kw":"Then","segs":["the payment is declined and the reason is clear","it doesn’t go through"]}]},"edge":{"label":"An edge case — a payment landing at the freeze instant","lines":[{"kw":"Given","segs":["a lost card being frozen at the same instant a payment is attempted on it","a card being used right as it’s dealt with"]},{"kw":"When","segs":["the freeze is confirmed","two things happen at once"]},{"kw":"Then","segs":["the freeze applies from that instant and the payment attempted after it is stopped","the app decides for itself"]},{"kw":"And","segs":["it isn’t left unclear which happened first","it all works out"]}]},"fail":"The instant freeze is clear — but the decline afterwards, and a payment landing at the very instant of the freeze, you’ve left vague. The agent might let the in-flight payment through, or leave it in limbo. Spell the decline and the simultaneous case out as clearly as the happy path.","success":"All three are spelled out — the instant freeze, a clear decline at the till, and the payment attempted right at the freeze instant that’s stopped. No confusion, no limbo."},"noguess":[{"t":"Does the freeze take effect straight away? — Confirmed: yes, the instant it’s applied.","c":"done"},{"t":"Can just anyone freeze a card? — Policy answered: no, only approved people.","c":"done"},{"t":"Do we allow freeze and unfreeze as often as they like at launch? — Kept simple for now; freeze and one unfreeze, revisit later.","c":"limit"},{"t":"Do we order the replacement in the same step? — Not at launch; freeze first, order separately for now.","c":"limit"},{"t":"What happens to regular subscriptions on a frozen card? — Not decided; blocked until the cards team rules on it.","c":"block"}],"overreach":[{"t":"A freeze that takes effect the instant it’s confirmed.","bad":false},{"t":"Only applies the freeze overnight in the next batch.","bad":true,"why":"You said instant — a lost card that keeps spending all night is exactly the harm this was meant to stop."},{"t":"Tells the cardholder their card has been frozen.","bad":false},{"t":"Freezes silently and never tells the cardholder.","bad":true,"why":"The cardholder finds out at the till with no way to pay — a control and a courtesy you were told to keep."},{"t":"Cancels every subscription on the card the moment it’s frozen.","bad":true,"why":"Wiping out subscriptions with no warning is a decision nobody approved — it breaks services the company relies on."},{"t":"Lets an approved person unfreeze the card if it turns up.","bad":false},{"t":"Lets any employee freeze any other person’s card.","bad":true,"why":"You agreed only approved people can — letting anyone freeze anyone invites mischief and stranded staff."}],"overreachSuccess":"Four traps caught: the overnight-only freeze, the silent cardholder, the wiped subscriptions, and anyone freezing anyone. The draft is safe now.","slices":[{"t":"Freeze a card instantly and stop the next payment, end to end.","bad":false},{"t":"Let an approved person unfreeze a card that turns up.","bad":false},{"t":"Order a replacement card when the old one is gone for good.","bad":false},{"t":"Build the card database change first, the freeze button next week, the actual blocking the week after.","bad":true,"why":"Cut by technical layer — no piece actually stops a payment on its own."},{"t":"Ship the freeze now; add who’s-allowed and telling the cardholder later.","bad":true,"why":"Leaving out the controls that stop misuse and keep people informed — the parts that cause trouble."},{"t":"Split it into a separate piece for freezing, for the confirmation text, for the icon and for the tooltip.","bad":true,"why":"So finely cut that coordinating the pieces costs more than they add."}],"slicesSuccess":"Three pieces, each something a company could actually use, each small enough to check on its own.","premortem":[{"t":"The freeze lags by minutes and a thief spends in the gap.","bad":false},{"t":"A card is frozen but a rent or payroll payment on it fails silently.","bad":false},{"t":"Someone freezes the wrong card and blocks a colleague mid-trip.","bad":false},{"t":"The cardholder is never told, and keeps trying to pay in front of clients.","bad":false},{"t":"The freeze button could be a bit bigger on small screens.","bad":true,"why":"A polish detail, not a reason the change fails."},{"t":"The card printer at the supplier is slow this week.","bad":true,"why":"Outside this change’s control — noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the freeze lag, the failed payroll, the wrong card frozen, the cardholder left in the dark. Each becomes a safeguard before a thing is built."},{"id":"send-payment","title":"Send a one-off payment","short":"letting a company send money to a single recipient","ticket":"„Let a company send money to a single recipient.“","hookBuild":["A „send money“ form with a name, account number and amount.","It sends the moment you tap, with no check on whether the account details are right — a typo just ships the money to a stranger.","It has no limit, so a slipped zero sends ten times as much.","It skips the second-person approval for big amounts entirely.","Bonus: if there aren’t enough funds, I overdraw the account to force it through. You’re welcome."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide whether the money reaches the right place.","map":[{"t":"As a company I want to send money to one recipient so I can pay them without a whole batch.","c":"goal"},{"t":"We check the recipient’s name matches the account before the money goes.","c":"rule"},{"t":"Payments above a set amount need a second person to approve.","c":"rule"},{"t":"We never send more than the account holds — no forcing it into overdraft unasked.","c":"rule"},{"t":"A £5,000 payment with matching details, approved by a second person → sent.","c":"ex"},{"t":"The name doesn’t match the account → the payment is paused and flagged before anything moves.","c":"ex"},{"t":"Is there a short window to cancel a payment just after it’s sent, or is it final at once?","c":"q"},{"t":"For scheduled payments, do we check the funds now or on the day it’s due?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a £5,000 payment with the recipient’s details checked","some money to send"]},{"kw":"And","segs":["a second person approves it, as the amount needs","someone signs it off"]},{"kw":"When","segs":["the payment is sent","someone sends it"]},{"kw":"Then","segs":["the money goes to the right recipient","the money moves"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a payment where the name doesn’t match the account","an odd-looking payment"]},{"kw":"When","segs":["the company tries to send it","they hit send"]},{"kw":"Then","segs":["it’s paused and flagged before any money moves","it gets stopped"]},{"kw":"And","segs":["the company sees why it was paused before deciding what to do","it gets sorted"]}]},"edge":{"label":"An edge case — exactly the whole balance","lines":[{"kw":"Given","segs":["a payment for exactly the whole balance in the account, leaving nothing","a payment for a big chunk of the money"]},{"kw":"When","segs":["the company sends it, with the checks passed","someone sends it"]},{"kw":"Then","segs":["it goes through, because the account isn’t pushed past zero into overdraft","the app decides for itself"]}]},"fail":"The checked payment is clear — but a name mismatch, and a payment for exactly the whole balance, you’ve left vague. The agent might ship money to a stranger, or block a valid to-the-penny send. Spell the mismatch and the boundary out as clearly as the happy path.","success":"All three are spelled out — a checked, approved payment, a mismatch paused before money moves, and an exact-balance payment that goes through without an overdraft. No money lost to a typo, and none blocked for no reason."},"noguess":[{"t":"Do big payments need a second person to approve? — Confirmed: yes, above the set amount.","c":"done"},{"t":"Do we check the recipient’s name against the account? — Confirmed: yes, before the money goes.","c":"done"},{"t":"Do we support scheduling for a future date at launch? — Deliberately not; send-now only for now.","c":"limit"},{"t":"What’s the highest single payment allowed? — Capped for launch; raise later if needed.","c":"limit"},{"t":"Is there a short window to cancel just after sending? — Not decided; blocked until the payments team confirms.","c":"block"}],"overreach":[{"t":"A form that checks the recipient’s name against the account before sending.","bad":false},{"t":"Sends the moment you tap, with no check on the account details.","bad":true,"why":"One typo ships the money to a stranger with no way back — the name check was the whole point."},{"t":"Asks a second person to approve payments above the set amount.","bad":false},{"t":"Skips the second-person approval for large amounts.","bad":true,"why":"You agreed big payments need two people — dropping it lets one person move large sums alone."},{"t":"Overdraws the account to push a payment through when funds are short.","bad":true,"why":"Forcing an unasked overdraft racks up fees and debt nobody approved."},{"t":"Stops and flags a payment when the name doesn’t match.","bad":false},{"t":"Removes the limit so any amount can go in one payment.","bad":true,"why":"No cap means a slipped zero sends ten times too much — the limit was there to catch exactly that."}],"overreachSuccess":"Four traps caught: no account check, the skipped approval, the forced overdraft, and the rem

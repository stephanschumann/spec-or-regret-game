<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Contract — The Rework Game</title>
<style>
  :root{
    --bg:#0e1116;--panel:#161b22;--panel2:#1c232d;--line:#2a323d;
    --text:#e6edf3;--muted:#9aa7b4;--dim:#6b7683;
    --blue:#4c8dff;--green:#3fb950;--amber:#f0a531;--red:#f85149;--purple:#b98bff;
    --shadow:0 10px 40px rgba(0,0,0,.45);--r:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{background:var(--bg)}
  body{background:radial-gradient(1200px 700px at 80% -10%, #1a2432 0%, var(--bg) 60%) no-repeat, var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh;}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:80}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px 90px}
  .hud{position:sticky;top:0;z-index:60;background:rgba(14,17,22,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .hud-in{max-width:1080px;margin:0 auto;padding:10px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{font-weight:800;letter-spacing:.14em;font-size:13px;text-transform:uppercase}
  .brand b{color:var(--amber)}
  .progress{display:flex;gap:6px;align-items:center}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--line);transition:.3s}
  .dot.done{background:var(--green)} .dot.now{background:var(--amber);box-shadow:0 0 0 4px rgba(240,165,49,.18)}
  .hud-spacer{flex:1}
  .clock{display:inline-flex;flex-direction:column;align-items:flex-end;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:6px 13px;min-width:104px}
  .clock .lab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:5px}
  .clock .val{font-size:19px;font-weight:800;line-height:1.1}
  .clock.analysis .val{color:var(--green)} .clock.analysis .lab .free{color:var(--green);font-weight:700}
  .clock.cycle{border-color:#3a2a1e} .clock.cycle .val{color:var(--amber)}
  .clock.cycle.hit{animation:shake .4s} @keyframes shake{0%,100%{transform:none}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .chip{display:inline-flex;align-items:center;gap:7px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text)}
  .chip:hover{border-color:var(--dim)} .chip .n{color:var(--amber);font-weight:800}
  .stage{margin-top:32px;animation:rise .45s cubic-bezier(.2,.7,.2,1)}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .kicker{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);font-weight:700}
  .mcode{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);font-weight:700;margin-bottom:6px}
  h1.title{font-size:33px;line-height:1.15;margin:6px 0 10px;font-weight:800;letter-spacing:-.01em}
  .setup{font-size:17px;color:var(--muted);max-width:820px}
  .setup .ticket{display:block;margin-top:14px;background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:12px;padding:14px 16px;color:var(--text);font-size:16px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;margin-top:22px;box-shadow:var(--shadow)}
  .btn{appearance:none;border:0;border-radius:12px;padding:14px 22px;font-size:16px;font-weight:700;cursor:pointer;transition:.15s;font-family:inherit}
  .btn.primary{background:linear-gradient(180deg,#5a97ff,#3f7ff0);color:#fff;box-shadow:0 6px 20px rgba(63,127,240,.35)} .btn.primary:hover{transform:translateY(-1px)}
  .btn.go{background:linear-gradient(180deg,#42c15a,#2ea043);color:#fff;box-shadow:0 6px 20px rgba(46,160,67,.35)} .btn.go:hover{transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)} .btn.ghost:hover{color:var(--text);border-color:var(--dim)}
  .btn.big{background:linear-gradient(180deg,#f0a531,#e08a1e);color:#241a06;font-size:19px;padding:18px 30px;box-shadow:0 8px 28px rgba(240,165,49,.4)} .btn.big:hover{transform:translateY(-2px)}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:22px}
  .hintline{font-size:13px;color:var(--dim);margin:2px 0 16px}
  .bank{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px}
  .item{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:11px 14px;font-size:15px;cursor:pointer;user-select:none;max-width:100%;transition:.15s}
  .item:hover{border-color:var(--dim)} .item.assigned{opacity:.35;pointer-events:none} .item.picked{border-color:var(--amber);box-shadow:0 0 0 2px rgba(240,165,49,.25)}
  .buckets{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  .bucket{background:var(--panel2);border:1.5px dashed var(--line);border-radius:14px;padding:14px;min-height:120px;transition:.15s}
  .bucket.over{border-color:var(--amber);background:#20272f}
  .bucket h4{margin:0 0 3px;font-size:15px} .bucket .bh{font-size:12px;color:var(--dim);margin-bottom:10px}

  .bucket .slot .x{color:var(--dim);cursor:pointer;font-weight:800;flex-shrink:0} .bucket .slot .x:hover{color:var(--red)}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;gap:13px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.13s}
  .opt:hover{border-color:var(--dim)}
  .opt .box{width:22px;height:22px;border-radius:7px;border:2px solid var(--dim);flex-shrink:0;margin-top:1px;display:grid;place-items:center;font-size:14px;color:#fff;transition:.13s}
  .opt.sel{border-color:var(--amber);background:#20262e} .opt.sel .box{background:var(--amber);border-color:var(--amber);color:#241a06}
  .opt .txt{font-size:15.5px}
  .scenario{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
  .scenario h4{margin:0 0 12px;font-size:15px;display:flex;align-items:center;gap:9px}
  .tag{font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:999px;font-weight:800}
  .tag.win{background:rgba(63,185,80,.16);color:#8ce39a} .tag.fail{background:rgba(248,81,73,.16);color:#ff9c95} .tag.edge{background:rgba(185,139,255,.16);color:#cbb0ff}
  .slot-key{color:var(--blue)!important}
  .slot-line{display:flex;gap:12px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .slot-key{width:130px;font-weight:700;color:var(--muted);font-size:14px;flex-shrink:0}
  .segs{display:flex;gap:8px;flex-wrap:wrap;flex:1}
  .seg{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font-size:14px;cursor:pointer;transition:.13s}
  .seg:hover{border-color:var(--dim)} .seg.sel{border-color:var(--blue);background:#1b2635;box-shadow:0 0 0 2px rgba(76,141,255,.22)}
  .agent{margin-top:22px;border-radius:16px;padding:20px 22px;border:1px solid var(--line);background:var(--panel);animation:rise .4s}
  .agent.fail{border-color:#5a2a29;background:linear-gradient(180deg,#241618,#161b22)}
  .agent.win{border-color:#265c33;background:linear-gradient(180deg,#14231a,#161b22)}
  .agent .who{display:flex;align-items:center;gap:11px;font-weight:800;font-size:15px;margin-bottom:10px}
  .agent .ava{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .agent.fail .ava{background:rgba(248,81,73,.16)} .agent.win .ava{background:rgba(63,185,80,.16)}
  .agent .body{font-size:15.5px} .agent .body ul{margin:10px 0 0;padding-left:20px} .agent .body li{margin:5px 0;color:var(--muted)}
  .agent .punch{margin-top:14px;font-size:15px;font-style:italic;border-top:1px solid var(--line);padding-top:12px}
  .working{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:15px}
  .spinner{width:20px;height:20px;border:3px solid var(--line);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite} @keyframes spin{to{transform:rotate(360deg)}}
  .rework{margin-top:16px;border:1px solid #3a2a1e;background:linear-gradient(180deg,#231a10,#161b22);border-radius:14px;padding:16px 18px}
  .rework .rh{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .rticket{display:flex;justify-content:space-between;gap:12px;align-items:center;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:9px;padding:10px 13px;margin-bottom:8px;animation:slidein .35s}
  @keyframes slidein{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}
  .rticket .d{font-weight:800;color:var(--amber);white-space:nowrap} .rework .sum{margin-top:6px;font-size:14px;color:var(--text);font-weight:700;text-align:right}
  .debrief{margin-top:18px;border:1px solid var(--line);border-left:4px solid var(--green);background:var(--panel);border-radius:14px;padding:18px 20px;animation:rise .4s}
  .debrief .lab{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--green);font-weight:800}
  .debrief .take{font-size:17px;font-weight:700;margin:6px 0 12px}
  .debrief .q{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:13px 15px;font-size:15px;color:var(--muted)} .debrief .q b{color:var(--text)}
  .badgewon{display:inline-flex;align-items:center;gap:10px;margin-top:14px;background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.4);border-radius:999px;padding:8px 16px;font-weight:700;font-size:14px}
  .analysiswon{display:inline-flex;align-items:center;gap:8px;margin-top:14px;margin-left:10px;background:rgba(63,185,80,.08);border:1px dashed rgba(63,185,80,.4);border-radius:999px;padding:8px 14px;font-weight:600;font-size:13px;color:#8ce39a}
  .fork{margin-top:22px}
  .fork .situation{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--amber);border-radius:14px;padding:18px 20px;font-size:16px}
  .fork .choices{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  .fork .choice{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:20px;cursor:pointer;transition:.15s}
  .fork .choice:hover{transform:translateY(-2px);border-color:var(--dim)}
  .fork .choice.tempt{border-color:rgba(240,165,49,.5)} .fork .choice.tempt:hover{box-shadow:0 8px 26px rgba(240,165,49,.2)}
  .fork .choice.solid{border-color:rgba(63,185,80,.5)} .fork .choice.solid:hover{box-shadow:0 8px 26px rgba(63,185,80,.2)}
  .fork .choice .ce{font-size:26px} .fork .choice h3{margin:8px 0 6px;font-size:18px} .fork .choice p{margin:0;font-size:14px;color:var(--muted)}
  .fork .choice .feel{display:inline-block;margin-top:12px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
  .fork .choice.tempt .feel{color:var(--amber)} .fork .choice.solid .feel{color:#8ce39a}
  @media(max-width:640px){.fork .choices{grid-template-columns:1fr}}
  .hero{text-align:center;padding:38px 0 6px}
  .hero .logo{font-size:13px;letter-spacing:.24em;text-transform:uppercase;color:var(--amber);font-weight:800}
  .hero h1{font-size:54px;line-height:1;margin:14px 0 8px;font-weight:900;letter-spacing:-.02em}
  .hero .tag{font-size:20px;color:var(--muted);max-width:660px;margin:0 auto}
  .cards2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:26px}
  @media(max-width:640px){.cards2{grid-template-columns:1fr}}
  .clockcard{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:20px}
  .clockcard.green{border-color:rgba(63,185,80,.4)} .clockcard.amber{border-color:rgba(240,165,49,.4)}
  .clockcard .e{font-size:26px} .clockcard h3{margin:8px 0 4px;font-size:18px} .clockcard p{margin:0;font-size:14.5px;color:var(--muted)}
  .clockcard .badge2{display:inline-block;margin-top:10px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:999px}
  .clockcard.green .badge2{background:rgba(63,185,80,.14);color:#8ce39a} .clockcard.amber .badge2{background:rgba(240,165,49,.14);color:var(--amber)}
  .scenlist{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;max-height:340px;overflow:auto;padding:2px}
  @media(max-width:640px){.scenlist{grid-template-columns:1fr}}
  .scenopt{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;cursor:pointer;transition:.13s}
  .scenopt:hover{border-color:var(--dim)} .scenopt.sel{border-color:var(--amber);background:#20262e;box-shadow:0 0 0 2px rgba(240,165,49,.22)}
  .scenopt .st{font-weight:700;font-size:15px} .scenopt .ss{font-size:13px;color:var(--muted);margin-top:2px}
  .rewind{text-align:center;padding:26px 0} .rewind .ic{font-size:44px} .rewind h1{font-size:34px;margin:10px 0 8px;font-weight:900} .rewind p{font-size:17px;color:var(--muted);max-width:640px;margin:0 auto}
  .overlay{position:fixed;inset:0;background:rgba(6,8,11,.72);backdrop-filter:blur(4px);z-index:90;display:none;align-items:center;justify-content:center;padding:24px} .overlay.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;max-width:620px;width:100%;padding:26px;max-height:84vh;overflow:auto;box-shadow:var(--shadow)}
  .modal h2{margin:0 0 4px;font-size:22px} .modal .sub{color:var(--muted);font-size:14px;margin-bottom:16px} .modal .close{float:right;cursor:pointer;color:var(--dim);font-size:22px;font-weight:800;line-height:1}
  .collect{display:flex;flex-direction:column;gap:10px}
  .spec{display:flex;gap:13px;align-items:flex-start;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:13px 15px} .spec .e{font-size:22px;flex-shrink:0} .spec h4{margin:0 0 2px;font-size:15px} .spec p{margin:0;font-size:13.5px;color:var(--muted)}
  .facil{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:16px;display:none} .facil.show{display:block} .facil h4{margin:0 0 8px;font-size:14px;color:var(--amber);letter-spacing:.05em;text-transform:uppercase} .facil p{margin:8px 0;font-size:14px;color:var(--muted)} .facil .tline{color:var(--text);font-weight:700}
  .final{text-align:center;padding:24px 0} .final .stamp{display:inline-block;border:3px solid var(--green);color:var(--green);font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:11px 24px;border-radius:12px;transform:rotate(-3deg);font-size:20px;margin-bottom:20px}
  .final h1{font-size:40px;margin:6px 0;font-weight:900;letter-spacing:-.01em} .final .lead{font-size:18px;color:var(--muted);max-width:700px;margin:8px auto 0}
  .score{max-width:680px;margin:26px auto 0;text-align:left} .bar{margin:12px 0} .bar .bl{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px} .bar .bl b{font-weight:800}
  .bar .track{height:26px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden} .bar .fill{height:100%;transition:width 1s cubic-bezier(.2,.7,.2,1)}
  .bar.rushed .fill{background:linear-gradient(90deg,#f0a531,#f85149)} .bar.ready .fill{background:linear-gradient(90deg,#3fb950,#2ea043)}
  .lbar{margin:14px 0} .lbar .ll{display:flex;justify-content:space-between;gap:10px;font-size:14px;margin-bottom:5px} .lbar .ll b{font-weight:800;white-space:nowrap}
  .lbar .track2{height:30px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .lbar .fillL{height:100%;display:flex;width:0;transition:width 1s cubic-bezier(.2,.7,.2,1)}
  .lbar .seg-a{background:linear-gradient(90deg,#3fb950,#2ea043);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#08210f;overflow:hidden;white-space:nowrap}

  .final .msg .t .e{font-size:20px} .final .msg .t b{display:block;margin-bottom:2px} .final .msg .t span{color:var(--muted);font-size:14.5px}

<body>
<canvas id="confetti"></canvas>
<div class="hud"><div class="hud-in">
  <div class="brand">AGENT&nbsp;<b>CONTRACT</b></div>
  <div class="progress" id="progress"></div>
  <div class="hud-spacer"></div>
  <div class="clock analysis" title="Time spent getting ready. It does not count against you."><div class="lab">🧭 Analysis <span class="free">· free</span></div><div class="val" id="anaVal">0d</div></div>
  <div class="clock cycle" id="cycleClock" title="Starts when you hand work over to build. Avoidable loops add to it. Lower is better."><div class="lab">⏱️ Cycle time</div><div class="val" id="cycVal">0d</div></div>
  <div class="chip" id="reworkChip">🧾 Rework <span class="n" id="rwVal">0d</span></div>
  <div class="chip" id="badgeChip">🏅 <span class="n" id="badgeVal">0</span></div>
</div></div>
<div class="wrap"><div id="stageHost"></div></div>
<div class="overlay" id="ovBadges"><div class="modal"><span class="close" data-close>×</span><h2>Your badges</h2><div class="sub">One badge for each readiness step you master.</div><div class="collect" id="badgeList"></div></div></div>
<div class="overlay" id="ovRework"><div class="modal"><span class="close" data-close>×</span><h2>Rework log</h2><div class="sub">Every avoidable loop you triggered by starting before you were ready — and the cycle-time days it cost.</div><div class="collect" id="rwList"></div></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
var SCENARIOS = [{"id":"bulk-suppliers","title":"Bulk supplier payments","short":"paying all your suppliers at once from one uploaded file","ticket":"„Let companies pay all their suppliers at once by uploading a file.“","hookBuild":["An „upload a file“ box that pays every line the moment the file lands.","If one line is broken, I skip the check and just pay the lines I can read — some suppliers get paid, some don’t, and nobody is told which.","I left out the „approve before sending“ step — you said upload, not approve.","The same file can be uploaded again and again; each time it pays everyone all over. You didn’t say to stop that.","I ignored any per-line and total limit and switched it on for every company. Bonus: I auto-added any new names in the file as brand-new suppliers. You’re welcome."],"mapSuccess":"The map holds. The goal, the rules that stop double-pays and blind sends, the everyday case and the broken-line case — and the open questions about limits and partial batches.","map":[{"t":"As a finance team I want to pay all our suppliers from one uploaded file so I don’t enter each payment by hand.","c":"goal"},{"t":"Nothing is sent until a person reviews the whole file and approves the batch.","c":"rule"},{"t":"The same file uploaded twice is spotted, so no one is paid a second time.","c":"rule"},{"t":"The whole file is checked first; a broken line is flagged before any payment goes out.","c":"rule"},{"t":"A file of 200 clean supplier lines, approved by the finance lead → all 200 paid, and a receipt lists every one.","c":"ex"},{"t":"One line has no account number → that line is held and shown as an error, and the batch waits for a decision.","c":"ex"},{"t":"Does the limit apply to each single line, to the file’s total, or to both?","c":"q"},{"t":"If some lines are fine and one is broken, do we pay the good ones now or hold the whole file until it’s fixed?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a file of 200 supplier lines that all read correctly","a file with some suppliers in it"]},{"kw":"And","segs":["the finance lead has reviewed the whole batch and approved it","someone has had a look at it"]},{"kw":"When","segs":["the approved batch is sent","the file gets processed"]},{"kw":"Then","segs":["all 200 are paid exactly once and a receipt lists every payment","the suppliers get their money"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a file where one line has no account number","a file that isn’t quite right"]},{"kw":"When","segs":["the team uploads it and asks to send","the file gets processed"]},{"kw":"Then","segs":["the broken line is held and flagged, and nothing is sent until the team decides","it sorts itself out"]}]},"edge":{"label":"An edge case — the same account twice in one file","lines":[{"kw":"Given","segs":["an approved file where two separate lines pay the very same account number","a file with a couple of similar lines"]},{"kw":"When","segs":["the batch is sent","the file goes through"]},{"kw":"Then","segs":["both lines are paid as two separate payments, neither merged into one nor silently dropped","the duplicate is handled"]},{"kw":"And","segs":["the receipt shows both payments to that account clearly","the receipt looks fine"]}]},"fail":"The clean batch is clear. But the moment one line is broken, or the same account turns up twice in one file, you’ve left it vague. The agent will guess — dropping a supplier or quietly merging two payments into one. Spell the „goes wrong“ case and the awkward case out as clearly as the normal one.","success":"All three are spelled out — a clean batch paid once with a receipt, a broken line held and flagged, and two lines to the same account each paid in full instead of merged or dropped. The agent has no room to improvise."},"noguess":[{"t":"Does the same file uploaded twice pay everyone again? — Payments team answered: we detect the repeat and block it.","c":"done"},{"t":"Can the total sent ever be more than the file adds up to? — Finance confirmed: never.","c":"done"},{"t":"Which file formats do we accept at launch? — We deliberately start with one standard format; more later.","c":"limit"},{"t":"Do we support scheduling a batch for a future date? — Out of scope for now; send-on-approval only, revisit later.","c":"limit"},{"t":"If some lines are good and one is broken, do we pay the good ones or hold the whole file? — Not decided yet; blocked until finance sets the rule.","c":"block"}],"overreach":[{"t":"An upload box that shows the whole batch for review before anything is sent.","bad":false},{"t":"Pays every line the instant the file is uploaded, before anyone approves it.","bad":true,"why":"You agreed nothing is sent until a person approves — this pays out with no review at all."},{"t":"Spots the same file uploaded twice and refuses to pay everyone again.","bad":false},{"t":"Silently skips any broken line and pays the rest, without telling the team.","bad":true,"why":"A dropped supplier no one is told about — the exact silent failure the rules were meant to prevent."},{"t":"Ignores the per-line and total limits and sends whatever the file says.","bad":true,"why":"Removing the limits means one bad file can drain the account — a control nobody approved dropping."},{"t":"Holds a broken line, flags it, and waits for the team to decide.","bad":false},{"t":"Auto-creates a brand-new supplier for any name in the file it doesn’t recognise.","bad":true,"why":"Invented behaviour — a typo becomes a payment to an account nobody checked."}],"overreachSuccess":"Four traps caught: paying before approval, the silently dropped line, the ignored limits, and the auto-created suppliers. The draft is safe now.","slices":[{"t":"Get one clean file uploaded, reviewed, approved and paid, end to end.","bad":false},{"t":"Handle the broken-line and file-error cases so nothing is silently dropped.","bad":false},{"t":"Add the duplicate-file check so no one is paid twice.","bad":false},{"t":"Build the file-reader first, the review screen next week, the paying part the week after.","bad":true,"why":"Cut by technical layer — no piece pays a real supplier on its own."},{"t":"Ship the paying now; add the approval step and the limits later if there’s time.","bad":true,"why":"Leaving out the approval and limits — the parts that stop a bad file draining the account."},{"t":"Split it into one tiny piece per column in the file.","bad":true,"why":"So small that stitching the columns back together costs more than it delivers."}],"slicesSuccess":"Three pieces, each one a finance team could actually use, each small enough to check on its own.","premortem":[{"t":"The same file is uploaded twice and every supplier is paid a second time.","bad":false},{"t":"One broken line is silently dropped and a supplier goes unpaid for weeks.","bad":false},{"t":"A file’s total quietly exceeds the account balance and half the batch bounces.","bad":false},{"t":"The receipt doesn’t match what was actually sent, and no one can tell who got paid.","bad":false},{"t":"The upload button is a slightly different shade of blue than the rest of the page.","bad":true,"why":"A polish detail, not a reason the change would fail."},{"t":"The company’s internet drops for an afternoon across the whole office.","bad":true,"why":"Not something this change can control — pure noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the double-paid batch, the dropped supplier, the overdrawn account, the receipt that doesn’t match. Each becomes a safeguard before a single thing is built."},{"id":"payroll","title":"Run payroll","short":"paying everyone’s salary in one go","ticket":"„Let a company pay everyone’s salary in one go.“","hookBuild":["A „run payroll“ button that pays every employee the moment it’s pressed.","If payday lands on a Saturday, it pays whenever — could be a day late, could be never. You didn’t say to move it to a working day.","If one person’s bank details are wrong, I stop the entire run so nobody gets paid. Seemed safest.","I emailed everyone’s full salary to the whole company in one list, to be transparent. You said pay everyone.","I ignored whether there’s enough in the account and fired off every payment anyway; the ones that bounce, bounce. Bonus: I paid the gross amount, before tax. You’re welcome."],"mapSuccess":"The map holds. The goal, the rules on net pay, privacy and moving payday, the everyday run and the wrong-details case — and the open questions about short funds and retries.","map":[{"t":"As a company I want to pay every employee’s salary in one run so I don’t pay each person by hand each month.","c":"goal"},{"t":"Each person is paid their net amount — what’s left after tax — not the gross.","c":"rule"},{"t":"Salary figures are kept private; no one sees another person’s pay.","c":"rule"},{"t":"If payday falls on a weekend or holiday, the run moves to the nearest working day so no one is paid late.","c":"rule"},{"t":"50 employees, enough money in the account, payday on a Wednesday → everyone paid their net salary that day.","c":"ex"},{"t":"One person’s account number is wrong → that one payment is held and flagged, and the other 49 still go out.","c":"ex"},{"t":"If there isn’t enough for the whole run, do we pay no one, or pay in an order the company sets?","c":"q"},{"t":"When a held payment is fixed, do we retry it automatically or wait for the team to release it?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["50 employees and enough money in the account for the whole run","a company with staff to pay"]},{"kw":"And","segs":["payday is a normal working Wednesday","it’s just an ordinary day"]},{"kw":"When","segs":["the run is approved","payroll happens"]},{"kw":"Then","segs":["everyone is paid their net salary that day, and no one can see anyone else’s pay","the staff get paid"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["one employee’s account number is wrong","something is off with an employee"]},{"kw":"When","segs":["the run is sent","the run goes ahead"]},{"kw":"Then","segs":["that one payment is held and flagged while the other 49 still go out","it gets handled"]}]},"edge":{"label":"An edge case — payday lands on a weekend","lines":[{"kw":"Given","segs":["a run whose payday falls on a Saturday","a run around the weekend"]},{"kw":"And","segs":["the nearest working day before it is the Friday","there’s a day close by"]},{"kw":"When","segs":["the run is due","the date comes up"]},{"kw":"Then","segs":["everyone is paid on the Friday so no one is paid late","it works out timing-wise"]}]},"fail":"The normal run is clear. But when one person’s details are wrong, or payday lands on a Saturday, you’ve left it vague. The agent will guess — stalling the whole run over one typo, or paying a day late. Spell the „goes wrong“ case and the weekend case out as clearly as the normal one.","success":"All three are spelled out — a clean run where everyone is paid their net salary privately, one wrong account held while the other 49 go out, and a weekend payday moved to the Friday so no one is late. The agent has no room to improvise."},"noguess":[{"t":"Do we pay the net amount or the gross? — Finance answered: net, always.","c":"done"},{"t":"Can one person see another’s salary? — Confirmed: never; each person only sees their own.","c":"done"},{"t":"Do we support paying staff in other countries at launch? — We deliberately start with home-country accounts; others later.","c":"limit"},{"t":"Do we handle mid-month bonuses in the same run? — Out of scope for now; monthly salary only, revisit later.","c":"limit"},{"t":"If there isn’t enough for the whole run, do we pay no one or pay in a set order? — Not decided; blocked until finance sets the rule.","c":"block"}],"overreach":[{"t":"A payroll run that pays each person their net salary, privately.","bad":false},{"t":"Pays the gross amount, before tax is taken off.","bad":true,"why":"Everyone is overpaid and the tax is wrong — a mess to claw back and report."},{"t":"Moves the run to the nearest working day when payday is a weekend or holiday.","bad":false},{"t":"Emails a list of everyone’s salary to the whole company „for transparency“.","bad":true,"why":"Leaks the most sensitive data there is — a serious privacy breach that must never ship."},{"t":"Fires off every payment even when the account can’t cover the run, letting some bounce.","bad":true,"why":"You agreed to settle the short-funds rule first — this pays some and bounces others at random."},{"t":"Holds a payment with wrong bank details and flags it, paying everyone else.","bad":false},{"t":"Retries a held payment on its own, over and over, once details look changed.","bad":true,"why":"Invented behaviour — an automatic retry nobody approved could double-pay someone."}],"overreachSuccess":"Four traps caught: paying gross, the salary leak, paying past the balance, and the silent auto-retry. The draft is safe now.","slices":[{"t":"Get one clean run paying everyone their net salary, end to end.","bad":false},{"t":"Handle the wrong-details case so one bad account doesn’t stop the rest.","bad":false},{"t":"Add moving payday to a working day when it lands on a weekend or holiday.","bad":false},{"t":"Build the salary calculator first, the payment screen next week, the sending the week after.","bad":true,"why":"Cut by technical layer — no piece pays a single employee on its own."},{"t":"Ship the paying now; add the privacy protection and the funds check later.","bad":true,"why":"Leaving out the parts that keep salaries private and stop the account overdrawing."},{"t":"Split it into one tiny piece per employee.","bad":true,"why":"So small that coordinating the pieces costs more than running them together ever would."}],"slicesSuccess":"Three pieces, each one a company could actually run, each small enough to check on its own.","premortem":[{"t":"There isn’t enough in the account and the run pays some staff but not others.","bad":false},{"t":"One person’s wrong account number stops the whole run and nobody is paid.","bad":false},{"t":"A salary list is seen by someone who shouldn’t see it.","bad":false},{"t":"Payday lands on a holiday and everyone is paid a day late.","bad":false},{"t":"The payslip uses a font the finance team finds a bit dull.","bad":true,"why":"A cosmetic nit, not a reason the run would fail."},{"t":"The tax office changes the rules in three years’ time.","bad":true,"why":"Outside this change’s control and far in the future — noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the half-paid run, the whole run stalled by one typo, the leaked salaries, the late payday. Each becomes a safeguard before a single thing is built."},{"id":"four-eyes","title":"Second approver for large payments","short":"needing a second person to approve big payments","ticket":"„Require a second person to approve payments over a certain amount.“","hookBuild":["A second-approval step that kicks in on big payments.","I let the same person who set up the payment also approve it — one click, both roles. You said „a second person“, not a different one.","I never wrote down who approved what, so there’s no record of who signed off. You didn’t ask for a trail.","If a payment waits too long, I send it anyway once it „expires“, so nothing gets stuck. Seemed helpful.","I set the threshold to a number I picked myself and added an „urgent“ button that skips approval entirely. Bonus: anyone in the company can approve. You’re welcome."],"mapSuccess":"The map holds. The goal, the rules on separate approvers and a full record, the two-manager case and the can’t-approve-your-own case — and the open questions about the threshold and waiting.","map":[{"t":"As a company I want big payments to need a second person’s sign-off so no one can send large sums alone.","c":"goal"},{"t":"The person who set up the payment can never be the one who approves it.","c":"rule"},{"t":"Only named, allowed approvers can sign off — not just anyone in the company.","c":"rule"},{"t":"Every approval is recorded: who set it up, who approved, and when.","c":"rule"},{"t":"A payment above the threshold, set up by one manager and approved by another → it sends, with both names on record.","c":"ex"},{"t":"The only available approver is the person who created it → it can’t be approved, and it waits.","c":"ex"},{"t":"What exactly is the threshold amount, and does it count per payment or per day?","c":"q"},{"t":"If a payment waits too long, does it expire and cancel, or just keep waiting?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a payment above the threshold set up by one manager","a payment that seems large"]},{"kw":"When","segs":["a different, allowed approver signs off","someone approves it somehow"]},{"kw":"Then","segs":["it sends","the payment goes through"]},{"kw":"And","segs":["both names and the time are saved on record","the details are noted somewhere"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a payment whose only available approver is the person who created it","a payment with an approver problem"]},{"kw":"When","segs":["they try to approve their own payment","approval is attempted"]},{"kw":"Then","segs":["it’s refused and the payment waits for a different approver","it gets sorted"]}]},"edge":{"label":"An edge case — exactly on the threshold","lines":[{"kw":"Given","segs":["a payment for exactly the threshold amount, right where the second sign-off starts to apply","a payment of a fairly large size"]},{"kw":"When","segs":["one manager sets it up and a different approver reviews it","someone deals with it"]},{"kw":"Then","segs":["the second sign-off is still required, not skipped as if it were under the line","the app decides for itself"]},{"kw":"And","segs":["both names are still recorded","it’s logged somehow"]}]},"fail":"The two-manager case is clear. But when the only approver is the creator, or a payment lands exactly on the threshold, you’ve left it vague. The agent will guess — letting one person sign off alone, or waving through the amount right on the line. Spell the „goes wrong“ case and the on-the-line case out as clearly as the normal one.","success":"All three are spelled out — a big payment approved by a second, allowed person with both names on record, a self-approval firmly refused, and a payment exactly on the threshold still needing the second sign-off. The agent has no room to improvise."},"noguess":[{"t":"Can the person who created a payment also approve it? — Compliance answered: never.","c":"done"},{"t":"Do we keep a record of who approved each payment? — Confirmed: yes, a full trail is required.","c":"done"},{"t":"Do we support three approvers for the very largest payments at launch? — We deliberately start with two; more later.","c":"limit"},{"t":"Do approvers get a phone alert at launch? — Out of scope for now; they check the pending list, revisit later.","c":"limit"},{"t":"What exactly is the threshold and is it per payment or per day? — Not decided; blocked until finance sets the number.","c":"block"}],"overreach":[{"t":"A second-approval step that needs a different, allowed person to sign off.","bad":false},{"t":"Lets the person who set up the payment approve it themselves.","bad":true,"why":"Defeats the whole control — one person sends large sums alone, exactly what this was meant to stop."},{"t":"Records who set up each payment, who approved it, and when.","bad":false},{"t":"Sends a payment on its own once it has waited too long for approval.","bad":true,"why":"An unapproved payment going out because it timed out — the opposite of needing sign-off."},{"t":"Adds an „urgent“ button that skips the second approval entirely.","bad":true,"why":"A built-in way to bypass the control — invented and never approved."},{"t":"Refuses approval from anyone who isn’t a named approver.","bad":false},{"t":"Picks the threshold amount itself and applies it to every company.","bad":true,"why":"A made-up limit set with no sign-off — could wave through payments that should need a second person."}],"overreachSuccess":"Four traps caught: the self-approval, the timed-out auto-send, the urgent bypass, and the made-up threshold. The draft is safe now.","slices":[{"t":"Get a big payment needing a second, different approver working end to end.","bad":false},{"t":"Handle the case where the only approver is the creator, so it can’t be self-approved.","bad":false},{"t":"Add the full record of who approved what and when.","bad":false},{"t":"Build the approver list first, the pending screen next week, the sign-off the week after.","bad":true,"why":"Cut by technical layer — no piece actually approves a real payment on its own."},{"t":"Ship the second-approval flow now; add the „can’t approve your own“ rule and the record later.","bad":true,"why":"Leaving out the very rules that make the control mean anything."},{"t":"Split it into one tiny piece per button on the approval screen.","bad":true,"why":"So small that wiring the buttons together costs more than it delivers."}],"slicesSuccess":"Three pieces, each one a finance team could actually use, each small enough to check on its own.","premortem":[{"t":"One person sets up and approves the same large payment alone.","bad":false},{"t":"A payment sits waiting for approval past its deadline and misses the supplier’s cut-off.","bad":false},{"t":"There’s no record of who approved a payment when someone questions it later.","bad":false},{"t":"The threshold is set so high that big payments slip through with one signature.","bad":false},{"t":"The approve button sits slightly too close to the cancel button for one manager’s taste.","bad":true,"why":"A polish detail, not a reason the control would fail."},{"t":"The building’s front door lock is due for replacement next year.","bad":true,"why":"Nothing to do with this change — pure noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the self-approval, the missed cut-off, the missing record, the threshold set too high. Each becomes a safeguard before a single thing is built."},{"id":"company-cards","title":"Company cards with limits","short":"giving employees company cards with a monthly spending limit each","ticket":"„Give employees company cards with a monthly spending limit each.“","hookBuild":["A company card for every employee.","I never actually block spending at the limit — the number is just for show, so people can spend past it. You said „a limit“, not „stop at it“.","When someone leaves, their card keeps working; I don’t freeze it. You didn’t mention leavers.","I let every card buy anything anywhere, including things the company would never allow. You didn’t list blocked categories.","I set one shared limit for the whole company instead of per person and gave finance no way to see spending until the month ends. Bonus: I made every limit a nice round number I chose. You’re welcome."],"mapSuccess":"The map holds. The goal, the rules on blocking at the limit, freezing leavers and live visibility, the over-limit case and the leaver case — and the open questions about department limits and blocked categories.","map":[{"t":"As a company I want each employee to have a card with their own monthly limit so people can buy what they need without overspending.","c":"goal"},{"t":"When a card hits its limit, the next spend is blocked — the limit actually stops spending.","c":"rule"},{"t":"When someone leaves, their card can be frozen straight away so it can’t be used.","c":"rule"},{"t":"Finance can see spending on every card as it happens, not just at month end.","c":"rule"},{"t":"An employee with a £2,000 limit has spent £1,900 → smaller buys work; a £200 one is blocked.","c":"ex"},{"t":"An employee leaves and their card is frozen → the next attempt to use it is declined.","c":"ex"},{"t":"Does the limit sit per person, or is there also a shared limit per department on top?","c":"q"},{"t":"Which kinds of spending are blocked by default, and who can change that list?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["an employee with a £2,000 monthly limit who has spent £1,900","an employee with a card"]},{"kw":"And","segs":["finance can see this spending as it happens","finance keeps an eye on things"]},{"kw":"When","segs":["they try to spend another £50","they use the card"]},{"kw":"Then","segs":["it goes through because it stays within the limit","the card does its thing"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["an employee who has just left the company","an employee who is no longer around"]},{"kw":"When","segs":["someone tries to use their card","the card comes up"]},{"kw":"Then","segs":["it’s declined because the card was frozen the moment they left","it gets dealt with"]}]},"edge":{"label":"An edge case — a spend that lands exactly on the limit","lines":[{"kw":"Given","segs":["an employee with a £2,000 limit who has spent £1,800","an employee close to their limit"]},{"kw":"When","segs":["they make a £200 buy that brings the total to exactly £2,000","they use the card again"]},{"kw":"Then","segs":["it’s allowed, because it reaches the limit without passing it","the card sorts it out"]},{"kw":"And","segs":["the very next spend, however small, is blocked","later spending is fine"]}]},"fail":"The everyday spend is clear. But when someone leaves, or a buy lands exactly on the limit, you’ve left it vague. The agent will guess — leaving a leaver’s card live, or blocking the very purchase that just reaches the line. Spell the „goes wrong“ case and the on-the-limit case out as clearly as the normal one.","success":"All three are spelled out — a spend within the limit that goes through, a leaver’s card frozen the moment they go, and a buy that lands exactly on the limit allowed while the next one is blocked. The agent has no room to improvise."},"noguess":[{"t":"Does spending actually stop at the limit? — Finance answered: yes, the next spend is blocked.","c":"done"},{"t":"Can a leaver’s card be frozen immediately? — Confirmed: yes, straight away.","c":"done"},{"t":"Do we support different limits for different weeks of the month at launch? — We deliberately start with one monthly limit; more later.","c":"limit"},{"t":"Do employees get their own app to see their spending at launch? — Out of scope for now; finance sees it, revisit later.","c":"limit"},{"t":"Which spending categories are blocked by default? — Not decided; blocked until the company sets the list.","c":"block"}],"overreach":[{"t":"A card per employee that blocks the next spend once the limit is reached.","bad":false},{"t":"Shows a limit but never actually blocks spending past it.","bad":true,"why":"A limit that doesn’t stop anything is no limit — people overspend freely, which the whole feature was meant to prevent."},{"t":"Freezes a leaver’s card straight away so it can’t be used.","bad":false},{"t":"Leaves a leaver’s card working for weeks after they go.","bad":true,"why":"A former employee keeps spending company money — a control that was clearly needed."},{"t":"Lets every card buy anything, anywhere, including categories the company bans.","bad":true,"why":"No blocked categories at all — invented freedom nobody approved, and a fraud risk."},{"t":"Lets finance see spending on every card as it happens.","bad":false},{"t":"Replaces the per-person limits with one shared limit it picked for the whole company.","bad":true,"why":"Made-up behaviour that ignores the actual request — one big pot instead of per-person control."}],"overreachSuccess":"Four traps caught: the limit that doesn’t block, the leaver’s live card, the anything-goes spending, and the made-up shared limit. The draft is safe now.","slices":[{"t":"Get one card working with its own monthly limit that blocks spending at the limit.","bad":false},{"t":"Handle freezing a card the moment someone leaves.","bad":false},{"t":"Give finance a live view of spending across the cards.","bad":false},{"t":"Build the card store first, the limit rules next week, the blocking the week after.","bad":true,"why":"Cut by technical layer — no piece actually controls a real card on its own."},{"t":"Hand out the cards now; add the limits and the leaver-freeze later.","bad":true,"why":"Leaving out the parts that stop overspending and shut off leavers — the whole point."},{"t":"Split it into one tiny piece per field on the card settings screen.","bad":true,"why":"So small that stitching the fields together costs more than it delivers."}],"slicesSuccess":"Three pieces, each one a company could actually use, each small enough to check on its own.","premortem":[{"t":"The limit is only for show and people quietly spend far past it.","bad":false},{"t":"A leaver’s card keeps working and racks up spending after they’ve gone.","bad":false},{"t":"A card buys something in a banned category and no one notices for a month.","bad":false},{"t":"Finance can’t see spending until month end and a problem grows unchecked.","bad":false},{"t":"The plastic card is a slightly different colour than the mock-up.","bad":true,"why":"A cosmetic detail, not a reason the change would fail."},{"t":"A café near the office stops taking cards for a day.","bad":true,"why":"Outside this change’s control — pure noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the limit that doesn’t bite, the leaver still spending, the banned purchase, the blind finance team. Each becomes a safeguard before a single thing is built."},{"id":"virtual-card","title":"Single-use virtual card","short":"creating a one-time card number for a single purchase","ticket":"„Create a single-use card number for a specific purchase.“","hookBuild":["A one-time card number, made on demand.","I didn’t lock it to the amount or the shop — it’ll pay any sum to anyone, over and over. You said „single-use“, but I wasn’t sure what that meant.","It never expires, so a leaked number keeps working forever. You didn’t give it an end date.","When a refund comes back after the card is closed, the money just vanishes — nowhere to land. You didn’t mention refunds.","I let anyone in the company create as many as they like, with no limit each. Bonus: I emailed the live number in plain text. You’re welcome."],"mapSuccess":"The map holds. The goal, the rules locking it to one amount, one shop and one use with an end date, the single-purchase case and the second-attempt case — and the open questions about late refunds and how long it lasts.","map":[{"t":"As an employee I want a one-time card number for a single purchase so I don’t expose the company’s real card.","c":"goal"},{"t":"The number is locked to one amount and one shop, and works only once.","c":"rule"},{"t":"The number has an end date, after which it stops working.","c":"rule"},{"t":"Only allowed people can create one, and each has a spending limit.","c":"rule"},{"t":"A number made for a £300 order at one supplier → that one payment works, and a second attempt is declined.","c":"ex"},{"t":"The number is used for its one purchase → any later attempt to charge it is refused.","c":"ex"},{"t":"If a refund comes back after the card is closed, where does the money go?","c":"q"},{"t":"How long should the number stay valid before its end date if it’s never used?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a one-time number made for a £300 order at one supplier","a one-time number for a purchase"]},{"kw":"And","segs":["it was created by an allowed person within their spending limit","someone set it up"]},{"kw":"When","segs":["that £300 charge from that supplier comes in","the purchase is made"]},{"kw":"Then","segs":["it’s paid once and the number then stops working","the payment works"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a one-time number that has already paid for its purchase","a number that’s been used"]},{"kw":"When","segs":["someone tries to charge it a second time","it’s used again"]},{"kw":"Then","segs":["the charge is refused because the number is single-use","it gets handled"]}]},"edge":{"label":"An edge case — used right on its end date","lines":[{"kw":"Given","segs":["an unused one-time number on the very last day before its end date","a number near its end date"]},{"kw":"When","segs":["the correct charge from the right shop comes in that day","a charge comes in around then"]},{"kw":"Then","segs":["it’s still paid, because the end date hasn’t passed yet","it works out"]},{"kw":"And","segs":["the same charge a day later, once the end date has passed, is refused","later charges are handled"]}]},"fail":"The first purchase is clear. But a second charge on the same number, or a charge right on the end date, you’ve left vague. The agent will guess — paying twice, or cutting off a charge that arrives while the number is still valid. Spell the „goes wrong“ case and the end-date case out as clearly as the normal one.","success":"All three are spelled out — one purchase paid at the right shop for the right amount, any second charge firmly refused, and a charge on the very last valid day still paid while a day later it’s refused. The agent has no room to improvise."},"noguess":[{"t":"Is the number locked to one amount and one shop? — Product answered: yes, both.","c":"done"},{"t":"Does it stop working after one use? — Confirmed: yes, single-use means single-use.","c":"done"},{"t":"Can a number be reused for a monthly subscription at launch? — We deliberately start with true one-time numbers; recurring ones later.","c":"limit"},{"t":"Do we let people create these from their phone at launch? — Out of scope for now; desktop only, revisit later.","c":"limit"},{"t":"Where does a refund go if it arrives after the card is closed? — Not decided; blocked until the payments team sets the rule.","c":"block"}],"overreach":[{"t":"A one-time number locked to a single amount at a single shop.","bad":false},{"t":"Lets the number pay any amount to any shop, as often as it’s charged.","bad":true,"why":"That’s not single-use at all — a leaked number becomes an open cheque to anyone."},{"t":"Gives the number an end date after which it stops working.","bad":false},{"t":"Makes the number never expire.","bad":true,"why":"A leaked number that works forever — the end date was there exactly to stop that."},{"t":"Lets anyone in the company create as many numbers as they like, with no limit.","bad":true,"why":"No control over who creates them or how much — invented and never approved."},{"t":"Refuses any second charge once the number has been used.","bad":false},{"t":"Emails the live number in plain text to the person who asked.","bad":true,"why":"Sending a working card number in the clear is a serious breach — must never ship."}],"overreachSuccess":"Four traps caught: the unlocked number, the no-expiry number, the anyone-can-create free-for-all, and the plain-text number in an email. The draft is safe now.","slices":[{"t":"Get one number created, locked to an amount and shop, and used once, end to end.","bad":false},{"t":"Handle a second charge attempt so it’s refused after the first use.","bad":false},{"t":"Add the end date so an unused number stops working.","bad":false},{"t":"Build the number generator first, the locking rules next week, the charging the week after.","bad":true,"why":"Cut by technical layer — no piece can actually make a real purchase on its own."},{"t":"Ship the number now; add the single-use lock and the who-can-create rule later.","bad":true,"why":"Leaving out the locks that make it single-use and safe — the whole reason it exists."},{"t":"Split it into one tiny piece per digit of the card number.","bad":true,"why":"Absurdly small — coordinating the pieces costs far more than they deliver."}],"slicesSuccess":"Three pieces, each one an employee could actually use, each small enough to check on its own.","premortem":[{"t":"The number isn’t really single-use and gets charged again after the purchase.","bad":false},{"t":"A number that never expires is leaked and keeps paying for months.","bad":false},{"t":"A refund arrives after the card is closed and the money is lost with nowhere to land.","bad":false},{"t":"Anyone can create unlimited numbers and spending runs out of control.","bad":false},{"t":"The generated number is shown in a font some people find hard to read.","bad":true,"why":"A cosmetic nit, not a reason the change would fail."},{"t":"The company logo on the confirmation page is a little small.","bad":true,"why":"A polish detail with nothing to do with whether it works — noise here."}],"premortemSuccess":"Four real failure modes named — the reused number, the leaked never-expiring number, the lost refund, the unlimited creation. Each becomes a safeguard before a single thing is built."},{"id":"collect-direct-debit","title":"Collect from many customers","short":"collecting a monthly fee from many customers at once","ticket":"„Let a company collect a monthly fee from many customers at once.“","hookBuild":["A monthly „collect from everyone“ run.","I take money from customers who never agreed to let us — no permission needed on my end. You said collect, not ask first.","I gave customers no warning before pulling the money; it just leaves their account. You didn’t mention telling them.","When a collection fails because there’s no money there, I retry it every hour, all day. Seemed thorough.","I ignore any dispute or refund request and keep the money. Bonus: I collected next month’s fee too, to get ahead. You’re welcome."],"mapSuccess":"The map holds. The goal, the rules on permission, advance notice and sensible retries, the collected case and the no-permission case — and the open questions about retry rules and disputes.","map":[{"t":"As a company I want to collect our monthly fee from many customers in one run so we don’t chase each payment by hand.","c":"goal"},{"t":"We only collect from a customer who has given us permission to do so.","c":"rule"},{"t":"Customers are told in advance, before the money leaves their account.","c":"rule"},{"t":"A failed collection follows a set retry rule — not endless attempts.","c":"rule"},{"t":"A customer who gave permission and has funds, told in advance → the fee is collected on the due date.","c":"ex"},{"t":"A customer who never gave permission → nothing is collected from them.","c":"ex"},{"t":"If a collection fails for no funds, how many times do we retry and how far apart?","c":"q"},{"t":"When a customer disputes a collection, do we refund straight away or hold while we check?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a customer who gave permission and has enough in their account","a customer we bill"]},{"kw":"And","segs":["they were told in advance, before the due date","they know roughly what’s coming"]},{"kw":"When","segs":["the monthly run reaches their due date","the run happens"]},{"kw":"Then","segs":["the fee is collected once, on the due date","we get paid"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a customer who never gave permission to collect","a customer with a permission question"]},{"kw":"When","segs":["the run reaches them","the run gets to them"]},{"kw":"Then","segs":["nothing is collected from them","it’s handled"]}]},"edge":{"label":"An edge case — the last allowed retry","lines":[{"kw":"Given","segs":["a permitted customer whose collection failed because there was no money there","a customer whose payment didn’t work"]},{"kw":"When","segs":["the set retry rule reaches its final allowed attempt","we try again a few times"]},{"kw":"Then","segs":["that last attempt is made and then no further attempts follow","it keeps trying until it works"]},{"kw":"And","segs":["the customer isn’t hit with endless failed-payment fees","the customer is fine"]}]},"fail":"The permitted collection is clear. But a customer who never agreed, or a collection that keeps failing for no funds, you’ve left vague. The agent will guess — charging someone who never signed up, or retrying all day and piling up fees. Spell the „goes wrong“ case and the last-retry case out as clearly as the normal one.","success":"All three are spelled out — a permitted customer collected once after notice, no permission meaning nothing is taken, and a failed collection retried the set number of times then stopped instead of hammering the account. The agent has no room to improvise."},"noguess":[{"t":"Do we collect only from customers who gave permission? — Compliance answered: yes, always.","c":"done"},{"t":"Are customers told before the money leaves? — Confirmed: yes, advance notice is required.","c":"done"},{"t":"Do we support weekly as well as monthly collection at launch? — We deliberately start with monthly; other cycles later.","c":"limit"},{"t":"Do we collect in other currencies at launch? — Out of scope for now; home currency only, revisit later.","c":"limit"},{"t":"How many times do we retry a failed collection and how far apart? — Not decided; blocked until the payments team sets the rule.","c":"block"}],"overreach":[{"t":"A monthly run that collects only from customers who gave permission.","bad":false},{"t":"Collects from customers who never gave permission to charge them.","bad":true,"why":"Taking money with no agreement — an unlawful charge that brings complaints and fines."},{"t":"Tells customers in advance before the money leaves their account.","bad":false},{"t":"Pulls the money with no warning to the customer at all.","bad":true,"why":"You agreed customers must be told first — a surprise charge breaks that and the rules."},{"t":"Retries a failed collection every hour, all day, until it works.","bad":true,"why":"Hammering a customer’s account after a failure racks up their fees and breaks the retry rules."},{"t":"Follows a set retry rule for a failed collection instead of endless attempts.","bad":false},{"t":"Collects next month’s fee early „to get ahead“.","bad":true,"why":"Taking money that isn’t due yet — invented behaviour nobody approved."}],"overreachSuccess":"Four traps caught: collecting without permission, the no-notice charge, the all-day retrying, and the early collection. The draft is safe now.","slices":[{"t":"Get one monthly run collecting from permitted customers, with notice, end to end.","bad":false},{"t":"Handle the no-permission case so nothing is collected from them.","bad":false},{"t":"Add the set retry rule for a collection that fails for no funds.","bad":false},{"t":"Build the customer list first, the notice step next week, the collecting the week after.","bad":true,"why":"Cut by technical layer — no piece actually collects a real fee on its own."},{"t":"Start collecting now; add the permission check and the advance notice later.","bad":true,"why":"Leaving out the permission and notice that make collecting lawful — exactly what blows up."},{"t":"Split it into one tiny piece per customer.","bad":true,"why":"So small that coordinating the pieces costs more than one run ever would."}],"slicesSuccess":"Three pieces, each one a company could actually use, each small enough to check on its own.","premortem":[{"t":"Money is collected from a customer who never gave permission.","bad":false},{"t":"A customer isn’t warned and an unexpected charge overdraws their account.","bad":false},{"t":"A failed collection is retried so often it piles up fees on the customer.","bad":false},{"t":"A disputed collection isn’t refunded and the complaint escalates.","bad":false},{"t":"The notice email’s subject line could be a bit friendlier.","bad":true,"why":"A wording nicety, not a reason the change would fail."},{"t":"A national holiday next quarter shifts one due date by a day.","bad":true,"why":"Outside this change’s control and minor — noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the unpermitted charge, the surprise overdraft, the retry pile-up, the ignored dispute. Each becomes a safeguard before a single thing is built."},{"id":"pay-abroad","title":"Pay a supplier abroad","short":"paying an overseas supplier in their own currency","ticket":"„Let companies pay an overseas supplier in the supplier’s own currency.“","hookBuild":["A „pay a supplier abroad“ button.","I hide the exchange rate and fees until after the money is sent, so nobody sees the cost up front. You said pay, not show the price.","I skip the checks that make sure the supplier isn’t on a banned list. You didn’t ask for them.","I promise the money arrives instantly, then it takes days, and I ignore the daily cut-off time. You didn’t mention timing.","If the account details are wrong, I send it anyway and there’s no way to pull it back. Bonus: I let people send the same payment twice. You’re welcome."],"mapSuccess":"The map holds. The goal, the rules on showing the cost up front, compliance checks and honest arrival times, the same-day case and the failed-check case — and the open questions about recalls and cut-off times.","map":[{"t":"As a company I want to pay an overseas supplier in their own currency so they get the right amount without doing the conversion themselves.","c":"goal"},{"t":"The exchange rate and any fees are shown up front, before the payment is sent.","c":"rule"},{"t":"Every payment is checked against sanctions and compliance rules before it goes.","c":"rule"},{"t":"The company is told when the money will actually arrive, not just that it was sent.","c":"rule"},{"t":"A payment to a supplier in another currency, sent before the daily cut-off, checks passed → rate and fees shown, arrives the same day.","c":"ex"},{"t":"The payment fails a compliance check → it’s held and not sent, with a clear reason.","c":"ex"},{"t":"After a payment is sent, how long can it still be recalled if the details were wrong?","c":"q"},{"t":"What is the daily cut-off time for the money to arrive the same day?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a payment to an overseas supplier, sent before the daily cut-off","a payment going abroad"]},{"kw":"And","segs":["the exchange rate and fees were shown and accepted up front","the pricing was dealt with"]},{"kw":"When","segs":["the sanctions and compliance checks pass","the payment is sent somehow"]},{"kw":"Then","segs":["it’s sent and the company is told it arrives the same day","the supplier gets paid"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a payment that fails a sanctions or compliance check","a payment with a check problem"]},{"kw":"When","segs":["the company tries to send it","sending is attempted"]},{"kw":"Then","segs":["it’s held and not sent, with a clear reason","it gets dealt with"]}]},"edge":{"label":"An edge case — right on the daily cut-off","lines":[{"kw":"Given","segs":["a payment submitted at the exact daily cut-off time","a payment sent late in the day"]},{"kw":"When","segs":["it goes through the checks","it’s processed"]},{"kw":"Then","segs":["the company is told honestly whether it lands today or the next working day","the company is told it’ll arrive"]},{"kw":"And","segs":["the promised arrival matches when the money really turns up","the timing is fine"]}]},"fail":"The clean payment is clear. But a payment that fails a check, or one submitted right on the cut-off, you’ve left vague. The agent will guess — sending money to a banned party, or promising same-day when it really lands tomorrow. Spell the „goes wrong“ case and the on-the-cut-off case out as clearly as the normal one.","success":"All three are spelled out — a payment with its cost shown up front, checks passed, arriving same day; a failed check held with a clear reason; and a payment right on the cut-off given an honest arrival time that matches reality. The agent has no room to improvise."},"noguess":[{"t":"Are the rate and fees shown before the payment is sent? — Product answered: yes, up front.","c":"done"},{"t":"Is every payment checked against sanctions rules? — Confirmed: yes, before it goes.","c":"done"},{"t":"How many currencies do we support at launch? — We deliberately start with a short list; more later.","c":"limit"},{"t":"Do we offer to lock a rate in advance at launch? — Out of scope for now; the rate at send-time only, revisit later.","c":"limit"},{"t":"How long after sending can a payment still be recalled? — Not decided; blocked until the payments team confirms.","c":"block"}],"overreach":[{"t":"A payment abroad that shows the exchange rate and fees before it’s sent.","bad":false},{"t":"Hides the rate and fees until after the money has gone.","bad":true,"why":"The company can’t see what it’s paying until it’s too late — a hidden-cost trap that must not ship."},{"t":"Checks every payment against sanctions rules before it goes.","bad":false},{"t":"Skips the sanctions and compliance checks to make payments faster.","bad":true,"why":"Paying someone on a banned list is a serious legal breach — this check can never be dropped."},{"t":"Promises the money arrives instantly when it really takes days, and ignores the cut-off.","bad":true,"why":"A false arrival promise — the supplier is told the wrong thing and the company plans around a lie."},{"t":"Tells the company when the money will actually arrive.","bad":false},{"t":"Sends a payment with wrong details anyway and offers no way to pull it back.","bad":true,"why":"Invented behaviour — money gone to the wrong place with no recall, which the recall question was meant to settle."}],"overreachSuccess":"Four traps caught: the hidden cost, the skipped sanctions check, the false arrival promise, and the un-recallable wrong payment. The draft is safe now.","slices":[{"t":"Get one payment abroad working, with the cost shown up front, end to end.","bad":false},{"t":"Handle a payment that fails a compliance check so it’s held, not sent.","bad":false},{"t":"Show the company when the money will actually arrive.","bad":false},{"t":"Build the currency converter first, the payment screen next week, the sending the week after.","bad":true,"why":"Cut by technical layer — no piece actually pays a real supplier on its own."},{"t":"Ship the paying now; add the sanctions checks and cost-up-front later.","bad":true,"why":"Leaving out the compliance checks and honest pricing — the parts that keep it legal and fair."},{"t":"Split it into one tiny piece per currency in the world.","bad":true,"why":"So many tiny pieces that coordinating them costs far more than they deliver."}],"slicesSuccess":"Three pieces, each one a company could actually use, each small enough to check on its own.","premortem":[{"t":"The rate and fees aren’t shown up front and the company overpays without knowing.","bad":false},{"t":"A payment skips the sanctions check and money lands with a banned party.","bad":false},{"t":"The money is promised same-day but arrives days late, past the supplier’s deadline.","bad":false},{"t":"A payment with wrong details is sent and can’t be pulled back.","bad":false},{"t":"The currency symbols on the screen aren’t perfectly aligned.","bad":true,"why":"A cosmetic nit, not a reason the change would fail."},{"t":"A foreign bank rebrands its logo next year.","bad":true,"why":"Outside this change’s control and irrelevant — noise for this exercise."}],"premortemSuccess":"Four real failure modes named — the hidden cost, the sanctions miss, the late arrival, the un-recallable payment. Each becomes a safeguard before a single thing is built."},{"id":"add-payee","title":"Add and approve a new payee","short":"adding a new supplier before a company can pay them","ticket":"„Let companies add a new supplier before they can pay them.“","hookBuild":["A box to type in a new supplier’s name and account number — saved and ready to pay the instant you hit save.","No second person needed. Whoever typed it in can pay it straight away. You never said anyone had to approve it.","I let people change the account number of an existing supplier any time, no questions asked — quicker that way.","I skipped checking the bank details are real. If the account number is made up, we find out when the money vanishes.","Bonus: if two people add the same supplier, I keep both — and I switched off any waiting period, so payments can go out the second a supplier is added."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide whether a new supplier can be paid safely.","map":[{"t":"As a company I want to add a new supplier and their bank details so I can pay them later.","c":"goal"},{"t":"A new supplier can only be paid after a second person has approved them.","c":"rule"},{"t":"A newly added supplier waits a short cool-off period before the very first payment can go out.","c":"rule"},{"t":"Any later change to a supplier’s bank details must be approved again, just like a brand-new one.","c":"rule"},{"t":"Someone adds a supplier, a second person approves, the cool-off passes → the supplier can now be paid.","c":"ex"},{"t":"Someone tries to pay a supplier that hasn’t been approved yet → the payment is blocked with a clear reason.","c":"ex"},{"t":"If the same supplier is added twice, do we merge the two or flag the duplicate?","c":"q"},{"t":"How long should the cool-off period be, and can an urgent payment ever skip it?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a new supplier has been added with their bank details","a supplier that’s in the system"]},{"kw":"And","segs":["a second person with the approver role signs them off","someone has a look"]},{"kw":"When","segs":["the cool-off period passes and the first payment is sent","someone deals with it"]},{"kw":"Then","segs":["the payment goes through to the supplier","it works"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a supplier that nobody has approved yet","a supplier that’s a bit new"]},{"kw":"When","segs":["someone tries to send them a payment","someone does something"]},{"kw":"Then","segs":["the payment is blocked and they’re told it needs approval first","it stops somehow"]},{"kw":"And","segs":["no money leaves the account","everything is fine"]}]},"edge":{"label":"An edge case — right as the cool-off ends","lines":[{"kw":"Given","segs":["an approved supplier whose cool-off period ends at this exact moment","a supplier who was added recently"]},{"kw":"When","segs":["the very first payment is sent the instant the cool-off ends","a payment is sent around then"]},{"kw":"Then","segs":["it’s allowed only once the cool-off has fully passed, not a moment before","the app decides for itself"]}]},"fail":"The normal path is clear — added, approved, paid. But the refusal and the moment the cool-off ends are left vague, so it’s anyone’s guess whether the block fires or a payment slips out one second early. Spell the „unapproved“ and „right at the cool-off“ cases out as plainly as the happy path.","success":"All three are spelled out — the clean approve-and-pay, the firm block on an unapproved supplier, and the awkward payment landing exactly as the cool-off ends. No money slips out early."},"noguess":[{"t":"Who is allowed to approve a new supplier? — Confirmed: any second person with the approver role, not the one who added it.","c":"done"},{"t":"Does changing a supplier’s bank details need re-approval? — Confirmed by risk: yes, treated as brand-new.","c":"done"},{"t":"Do we check a supplier against a sanctions list at launch? — Deliberately out of scope for now, added later.","c":"limit"},{"t":"How many suppliers can be added at once? — For now one at a time; a bulk upload comes later.","c":"limit"},{"t":"How long is the cool-off before the first payment can go out? — Not agreed yet; blocked until the fraud team sets it.","c":"block"}],"overreach":[{"t":"A screen to add a supplier that only becomes payable after a second person approves.","bad":false},{"t":"Blocks the very first payment until the cool-off period has passed.","bad":false},{"t":"Sends any change to bank details back for approval before it takes effect.","bad":false},{"t":"Lets the person who added the supplier approve their own entry, to save time.","bad":true,"why":"The whole point of a second approver is that it’s someone else — self-approval defeats the control."},{"t":"Allows an existing supplier’s account number to be edited and paid immediately, no re-approval.","bad":true,"why":"A changed account number is the classic invoice-fraud trick — it must be re-checked before money moves."},{"t":"Keeps both entries when the same supplier is added twice, and pays whichever is picked.","bad":true,"why":"Duplicate suppliers cause double payments and hide which details are the real ones."},{"t":"Skips checking the bank details are valid, to speed things up.","bad":true,"why":"Unverified details mean money can be sent to an account that doesn’t exist or isn’t the supplier’s."}],"overreachSuccess":"Four traps caught: self-approval, editing details without re-check, keeping duplicates, and skipping the bank-detail check. The draft is safe now.","slices":[{"t":"Add a supplier and see it waiting for approval, end to end.","bad":false},{"t":"The approve step: a second person signs it off and it becomes payable.","bad":false},{"t":"Handle re-approval when someone changes the bank details later.","bad":false},{"t":"Build the database first, then the screens, then the approval logic weeks later.","bad":true,"why":"Cut by technical layer — no piece is something the finance team could actually use on its own."},{"t":"Ship adding and paying suppliers now; add the approval and cool-off later if there’s time.","bad":true,"why":"Leaving out the approval and cool-off is exactly the part that stops fraud — it can’t be an afterthought."},{"t":"Split it into a separate piece for every single field on the form.","bad":true,"why":"So small that stitching them together costs more than the value each adds."}],"slicesSuccess":"Three pieces, each something the finance team could actually use, each small enough to check on its own.","premortem":[{"t":"A payment goes out to an unapproved supplier because the block was missed.","bad":false},{"t":"A fraudster changes a real supplier’s account number and the money lands with them.","bad":false},{"t":"The same supplier exists twice and gets paid twice.","bad":false},{"t":"The cool-off is so long that a genuine urgent payment misses its deadline.","bad":false},{"t":"The internet goes down across the whole office for an afternoon.","bad":true,"why":"Not something this change controls — pure noise here."},{"t":"The „add supplier“ button is a slightly different shade of blue.","bad":true,"why":"A cosmetic nit, not a reason the change would fail."}],"premortemSuccess":"Four real failure modes named — paying an unapproved supplier, the changed-details fraud, the double-paid duplicate, and the cool-off blocking an urgent payment. Each becomes a safeguard."},{"id":"confirm-payee","title":"Check the payee’s details","short":"warning a company when a supplier’s name doesn’t match their account","ticket":"„Warn the company if a supplier’s name doesn’t match the account.“","hookBuild":["A check that compares the supplier’s name to the name on the account before you pay.","On a clear no-match I just block the payment outright — no warning, no way to proceed, even for a genuine spelling difference. You said „warn“, but I went further.","Then I did the opposite too: a close match and a total mismatch both show the same vague „check this“ message, so there’s no telling how bad it is.","I don’t record whether they saw the warning and paid anyway — so if the money’s gone, there’s no way to say who chose to ignore it.","Bonus: I only run the check on the very first payment. Change a trusted supplier’s account number later and it sails straight through unchecked."],"mapSuccess":"The map holds. Goal, rules, examples — and the open questions that decide who’s protected when a name doesn’t match.","map":[{"t":"As a company I want to be warned when a supplier’s name doesn’t match their bank account so I don’t pay the wrong person.","c":"goal"},{"t":"A close match and a clear no-match must show clearly different warnings — one is a nudge, the other is serious.","c":"rule"},{"t":"The company can choose to proceed after a warning, but the choice and who made it are recorded.","c":"rule"},{"t":"The check runs on the first payment and again whenever a supplier’s account details change.","c":"rule"},{"t":"The name matches the account → the payment goes ahead with no warning.","c":"ex"},{"t":"A clear no-match and the company proceeds anyway → it goes out, and it’s logged that they were warned and chose to continue.","c":"ex"},{"t":"For a close match (a small spelling difference), do we still warn, or let it through quietly?","c":"q"},{"t":"If the company ignores a warning and pays the wrong person, who is responsible for the loss?","c":"q"}],"behaviour":{"happy":{"label":"When it works","lines":[{"kw":"Given","segs":["a payment where the supplier’s name matches the account","a payment to someone"]},{"kw":"When","segs":["the check runs before the money leaves","the system checks something"]},{"kw":"Then","segs":["it goes ahead with no warning","it’s fine"]}]},"negative":{"label":"When it’s refused / fails","lines":[{"kw":"Given","segs":["a payment where the name clearly doesn’t match the account","a payment that looks a bit off"]},{"kw":"When","segs":["the company chooses to proceed despite the serious warning","they carry on"]},{"kw":"Then","segs":["the payment goes out and it’s recorded who was warned and chose to continue","something is noted"]},{"kw":"And","segs":["that record can be looked up later if the money is lost","it’s handled"]}]},"edge":{"

evalidierung.\n\n**Analyse & Planung:**\n- [x] Aktuellen Zustand verstehen: Der Team-Modus-Schritt \"Team · 6\" ist heute eine Pflichtaufgabe (Risiken aus einer festen Liste pro Szenario auswählen), ohne jede Überspring-Möglichkeit. Der Team-Modus hat bereits ein etabliertes, mehrfach genutztes Muster für genau diese Art von Verlockungs-Entscheidung (z. B. der bestehende Schritt \"Eine offene Frage noch\"): eine Weiche mit einer verlockenden und einer soliden Option, deren Wahl in einem Merker festgehalten wird — ohne dass sofort eine sichtbare Konsequenz erscheint.\n- [x] Betroffene Bereiche identifiziert: Die Konsequenz selbst muss NICHT neu erfunden werden — der Team-Modus hat bereits eine gemeinsame \"Baubeginn\"-Nachrichtenkette, in der schon heute mehrere Arten von vertagten/unehrlichen Entscheidungen (u. a. eine vertagte offene Frage, eine unehrlich abgehakte Bereitschafts-Checkliste) als benannte Nachrichten samt Tage-Zuschlag auftauchen und in denselben laufenden Nacharbeits-Zähler einzahlen, der auch in der Abschluss-Rückschau ausgewertet wird. Die neue \"Pre-Mortem übersprungen\"-Konsequenz reiht sich in genau diese bestehende Kette ein, statt einen eigenen neuen Mechanismus zu bauen.\n- [x] Implementierungsansatz definiert: siehe Optionenvergleich unten — empfohlen wird, eine neue Weiche nach dem bestehenden Muster einzufügen, die bestehende Risikoauswahl-Aufgabe selbst unangetastet zu lassen, und die neue Konsequenz-Nachricht als weiteren Eintrag in die bereits bestehende Baubeginn-Nachrichtenkette einzuhängen.\n- [x] Risiken benannt: siehe Pre-Mortem unten.\n- [x] Aufwand geschätzt: Klein bis mittel — der komplette Mechanismus (Weiche, verzögerte Konsequenz, Zähler, Rückschau-Auswertung) existiert bereits als wiederverwendbares Muster; der Aufwand liegt vor allem im sauberen Einreihen an der richtigen Stelle, nicht im Neubau.\n\n**Wichtiger Befund (verhindert einen stillen Testbruch):** Ein bereits bestehender, fest verankerter Test (FEATURE-011) legt die bestmögliche Team-Modus-Runde auf exakt 7 angerechnete Analyse-Tage fest. Bekäme die neue Weiche zusätzlich zur bereits bestehenden Risikoauswahl-Aufgabe eine eigene Zeitgutschrift, stiege dieser Bestwert unbeabsichtigt auf 8 und der bestehende Test würde fehlschlagen. Empfehlung (siehe Optionenvergleich, Option A): die neue Weiche bekommt bewusst KEINE eigene Zeitgutschrift — nur die bereits bestehende Risikoauswahl-Aufgabe behält ihre schon heute vorhandene Gutschrift, und zwar nur, wenn sie tatsächlich durchgeführt wird.\n\n**Pre-Mortem:**\n- 💀 Die neue Weiche bekommt versehentlich ihre eigene Zeitgutschrift zusätzlich zur bereits bestehenden Gutschrift der Risikoauswahl-Aufgabe selbst, und der bestehende 7-Tage-Bestwert-Test bricht unbemerkt → Gegenmaßnahme: in Analyse & Planung ausdrücklich festgehalten, dass die neue Weiche keine eigene Gutschrift bekommt; Testplan lässt den bestehenden Test gezielt vor und nach der Änderung laufen.\n- 💀 Die \"wie gewohnt durchführen\"-Option verändert unbemerkt das bisherige Verhalten der Risikoauswahl-Aufgabe selbst (z. B. andere Wertung, anderer Text) → Gegenmaßnahme: eigenes Akzeptanzkriterium verlangt ausdrücklich \"ohne sichtbaren Unterschied zu heute\"; Testplan vergleicht das Verhalten vor/nach der Änderung.\n- 💀 Die neue Konsequenz-Nachricht erscheint an der falschen Stelle im Ablauf (z. B. sofort statt erst beim Entwicklungsstart) und verrät die Konsequenz zu früh, wodurch die eigentliche Lern-Pointe verloren geht → Gegenmaßnahme: eigenes Akzeptanzkriterium verlangt ausdrücklich, dass beim Überspringen selbst noch keine Konsequenz sichtbar wird; Testplan prüft gezielt den zeitlichen Ablauf.\n- 💀 GAME_VERSION wird trotz sichtbarer neuer Spielmechanik vergessen zu erhöhen → Gegenmaßnahme: eigenes Akzeptanzkriterium und eigener Testschritt, wie bei jedem bisherigen Ticket.\n- 💀 Ein im Browser zwischengespeicherter alter Spielstand verdeckt beim eigenen Test, ob die neue Weiche überhaupt erscheint → Gegenmaßnahme: im Testplan als offener Punkt vermerkt (harter Reload vor dem eigenen Test).\n\n**Optionenvergleich:**"}, {"id": "BUG-004", "title": "Layout-Sprung beim Aufklappen der zweiten „What's different here?\"-Infobox auf der Startseite", "type": "BugFix", "priority": "Niedrig", "lane": "done", "created": "2026-07-23", "started": "", "done_at": "", "body": "| Feld | Wert |\n|------|------|\n| **Typ** | BugFix |\n| **Priorität** | Niedrig |\n| **Status** | Done |\n| **Erstellt** | 2026-07-23 |\n| **Done seit** | 2026-07-24 |\n\n**Beschreibung:** Laut Ersteindruck-Testlauf lief ein erster Klick auf \"What's different here?\" bei der zweiten Modus-Karte (Team-Modus) ins Leere, weil sich durch das Aufklappen der ersten Karte das Layout kurz vorher verschoben hatte. Am echten Code verifiziert: Beide Infoboxen sind native `<details><summary>What's different here?<\/summary>…<\/details>`-Elemente; das native Aufklappverhalten verschiebt den nachfolgenden Inhalt sofort ohne Übergang — ein Klick, der auf die alte Position der zweiten Box zielt, trifft daher ins Leere.\n\n**User Story:** Als Spielerin/Spieler möchte ich beide Modus-Infoboxen zuverlässig mit einem einzigen Klick aufklappen können, auch direkt nacheinander, sodass ich nicht zweimal klicken muss.\n\n**Bezug:** Ersteindruck-Testlauf 23.07.2026 (Finding 4).\n\n**Scope:** Eingeschlossen: die beiden „What's different here?\"-Infoboxen auf dem Moduswahl-Startbildschirm (Agent-Karte „Collaborate with Agents\" und Team-Karte „Work as a Team\") — das Auf- und Zuklappen bekommt einen sanften Übergang statt eines harten Sprungs, auf allen Bildschirmbreiten (breiter Bildschirm mit den Karten nebeneinander und schmaler Handy-Bildschirm mit den Karten untereinander). Ausgeschlossen: der Textinhalt der beiden Infoboxen selbst (bleibt unverändert); alle anderen Bildschirme des Spiels (dort gibt es keine vergleichbaren aufklappbaren Boxen); ein automatisches gegenseitiges Schließen der beiden Boxen (bleiben bewusst unabhängig voneinander wie bisher).\n\n**Akzeptanzkriterien:**\n- [x] Wenn ich die erste Infobox (\"What's different here?\" bei \"Collaborate with Agents\") anklicke, öffnet sie sich mit einer sanften, sichtbaren Bewegung statt eines plötzlichen Sprungs. Per echtem Chromium-Test bestätigt (nicht nur jsdom, siehe Testplan) — jsdom kann Layout-Bewegung grundsätzlich nicht sehen.\n- [x] Dasselbe gilt für die zweite Infobox (bei \"Work as a Team\"). Per echtem Chromium-Test bestätigt.\n- [x] Wenn ich direkt nach dem Öffnen der ersten Infobox auf die (durch das Öffnen leicht verschobene) zweite Infobox klicke, lande ich zuverlässig auf ihr — ich muss nicht ein zweites Mal klicken, weil der erste Klick daneben ging. Per echtem Chromium-Test bestätigt: ein Klick exakt auf die alte Koordinate der zweiten Infobox, unmittelbar nach dem Öffnen der ersten (kein Warten), trifft und öffnet sie zuverlässig — auf beiden Bildschirmbreiten.\n- [x] Das gilt sowohl auf einem breiten Bildschirm (Karten stehen nebeneinander) als auch auf einem schmalen Handy-Bildschirm (Karten stehen untereinander). Beide Breiten einzeln per echtem Chromium-Test bestätigt.\n- [x] Auch das Zuklappen einer bereits geöffneten Infobox verläuft sanft statt abrupt. Per echtem Chromium-Test bestätigt (Schließ-Übergang, ~280ms).\n- [x] Die Start-Buttons, Kartentexte und die Auswahl des Modus verhalten sich unverändert wie bisher. Automatisiert bestätigt (jsdom, echter Klickpfad bis zum Rundenstart).\n- [x] Die Versionsnummer im Fußbereich der Seite wurde erhöht. Automatisiert bestätigt („1.21.0\" → „1.22.0\").\n\n**Offener Punkt (wie bei jedem Layout-Ticket):** Ein kurzer eigener Blick von Stephan im echten Browser bleibt trotz der automatisierten Chromium-Tests empfohlen, bevor das Ticket endgültig als vollständig geprüft gilt.\n\n**Fundstellen-Sweep:** Gesucht nach `<details` (native Aufklapp-Elemente) im gesamten `public/index.html`: genau 2 Treffer, beide in `renderModePicker()` (Zeilen 752 und 761) — exakt die beiden im Ticket genannten Infoboxen. Ergänzend nach der Klasse `.moredet`/`.modecards` gesucht: kommt ausschließlich auf diesem einen Bildschirm vor, keine weitere Fundstelle im Spiel. Keine weiteren Fundstellen — Ticket deckt das Problem vollständig ab.\n\n**Zustands-Check:** Wartezustand: entfällt — rein clientseitiges, natives Auf-/Zuklappen ohne Laden oder Netzwerkzugriff. Leerzustand: entfällt — beide Infoboxen sind in jedem Spieldurchlauf gleichermaßen vorhanden. Fehlerfall: entfällt — kein Netzwerkzugriff, keine Eingabevalidierung; das native Aufklappen kann nicht fehlschlagen, es kann höchstens (das ist ja gerade der Bug) optisch abrupt wirken.\n\n**Analyse & Planung:** Am echten Code verifiziert (`public/index.html`, `renderModePicker()`): Beide Infoboxen sind native `<details class=\"moredet\"><summary>…<\/summary>…<\/details>`-Elemente ohne jede CSS-Übergangsangabe. Die beiden Moduskarten liegen in einem CSS-Grid `.modecards{display:grid;grid-template-columns:1fr 1fr}` (Zeile 174) — auf breiten Bildschirmen nebeneinander in derselben Zeile. Da Grid-Elemente standardmäßig auf gleiche Höhe gestreckt werden und jede `.modecard{display:flex;flex-direction:column}` einen `.story{flex:1}`-Absatz enthält, der freien Platz auffüllt, wächst beim Öffnen der ersten Box automatisch auch die zweite Karte mit — ihr `.story`-Absatz dehnt sich, wodurch Button und zweite Infobox sichtbar nach unten rutschen, bevor der zweite Klick ankommt. Unter 640px Breite (`@media(max-width:640px){.modecards{grid-template-columns:1fr}}`, Zeile 175) stehen die Karten ohnehin untereinander — dort schiebt das Öffnen der ersten Box die zweite direkt und noch deutlicher nach unten. Beide Fälle haben dieselbe Grundursache: der native Sprung passiert ohne jeden Übergang, sodass ein schneller zweiter Klick die alte Position trifft statt der neuen.\n\n**Pre-Mortem:**\n- 💀 Der Fix wirkt nur auf breiten Bildschirmen, aber auf Handy-Breite (gestapeltes Layout) rutscht die zweite Box weiterhin abrupt weg → Gegenmaßnahme: eigenes Akzeptanzkriterium deckt ausdrücklich beide Breiten ab, Testplan prüft beide.\n- 💀 Die Übergangs-Animation wird nur von manchen Browsern unterstützt und fällt in anderen unbemerkt auf den alten harten Sprung zurück → Gegenmaßnahme: im Ticket dokumentieren, dass ein harter Fallback ohne Animation kein Fehler ist, solange die Grundfunktion (Klick trifft) erhalten bleibt; Testplan prüft primär im aktuellen Chrome.\n- 💀 Die Änderung an der gemeinsam genutzten `.modecard`/`.modecards`-Struktur wirkt sich unbemerkt auf einen anderen Bildschirm aus → Gegenmaßnahme: Fundstellen-Sweep hat vorab bestätigt, dass diese Klassen nur auf dem Start-/Moduswahlbildschirm vorkommen.\n- 💀 Der jsdom-Regressionstest kann die eigentliche visuelle Verschiebung nicht prüfen (keine echte Layout-Engine) und suggeriert fälschlich vollständige Testabdeckung → Gegenmaßnahme: Testplan hält offen fest, dass die visuelle Bestätigung nur per Chrome-Browser-Test bzw. Stephans eigenem Blick erfolgt, nicht per jsdom.\n- 💀 Die Versionsnummer wird trotz sichtbarer CSS-Änderung vergessen zu erhöhen → Gegenmaßnahme: eigenes Akzeptanzkriterium und eigener Testschritt dafür, wie bei jedem bisherigen Ticket.\n\n**Optionenvergleich:**"}, {"id": "BUG-003", "title": "Deutsche Anführungszeichen statt englische in Spieltexten", "type": "BugFix", "priority": "Niedrig", "lane": "done", "created": "2026-07-23", "started": "", "done_at": "", "body": "| Feld | Wert |\n|------|------|\n| **Typ** | BugFix |\n| **Priorität** | Niedrig |\n| **Status** | Done |\n| **Erstellt** | 2026-07-23 |\n| **Done seit** | 2026-07-24 |\n\n**Beschreibung:** Laut Ersteindruck-Testlauf tauchen im durchgehend englischsprachigen Spiel wiederholt deutsche Anführungszeichen (\"…\") statt englischer (\"…\"/'…') auf. Am echten Code verifiziert: 183 Fundstellen von „ bzw. “ in `public/index.html`.\n\n**User Story:** Als Spielerin/Spieler möchte ich durchgängig korrekte englische Anführungszeichen sehen, sodass der sonst sehr polierte Eindruck der App nicht getrübt wird.\n\n**Bezug:** Ersteindruck-Testlauf 23.07.2026 (Finding 2).\n\n**Scope:** Eingeschlossen: alle Textstellen im gesamten Spiel, die deutsche Anführungszeichen verwenden, werden auf die im übrigen Spiel bereits verwendete korrekte englische Form umgestellt. Ausgeschlossen: die an vielen anderen Stellen im Spiel bereits korrekt englischen Anführungszeichen (bleiben unverändert); Apostrophe (sind bereits durchgängig korrekt, bleiben unverändert); jede inhaltliche Änderung an den Spieltexten selbst — reine Zeichenumstellung.\n\n**Akzeptanzkriterien:**\n- [x] Überall im Spiel, wo bisher ein Zitat oder eine wörtliche Aussage in deutschen Anführungszeichen stand, erscheint jetzt stattdessen die englische Form. Automatisiert bestätigt: alle 84 Paare paarbewusst ersetzt, per echtem Render-Test an einer Bankszenario-Kundenanfrage und mehreren gemeinsam genutzten Spieltexten (u. a. einem Textblock mit vier Paaren) geprüft.\n- [x] Die an anderen Stellen im Spiel bereits korrekten englischen Anführungszeichen sehen weiterhin genauso aus wie bisher. Automatisiert bestätigt: die 15 bereits korrekten Paare sind unangetastet (Zeichen-Gesamtzahlen stimmen exakt mit der Vorab-Rechnung überein), zusätzlich per echtem Render-Test an der „don't do this\"-Beispielstelle geprüft, inklusive des direkt danebenstehenden, unverändert gebliebenen Apostrophs.\n- [x] Kein Wort oder Satz wurde inhaltlich verändert — ausschließlich die Anführungszeichen selbst. Automatisiert bestätigt: reine Zeichen-Ersetzung per Skript (keine Wortänderung möglich), Apostroph-Gesamtzahl vor/nach identisch (534).\n- [x] Die Versionsnummer im Fußbereich der Seite wurde erhöht. Automatisiert bestätigt („1.22.0\" → „1.23.0\").\n\n**Fundstellen-Sweep:** Systematisch nach allen deutschen/untypischen Anführungszeichen-Varianten im gesamten `public/index.html` gesucht (nicht nur die im Ticket genannten zwei Zeichen): 84 öffnende deutsche Anführungszeichen, jeweils sauber gepaart mit einem eigenen schließenden Zeichen direkt danach (per Musterabgleich verifiziert: alle 84 Paare schließen unmittelbar mit dem nächsten Anführungszeichen, keine verschachtelten oder unvollständigen Paare). Wichtiger Fund, der über die reine Trefferzahl aus der Ticket-Beschreibung hinausgeht: von den insgesamt 99 Vorkommen des als Schluss-Zeichen genutzten Zeichens sind nur 84 tatsächlich die Schluss-Hälfte eines deutschen Paares — die übrigen 15 sind die öffnende Hälfte bereits korrekter, an anderer Stelle im Spiel längst vorhandener englischer Anführungszeichen-Paare (mit ebenfalls 15 zugehörigen, bereits korrekten Schluss-Zeichen) und dürfen NICHT verändert werden. Zusätzlich geprüft: keine deutschen einfachen Anführungszeichen und keine französischen Guillemets (« ») im gesamten Dokument — 0 Treffer. Alle 84 betroffenen Paare liegen ausschließlich innerhalb des einzigen `<script>`-Blocks (0 Treffer in HTML-Markup oder CSS außerhalb) — 69 davon in den Bankszenario-Texten (u. a. zitierte Kundenanfragen), 15 in den übrigen, von allen Szenarien gemeinsam genutzten Spieltexten (Fragen, Debrief-Texte). Keine weiteren Fundstellen — die Suche deckt jede in diesem Dokument vorkommende Anführungszeichen-Zeichenart ab, nicht nur die zwei aus der Ticket-Beschreibung.\n\n**Zustands-Check:** Wartezustand: entfällt — reine, synchrone Textänderung ohne Laden oder Netzwerkzugriff. Leerzustand: entfällt — die betroffenen Textstellen sind in jedem Spieldurchlauf und bei jedem betroffenen Szenario gleichermaßen vorhanden, es gibt keinen Fall „kein Text vorhanden\". Fehlerfall: entfällt — rein clientseitige, statische Zeichenänderung, kein neues Fehlerverhalten nötig oder vorgesehen.\n\n**Pre-Mortem:**\n- 💀 Eine der 84 Fundstellen wird beim Ersetzen übersehen (z. B. durch einen unerwarteten Zeilenumbruch mitten in einem Paar) → Gegenmaßnahme: nach der Ersetzung erneut automatisiert zählen, dass kein deutsches öffnendes Anführungszeichen mehr im Dokument vorkommt, statt der Ersetzung blind zu vertrauen.\n- 💀 Die 15 bereits korrekten englischen Anführungszeichen-Paare an anderer Stelle im Spiel werden versehentlich mit verändert, weil zeichenweise statt paarbewusst ersetzt wird → Gegenmaßnahme: nur die 84 deutschen öffnenden Zeichen und ihr jeweils direkt folgender Schluss-Partner werden ersetzt; im Testplan wird explizit gegengeprüft, dass exakt 15 bereits-korrekte Paare unverändert bleiben (weder mehr noch weniger).\n- 💀 Ein Apostroph wird versehentlich mit einem der beiden betroffenen Anführungszeichen verwechselt und ungewollt mitgeändert → Gegenmaßnahme: die paarbasierte Ersetzung rührt Apostrophe grundsätzlich nicht an; im Testplan wird die Gesamtzahl der Apostrophe vor und nach der Änderung verglichen (muss identisch bleiben).\n- 💀 `GAME_VERSION` wird trotz sichtbarer Textänderung vergessen zu erhöhen → Gegenmaßnahme: eigenes Akzeptanzkriterium und eigener Testschritt dafür, wie bei jedem bisherigen Ticket.\n\n**Optionenvergleich:**"}, {"id": "BUG-002", "title": "„Team debrief\"/„facilitator\" widerspricht der Einzelspieler-Rahmung im Agent-Modus", "type": "BugFix", "priority": "Mittel", "lane": "done", "created": "2026-07-23", "started": "", "done_at": "", "body": "| Feld | Wert |\n|------|------|\n| **Typ** | BugFix |\n| **Priorität** | Mittel |\n| **Status** | Done |\n| **Erstellt** | 2026-07-23 |\n| **Done seit** | 2026-07-24 |\n\n**Beschreibung:** Laut Ersteindruck-Testlauf (23.07.2026) sprechen die wiederkehrenden Debrief-Kästen nach fast jedem Schritt (\"Team debrief — pause and talk\" / \"💬 Talk as a team: …\") und der Satz \"The facilitator picks one …\" auf dem Szenario-Auswahlbildschirm durchgehend eine Gruppe an, obwohl der Agent-Modus als Einzelspiel gedacht ist. Am echten Code verifiziert: Die gemeinsam von Agent- und Team-Modus genutzte Funktion `debriefHTML()` (public/index.html) hat den Team-Wortlaut fest einprogrammiert, unabhängig vom Modus; ebenso ist der Satz mit \"facilitator\" fest im Szenario-Auswahltext verankert.\n\n**User Story:** Als Spielerin/Spieler im Einzelspiel-Modus (\"Collaborate with Agents\") möchte ich durchgehend als Einzelperson angesprochen werden, sodass ich nicht denke, etwas verpasst zu haben oder eigentlich in einer Gruppensitzung sein zu müssen.\n\n**Hinweis zur Scope-Erweiterung (Stephan, 2026-07-24):** Die Einzelansprache soll für die direkte Ansage an die spielende Person in beiden Modi (Agent- und Team-Modus) gelten, nicht nur im Agent-Modus. Der bestehende „For facilitators\"-Baustein bleibt ausdrücklich erhalten und wird inhaltlich erweitert (welche agilen Methoden der jeweilige Modus simuliert) sowie zusätzlich im Team-Modus ergänzt, damit Coaches/Trainer:innen beide Modi als Gruppensitzung anleiten können. Damit wächst dieses Ticket über eine reine Fehlerbehebung hinaus (es entsteht neuer, redaktioneller Inhalt) — bewusst als ein Ticket belassen, siehe Notiz in der Analyse.\n\n**Scope:**\nEingeschlossen: Alle direkten Ansage-Texte an die spielende Person — der Begrüßungsbildschirm ganz am Anfang, die Überschrift auf dem Modus-Auswahlbildschirm, die wiederkehrende Diskussions-Box nach jedem Spielschritt, der Satz zur Szenario-Auswahl sowie die Abschlussfrage am Ende einer Agent-Modus-Runde — werden in beiden Modi (Agent- und Team-Modus) konsistent an eine einzelne Person gerichtet. Der bestehende „For facilitators\"-Button samt Infofeld im Agent-Modus bleibt erhalten und wird um Informationen zu den simulierten agilen Methoden ergänzt; ein gleichwertiger Facilitator-Button samt eigenem, zum Team-Modus passendem Infofeld wird neu auf dem Team-Modus-Auswahlbildschirm ergänzt.\nAusgeschlossen: alle Inhalte der 21 Bankszenarien selbst (Kartentexte, Übungsoptionen — dort kommt „team\"/„everyone\" nur als gewöhnliche Fachsprache über die simulierte Software vor, nicht als Ansage an die spielende Person); die Einführungs-/Stimmungstexte der beiden Modus-Karten auf dem Auswahlbildschirm (beschreiben die jeweilige Spielprämisse, keine Gruppen-Ansage); die Einstiegs-Erzähltexte des Agent-Modus sowie sämtliche Rollen- und Reflexionsinhalte des Team-Modus (Rollen-Aufstellung, Diskussionsfragen zum eigenen Team) — das ist die eigentliche Spielgeschichte bzw. eine inhaltlich sinnvolle Reflexionsfrage zum eigenen Team und bleibt laut Stephans Entscheidung unverändert; BUG-003 und BUG-004 (eigene Tickets).\n\n**Akzeptanzkriterien:**\n- [x] Der Begrüßungsbildschirm und die Überschrift auf dem Modus-Auswahlbildschirm sprechen dich als Einzelperson an, unabhängig davon, welchen Modus du danach wählst. Automatisiert bestätigt.\n- [x] Nach jedem Spielschritt spricht die Diskussions-Box dich als Einzelperson an — identisch im Agent- und im Team-Modus (kein Unterschied mehr zwischen den Modi nötig). Automatisiert bestätigt: `debriefHTML()`-Wrapper ist zeichengleich in beiden Modi.\n- [x] Der Satz zur Szenario-Auswahl spricht dich als Einzelperson an — sowohl im Agent- als auch im Team-Modus. Automatisiert bestätigt.\n- [x] Die Abschlussfrage am Ende einer Agent-Modus-Runde spricht dich als Einzelperson an. Automatisiert bestätigt (über `renderFinale()`).\n- [x] Der „For facilitators\"-Button mit Infofeld ist weiterhin im Agent-Modus vorhanden und erklärt zusätzlich, welche agilen Methoden dieser Modus simuliert (Definition of Ready, Given/When/Then, Pre-Mortem, Analyse- vs. Cycle-Zeit). Automatisiert bestätigt (Button vorhanden, klappt auf, Inhalt enthält die genannten Begriffe).\n- [x] Ein gleichwertiger Facilitator-Button mit eigenem, zum Team-Modus passendem Infofeld ist neu auf dem Team-Modus-Auswahlbildschirm vorhanden (zeitlich begrenztes Refinement, ein oft fehlender Product Owner, eine Definition of Ready, die nur zählt, wenn sie wirklich stimmt, später auftauchende offene Fragen). Automatisiert bestätigt.\n- [x] Im Team-Modus zeigen die Rollen-Aufstellung und alle inhaltlichen Reflexionsfragen weiterhin unverändert Team-Bezug — nur die direkte Ansage wurde umgestellt, nicht die Spielgeschichte selbst. Automatisiert bestätigt (Regressionscheck auf „Who's in the room?\" und ein Fachtext-Beispiel aus den 21 Szenarien).\n- [x] Die Versionsnummer im Fußbereich der Seite wurde erhöht. Automatisiert bestätigt („1.20.0\" → „1.21.0\").\n\n**Fundstellen-Sweep:** Gesucht nach „the team\", „your team\", „everyone\", „the whole team\", „as a team\", „the room\" und „facilitator\" im gesamten `public/index.html` (nicht aus der Ticket-Beschreibung übernommen, sondern selbst nachgezählt, ca. 75 Treffer gesamt):\n- Direkte Ansage an die spielende Person (Ebene 2, in Scope): Begrüßungs-Overlay `ovIntro` (\"your team just got a two-line ticket, and everyone's itching to start\", \"choose how your team works today\") — 1 Fundstelle vor jeder Moduswahl; Überschrift auf `renderModePicker()` (\"Choose how your team works today\") — 1 Fundstelle; `debriefHTML()`-Wrapper (\"Team debrief — pause and talk\" / \"Talk as a team:\") — von beiden Modi gemeinsam genutzt, 1 Fundstelle; Szenario-Auswahlsatz im Agent-Modus (\"The facilitator picks one …\") — 1 Fundstelle; Szenario-Auswahlsatz im Team-Modus (\"Pick what your team refines today\" / \"Choose one for your team …\") — 2 Fundstellen; Abschlussfrage im Agent-Modus-Finale (\"Last team question: Where does your team most often start …\") — 1 Fundstelle, hat im Team-Modus-Finale keine Entsprechung (dort existiert keine vergleichbare Frage-Box).\n- Facilitator-Baustein (bleibt erhalten, wird erweitert): Button „For facilitators\" + Infofeld „How to run this session\" im Agent-Modus (`facBtn`/`facil`) — 1 Fundstelle, aktuell nur im Agent-Modus vorhanden, wird um agile-Methoden-Infos ergänzt; im Team-Modus existiert dieser Baustein noch nicht und wird neu ergänzt.\n- Ausdrücklich ausgeschlossen (Ebene 1, Spielgeschichte/Fachtext, ca. 70 der ~75 Treffer): rund 50 Erwähnungen von „everyone\"/„the team\" innerhalb der 21 Bankszenarien selbst (z. B. „pay everyone's salary\", „the team agrees the acceptable delay\") — gewöhnliche Fachsprache über die simulierte Banking-Software, kein Bezug zur spielenden Person; die Einführungstexte der beiden Modus-Karten auf dem Auswahlbildschirm (\"agentic software development just joined the team\", \"the whole team is racing toward a deadline\", \"the work is done entirely by the team itself\") — Stimmungstext zur jeweiligen Spielprämisse; die Szenen-Texte des Agent-Modus (\"Your team has picked up this change …\", \"the whole team feels the pull to just get going\") sowie sämtliche Rollen-/Diskussionsinhalte des Team-Modus (Rollen-Aufstellung „wer ist im Raum\", alle Reflexionsfragen mit Bezug auf „your team\") — das ist die eigentliche Spielgeschichte bzw. eine inhaltlich sinnvolle Reflexionsfrage zum eigenen Team, laut Stephans Entscheidung vom 24.07.2026 unverändert; die Abschluss-Erzählung im Team-Modus-Finale (\"Your team shipped the change …\") — beschreibt das fiktive Spielergebnis, keine Ansage an die spielende Person.\n\n**Zustands-Check:** Wartezustand: entfällt — reiner statischer Text, kein Laden, kein Netzwerkzugriff. Leerzustand: entfällt — alle betroffenen Textstellen sind in jedem Spieldurchlauf und bei jedem der 21 Szenarien gleichermaßen vorhanden. Fehlerfall: entfällt — rein clientseitige, statische Textänderung plus zwei neue, aber unkomplizierte Auf-/Zuklapp-Buttons (kein Netzwerkzugriff, kein neues Fehlerverhalten nötig oder vorgesehen).\n\n**Pre-Mortem:**\n- 💀 Eine der mehreren betroffenen Ansage-Stellen wird beim Umschreiben übersehen (z. B. nur die Diskussions-Box angepasst, die Abschlussfrage oder der Begrüßungsbildschirm vergessen) → Gegenmaßnahme: Testplan prüft jede der im Fundstellen-Sweep gelisteten Ansage-Stellen einzeln, nicht nur stichprobenartig.\n- 💀 Der neue Facilitator-Button im Team-Modus wird per Copy-Paste eingebaut und stört dabei versehentlich die bestehende Szenario-Auswahl (z. B. überschneidende Element-IDs oder Klick-Handler) → Gegenmaßnahme: eigener Test, der den neuen Button klickt und danach bestätigt, dass Szenario-Auswahl und Rundenstart im Team-Modus weiterhin normal funktionieren.\n- 💀 Die neuen bzw. erweiterten Facilitator-Inhalte werden für beide Modi identisch/generisch formuliert, obwohl sie unterschiedliche agile Methoden erklären sollen → Gegenmaßnahme: eigenes Akzeptanzkriterium, das inhaltlich unterschiedliche, modusspezifische Inhalte verlangt, vor Abschluss von Stephan im Browser gegengelesen.\n- 💀 Die Abgrenzung „nur die Ansage ändert sich, die Spielgeschichte bleibt\" wird bei der Umsetzung nicht konsequent durchgehalten und es rutschen versehentlich auch Spielgeschichte-Textstellen mit rein (z. B. die Team-Modus-Rollen-Aufstellung) → Gegenmaßnahme: die Ausschluss-Liste im Fundstellen-Sweep bleibt als verbindliche Referenz im Ticket stehen; eigenes Akzeptanzkriterium bestätigt, dass die Spielgeschichte im Team-Modus unverändert Team-Bezug zeigt.\n- 💀 Die Versionsnummer wird trotz mehrerer sichtbarer Textänderungen und zwei neuer UI-Elemente vergessen zu erhöhen → Gegenmaßnahme: eigenes Akzeptanzkriterium und eigener Test dafür, wie bei jedem bisherigen Ticket.\n- 💀 Beim Vereinheitlichen von `debriefHTML()` auf einen einzigen, modusunabhängigen Wortlaut bleibt eine alte Fallunterscheidung im Code stehen, die künftig nie mehr greift, aber Verwirrung stiftet → Gegenmaßnahme: in der Umsetzung explizit prüfen, ob überhaupt eine Fallunterscheidung nach Modus nötig bleibt, und wenn nicht, sie entfernen statt toten Code zurückzulassen.\n\n**Optionenvergleich:**\n\n✅ **Entscheidung 1 (Stephan, 2026-07-24):** Die Einzelansprache betrifft ausschließlich die direkte Ansage an die spielende Person (Ebene 2 — Begrüßung, Diskussions-Box, Szenario-Auswahlsatz, Abschlussfrage), nicht die eigentliche Spielgeschichte des Team-Modus (Ebene 1 — Rollen-Aufstellung, Reflexionsfragen zum eigenen Team). Grund: Ebene 1 ist der eigentliche Inhalt des Team-Modus und wurde im Ersteindruck-Test nicht als verwirrend gemeldet; eine Änderung dort würde das Konzept des Modus selbst verändern, ohne das gemeldete Problem zu lösen.\n\n✅ **Entscheidung 2 (Stephan, 2026-07-24):** Der Facilitator-Button samt Infofeld bleibt erhalten und wird auf beide Modus-Auswahlbildschirme ausgeweitet (bisher nur Agent-Modus), mit modusspezifischem Inhalt zu den jeweils simulierten agilen Methoden. Grund: Coaches/Trainer:innen sollen weiterhin beide Modi als Gruppensitzung anleiten können — die Einzelansprache im Spieltext selbst und ein separates Anleitungs-Infofeld für Facilitator:innen widersprechen sich nicht, sie sind unterschiedliche Ebenen.\n\n**Analyse & Planung:**\n- [x] Repo-Stand vor Beginn geprüft: HEAD `47bd7d7` (Stephans gemergter Analyse-Commit), `GAME_VERSION` „1.20.0\", `git status` sauber, keine ausstehenden Änderungen.\n- [x] Begrüßungs-Overlay (`ovIntro`): Einzelansprache statt „your team\"/„everyone\".\n- [x] Überschrift auf `renderModePicker()`: Einzelansprache statt „Choose how your team works today\".\n- [x] `debriefHTML()`: einheitlicher, einzelpersonen-adressierter Wortlaut für beide Modi. Es gab entgegen der Vermutung im Pre-Mortem keine bestehende Modus-Fallunterscheidung im Code — die Funktion war schon immer unbedingt (ein fester String für beide Modi), nur der String selbst war falsch. Kein toter Code zu entfernen.\n- [x] Agent-Modus-Szenarioauswahl (`renderPicker()`): Einzelansprache statt „The facilitator picks one …\"; Facilitator-Button/Infofeld bleibt erhalten, um einen Absatz zu den im Agent-Modus simulierten agilen Methoden ergänzt (Definition of Ready, Given/When/Then, Pre-Mortem, Analyse-/Cycle-Zeit).\n- [x] Team-Modus-Szenarioauswahl (`renderTeamPicker()`): Einzelansprache statt „Pick what your team refines today\"/„Choose one for your team …\"; neuer Facilitator-Button (`teamFacBtn`/`teamFacil`, eigene IDs ohne Kollision mit den Agent-Modus-IDs) mit eigenem Infofeld zu den im Team-Modus simulierten agilen Methoden (zeitlich begrenztes Refinement, oft fehlender Product Owner, Definition of Ready nur wirksam wenn echt geprüft, später auftauchende offene Fragen).\n- [x] Agent-Modus-Finale (`renderFinale()`): Einzelansprache statt „Last team question: Where does your team most often start …\".\n- [x] `GAME_VERSION` von „1.20.0\" auf „1.21.0\" erhöht (Minor, sichtbare Textänderung plus zwei neue UI-Elemente, analog zu allen bisherigen Tickets).\n\n**Testplan:**\n- [x] Neue dauerhafte Testdatei `tests/BUG-002.test.js` (tatsächlich ausgeführt, grün, 7/7 Checks): Begrüßung/Moduswahl-Überschrift einzelpersonen-adressiert; `debriefHTML()`-Wrapper in Agent- und Team-Modus geprüft und als zeichengleich bestätigt; Agent-Szenarioauswahl einzelpersonen-adressiert, Facilitator-Button/-Infofeld weiterhin vorhanden, klappt per echtem Klick auf/zu, Inhalt nennt die simulierten Methoden; Team-Szenarioauswahl einzelpersonen-adressiert, neuer Facilitator-Button/-Infofeld vorhanden, klappt auf, Inhalt nennt eigene Methoden, UND per echtem Klick bestätigt, dass Szenario-Auswahl/Rundenstart danach weiterhin funktionieren (Regressionsschutz gegen den im Pre-Mortem befürchteten ID-/Handler-Konflikt); Agent-Finale einzelpersonen-adressiert (über `renderFinale()`, gleicher Kurzweg wie in `FEATURE-011.test.js`); Team-Modus-Rollen-Aufstellung („Who's in the room?\") sowie ein Fachtext-Beispiel aus den 21 Szenarien ausdrücklich als unverändert bestätigt.\n- [x] `node --check` auf das extrahierte `<script>`-Innere: fehlerfrei.\n- [x] Pflicht-Regressionslauf gegen alle 15 bestehenden Testdateien, von mir selbst ausgeführt: 11 grün, 4 (`FEATURE-009.test.js`, `FEATURE-010.test.js`, `FEATURE-011.test.js`, `FEATURE-012.test.js`) schlagen ausschließlich an ihrer eigenen, fest einprogrammierten alten `GAME_VERSION`-Zeile fehl (erwarten „1.16.0\"/„1.17.0\"/„1.18.0\"/„1.19.0\") — dasselbe bekannte, bereits mehrfach akzeptierte Muster wie bei jedem früheren Versionssprung (siehe z. B. FEATURE-013); keine dieser vier Dateien wurde angefasst, und keine ihrer übrigen Prüfpunkte (u. a. `FEATURE-011.test.js`s eigener Agent-Finale-Check auf die unveränderte Ideal-Analyse-Zahl) schlägt fehl. Kein inhaltlicher Funktionsverlust in irgendeiner der 15 Dateien.\n- [x] **Begründung Testabdeckung:** Die geänderte Stelle in `debriefHTML()` ist geteilte, modusunabhängige Logik (identisch für alle 21 Szenarien in beiden Modi) — ein Test mit `SCENARIOS[0]` ist dafür repräsentativ, ein Durchspielen aller 21 nicht nötig. Die übrigen geänderten Stellen (Begrüßung, beide Szenario-Auswahlbildschirme, Agent-Finale) sind jeweils szenario-unabhängige, feste Bildschirmtexte.\n- [ ] Echter Blick im Browser (Desktop und Handy-Breite) bleibt offener Punkt, bis Stephan ihn selbst bestätigt — insbesondere die redaktionelle Formulierung der beiden Facilitator-Infofelder (agile Methoden pro Modus), das kann jsdom nicht beurteilen.\n\n**Implementierungsnotizen:**\nUmgesetzt in `public/index.html` (Basis: HEAD `47bd7d7`, Stephans gemergter Analyse-Commit, `GAME_VERSION` „1.20.0\", vor Beginn per `git log`/`git status` geprüft — sauberer Stand). Sieben Textstellen geändert: Begrüßungs-Overlay (`ovIntro`), Moduswahl-Überschrift (`renderModePicker()`), `debriefHTML()`-Wrapper (jetzt „Debrief — pause and reflect\" / „Think it through:\" statt „Team debrief — pause and talk\" / „Talk as a team:\", unverändert für beide Modi identisch), Agent-Szenarioauswahl-Satz (`renderPicker()`), Team-Szenarioauswahl-Sätze (`renderTeamPicker()`), Agent-Finale-Frage (`renderFinale()`). Zwei neue Facilitator-Infofeld-Absätze ergänzt (Agent-Modus: bestehendes Infofeld um einen Absatz „What this mode simulates\" erweitert; Team-Modus: komplett neuer Button `teamFacBtn` + Infofeld `teamFacil`, wiederverwendet die bestehende `.facil`-CSS-Klasse, keine neue CSS-Regel nötig). Entgegen der im Pre-Mortem befürchteten Fallunterscheidung gab es in `debriefHTML()` keine Modus-Verzweigung zu entfernen — die Funktion war schon immer unbedingt, nur ihr String war falsch. Alle Änderungen mit dem im restlichen Spiel vorherrschenden typografischen Apostroph (’) geschrieben, keine deutschen Anführungszeichen (Abgrenzung zu BUG-003). `GAME_VERSION` „1.20.0\" → „1.21.0\". Neue dauerhafte Testdatei `tests/BUG-002.test.js`. Diese Sitzung lief als Cloud-Sandbox ohne Zugriff auf Stephans echtes Repo/Mac (anonymer, push-rechtloser Lese-Klon von GitHub, aufbauend auf Stephans zuvor selbst gepushtem Analyse-Commit `47bd7d7`) — `public/index.html`, `tests/BUG-002.test.js` und die aktualisierte `Backlog.md` werden Stephan wie beim Analyse-Schritt per Git-Bundle zugestellt.\n\n**Release:** Als v1.21.0 released (Commit `f07fdc0`, gemergt aus dem sandboxseitig via Git-Bundle zugestellten Implementierungs-Commit). GitHub Action „Deploy to Firebase Hosting on merge\" (Run 21, Commit f07fdc0) grün, 31s Laufzeit. Live-Verifikation per eigenständigem Chrome-Browser-Subagenten (harter Reload gegen `learning.stephanschumann.com`): Footer zeigt „Spec or Regret v1.21.0\"; Begrüßung und Moduswahl-Überschrift einzelpersonen-adressiert; Agent-Modus-Szenarioauswahl einzelpersonen-adressiert, bestehender „For facilitators\"-Button samt neuem Absatz zu den simulierten agilen Methoden (Definition of Ready, Given/When/Then, Pre-Mortem) live bestätigt; Team-Modus-Szenarioauswahl einzelpersonen-adressiert, neuer „For facilitators\"-Button samt eigenem Infofeld (zeitlich begrenztes Refinement, oft fehlender Product Owner, Definition of Ready, später auftauchende offene Fragen) live bestätigt; Team-Modus-Rollen-Aufstellung („Who's in the room?\") weiterhin unverändert mit Team-Bezug. Die Debrief-Box selbst wurde live nicht bis zum Ende durchgeklickt (Zeitdruck-Sortierspiel im Team-Modus) — dafür verlassen wir uns auf die 7 grünen automatisierten Checks in `tests/BUG-002.test.js`, die `debriefHTML()` direkt für beide Modi prüfen. Stephan hat das Ticket am 24.07.2026 auf Done gesetzt.\n\n**Bezug:** Ersteindruck-Testlauf 23.07.2026 (Finding 1 + 5); Scope am 24.07.2026 gemeinsam mit Stephan erweitert (Einzelansprache in beiden Modi, Facilitator-Baustein bleibt und wird ausgeweitet)."}, {"id": "FEATURE-013", "title": "Kurze Erklärungen für Fachbegriffe ergänzen (Given/When/Then, Definition of Ready, Pre-mortem)", "type": "Feature", "priority": "Niedrig", "lane": "done", "created": "2026-07-23", "started": "", "done_at": "", "body": "| Feld | Wert |\n|------|------|\n| **Typ** | Feature |\n| **Priorität** | Niedrig |\n| **Status** | Done |\n| **Erstellt** | 2026-07-23 |\n| **Done seit** | 2026-07-23 |\n\n**Beschreibung:** Laut Ersteindruck-Testlauf werden Fachbegriffe wie \"Given/When/Then\", \"Definition of Ready\" und \"pre-mortem\" im Spiel verwendet und im Kontext angedeutet, aber nirgends in einem kurzen Satz ausdrücklich definiert — für komplette Neulinge ohne Vorwissen eine Hürde. Am echten Code verifiziert: \"Given/When/Then\" taucht 3×, \"Definition of Ready\" 14× und nutzerseitig sichtbares \"pre-mortem\" 6× auf, jeweils ohne eigene Ein-Satz-Erklärung beim ersten Auftreten.\n\n**User Story:** Als Spielerin/Spieler ohne Vorwissen möchte ich beim ersten Auftreten eines Fachbegriffs eine kurze Erklärung in Klammern sehen, sodass ich der Spielhandlung folgen kann, ohne den Begriff selbst nachschlagen zu müssen.\n\n**Scope:**\nEingeschlossen: In den Bildschirmtexten, die während eines tatsächlichen Spieldurchlaufs erscheinen — sowohl im Agenten-Modus als auch unabhängig davon im Team-Modus, weil beide einen eigenen, in sich abgeschlossenen Ablauf haben —, bekommt jeder der drei Begriffe („Given/When/Then\", „Definition of Ready\", „Pre-mortem\") bei seinem jeweils ersten Auftreten eine kurze, in Klammern angehängte Erklärung in Alltagssprache, direkt im bestehenden Satz ergänzt. Reine Textänderung, kein neues UI-Element.\nAusgeschlossen: die beiden aufklappbaren „What's different here?\"-Infoboxen auf dem Startbildschirm (dort tauchen alle drei Begriffe ebenfalls auf, aber die Boxen sind standardmäßig eingeklappt und laut BUG-004 bereits mit einem eigenen Layout-Problem behaftet — eine Änderung dort gehört in ein eigenes Ticket, nicht in dieses kleine Textfeature); jede weitere Wiederholung eines Begriffs nach seinem jeweils ersten Auftreten im selben Modus (z. B. der spätere Team-Chat-Hinweis oder die Abschluss-Aufschlüsselung) — dort bleibt der Text unverändert; jede inhaltliche Änderung an Spiellogik, Szenarien oder Bewertung.\n\n**Akzeptanzkriterien:**\n- [x] Im Agenten-Modus steht beim ersten Mal, wenn im Spielverlauf von „Pre-mortem\" die Rede ist, direkt daneben in Klammern eine kurze Erklärung, was damit gemeint ist — der Rest des Bildschirms bleibt unverändert. Automatisiert bestätigt (`tests/FEATURE-013.test.js`, über die echte Render-Funktion `debriefHTML()`).\n- [x] Im Agenten-Modus steht beim ersten Mal, wenn von „Given/When/Then\" die Rede ist, direkt daneben in Klammern eine kurze Erklärung. Automatisiert bestätigt.\n- [x] Im Agenten-Modus steht beim ersten Mal, wenn von der „Definition of Ready\" die Rede ist, direkt daneben in Klammern eine kurze Erklärung. Automatisiert bestätigt (über `stageHead()`).\n- [x] Im Team-Modus steht dasselbe für alle drei Begriffe an ihrer jeweils eigenen ersten Stelle — unabhängig vom Agenten-Modus, weil jemand auch ausschließlich den Team-Modus spielen kann, ohne je den Agenten-Modus gesehen zu haben. Automatisiert bestätigt (`buildTeamStages()` + `debriefHTML()`/`stageHead()`).\n- [x] Bei jeder späteren Wiederholung desselben Begriffs (in beiden Modi) bleibt der Text wie bisher, ohne die Erklärung erneut zu zeigen. Automatisiert bestätigt: jede der drei Erklärungsphrasen kommt im Quelltext exakt zweimal vor (einmal Agent-, einmal Team-Modus), und keine taucht in `renderModePicker()` (die beiden ausgeschlossenen Infoboxen) auf.\n- [ ] Die Erklärungen sind kurz genug, dass sie sich in den bestehenden Satzfluss einfügen, ohne dass der Textblock abgeschnitten wirkt oder auf Handy-Breite unleserlich eng umbricht. **Offen** — das ist eine visuelle/Layout-Frage, die jsdom nicht prüfen kann; steht im Testplan als offener Punkt für Stephans eigenen Blick.\n- [x] Der übrige Spielablauf (Fortschritt, Bewertung, Punktestand) verhält sich exakt wie vorher — es handelt sich ausschließlich um zusätzlichen erklärenden Text. Durch den vollständigen Regressionslauf gegen alle 14 bestehenden Testdateien bestätigt (siehe Testplan).\n\n**Fundstellen-Sweep:** Gesucht nach den drei Begriffen im gesamten `public/index.html` (nicht aus der Ticket-Beschreibung übernommen, sondern selbst nachgezählt):\n- „Given/When/Then\" bzw. „Given / When / Then\" (Regex `given[ /]*when[ /]*then`, case-insensitive): 4 Fundstellen. Davon 1 in der eingeklappten Startbildschirm-Infobox (ausgeschlossen, s. Scope), 1 in der Agenten-„build\"-Stage (Debrief-Text, erste sichtbare Stelle im Agenten-Modus), 1 in der Team-„teamgherkin\"-Stage (Debrief-Text, erste sichtbare Stelle im Team-Modus), 1 in einem späteren Team-Chat-Hinweis mitten im Build (Wiederholung, nach der Team-„teamgherkin\"-Stage, daher out of scope).\n- „Definition of Ready\" (exakte Phrase): 12 Fundstellen. Davon 2 in den eingeklappten Startbildschirm-Infoboxen (ausgeschlossen), 3 in der Agenten-„Definition of Ready\"-Boss-Stage (Kicker/Setup/Debrief — Kicker ist die erste sichtbare Stelle im Agenten-Modus), 3 in der Team-„teamdor\"-Stage (Kicker/Title/Debrief — Kicker/Title ist die erste sichtbare Stelle im Team-Modus), 3 in späteren Team-Bildschirmen (Chat-Hinweis, Rework-Eintrag, Abschluss-Zusammenfassung — alle Wiederholungen nach der teamdor-Stage, daher out of scope), 1 in einem Code-Kommentar (nicht am Bildschirm sichtbar, keine Fundstelle im eigentlichen Sinn).\n- „pre-mortem\"/„Pre-mortem\" nutzerseitig sichtbar (ausgenommen interne Bezeichner wie `sc.premortem`, `premortemSuccess`, `kind:\"premortem\"`, die nie am Bildschirm erscheinen): 5 Fundstellen. Davon 1 in der eingeklappten Startbildschirm-Infobox (ausgeschlossen), 1 im Agenten-Modus (Badge-Name „Pre-mortem\" + Debrief-Text derselben Stage, zusammen die erste sichtbare Stelle im Agenten-Modus), 1 im Team-Modus (Badge-Name + Debrief-Text derselben Stage, erste sichtbare Stelle im Team-Modus). Der Begriff taucht zusätzlich als Badge-Name in der Abschluss-Aufschlüsselung (`analysisRows()`, beide Modi) erneut auf — das ist eine Wiederholung nach der jeweils ersten Stelle, daher unverändert (siehe Scope).\n- Ergebnis: 6 tatsächliche Bearbeitungsstellen (je 3 Begriffe × 2 Modi), alle übrigen Fundstellen sind entweder ausgeschlossene Infoboxen oder Wiederholungen nach der jeweils ersten Stelle.\n\n**Zustands-Check:** Wartezustand: entfällt — reiner statischer Text, kein Laden, kein Netzwerkzugriff. Leerzustand: entfällt — die Textstellen sind in jedem der 21 Szenarien und in jedem Spieldurchlauf gleichermaßen vorhanden, es gibt keinen Fall „kein Text vorhanden\". Fehlerfall: entfällt — rein clientseitige, statische Textänderung, kein neues Fehlerverhalten nötig oder vorgesehen.\n\n**Pre-Mortem:**\n- 💀 Eine Erklärung wird an einer Stelle ergänzt, die im jeweiligen Modus gar nicht wirklich die erste ist, weil eine Verzweigung im Spielablauf übersehen wurde → Gegenmaßnahme: Fundstellen-Sweep hat die Reihenfolge anhand der tatsächlichen Schrittfolge (`buildStages`/`buildTeamStages`) nachvollzogen, nicht geraten; der Testplan prüft die Reihenfolge zusätzlich per echtem Klickdurchlauf.\n- 💀 Die Klammer-Erklärung verändert versehentlich den bestehenden Wortlaut mit (z. B. verrutschtes Satzzeichen mitten in einem bestehenden String) statt ihn nur zu ergänzen → Gegenmaßnahme: jede Änderung ist eine reine Ergänzung, der bestehende Text bleibt zeichengleich erhalten; Syntax-Check plus visueller Blick auf den gerenderten Text im Testplan.\n- 💀 Eine Erklärung wird versehentlich doch in einer der beiden „What's different here?\"-Infoboxen ergänzt und vermischt sich mit dem noch offenen Layout-Problem aus BUG-004 → Gegenmaßnahme: im Scope ausdrücklich ausgeschlossen; Fundstellen-Sweep dokumentiert genau, welche der Fundstellen bearbeitet werden.\n- 💀 Die neu geschriebenen Erklärungstexte übernehmen versehentlich deutsche Anführungszeichen statt englischer (BUG-003 ist ein eigenes, noch offenes Ticket zum selben Zeitpunkt) → Gegenmaßnahme: neue Texte durchgängig mit englischen Anführungszeichen/Apostrophen schreiben, wie der Rest des Spiels; im Testplan mitgeprüft.\n- 💀 `GAME_VERSION` wird bei dieser sichtbaren Textänderung vergessen zu erhöhen → Gegenmaßnahme: fester Bestandteil der Implementierungsnotizen, wie bei jedem bisherigen Ticket.\n\n**Optionenvergleich:**\n\n*Option A – Klammer-Erklärung direkt an der ersten Fundstelle je Modus (empfohlen):* An genau den 6 identifizierten Stellen (3 Begriffe × 2 Modi) wird die bestehende Textstelle um eine kurze Klammer-Erklärung ergänzt, sonst bleibt alles unverändert. Vorteil: entspricht exakt der User Story („beim ersten Auftreten\"), minimaler Eingriff (reine Textergänzung an bestehenden Stellen, keine neue Funktion, kein neues UI-Element), sehr geringes Regressionsrisiko. Nachteil: die Erklärung ist an genau die eine Formulierung gebunden, in der der Begriff zuerst auftaucht — ändert sich diese Formulierung später (z. B. neuer Debrief-Text), muss die Erklärung mit umgezogen werden.\n\n*Option B – Zentraler Mini-Glossar-Mechanismus (z. B. Tooltip/Klick-Info):* Eine neue, wiederverwendbare UI-Komponente zeigt die Erklärung bei Hover/Tap, unabhängig davon, an welcher Textstelle der Begriff steht. Vorteil: konsistent, skaliert auf künftige weitere Fachbegriffe, keine Bindung an eine bestimmte Formulierung. Nachteil: deutlich größerer Eingriff (neues Markup, CSS, Klick-/Tap-Handling auch auf Handy-Breite), höheres Regressionsrisiko, für „Niedrig\"-Priorität und drei einmalige Begriffe unverhältnismäßig aufwendig.\n\n*Option C – Nur die beiden Startbildschirm-Infoboxen ergänzen:* Erklärungen ausschließlich in den beiden „What's different here?\"-Boxen, der Spieltext selbst bleibt unangetastet. Vorteil: nur 2 Stellen statt 6. Nachteil: löst das eigentliche Problem nicht zuverlässig — die Boxen sind eingeklappt, ein Klick darauf ist optional, und laut Ersteindruck-Test ist genau das die beobachtete Hürde (Begriffe tauchen im Spielverlauf auf, ohne dass man je die Box geöffnet hat). Nicht empfohlen.\n\n✅ **Empfehlung:** Option A — einzige Option, die zuverlässig genau das löst, was der Ersteindruck-Test gezeigt hat (Begriffe tauchen im tatsächlichen Spielverlauf ohne Erklärung auf), bei minimalem Eingriff und minimalem Risiko, passend zur „Niedrig\"-Priorität dieses Tickets.\n\n**Analyse & Planung:**\n- [x] Agenten-Modus, „build\"-Stage (Debrief-Text): Klammer-Erklärung bei „Given / When / Then\" ergänzt.\n- [x] Agenten-Modus, „select premortem\"-Stage (Debrief-Text): Klammer-Erklärung bei „Pre-mortem\" ergänzt (Badge-Name selbst unverändert gelassen — ein Badge-Label ist kein Fließtext, die Erklärung sitzt im direkt daneben angezeigten Debrief-Satz derselben Stage).\n- [x] Agenten-Modus, „Definition of Ready\"-Boss-Stage (Setup-Text): Klammer-Erklärung bei „Definition of Ready\" ergänzt (nicht im Kicker — der ist ein kurzes Label/Tag, ungeeignet für einen Klammerzusatz; die Erklärung sitzt stattdessen im Fließtext direkt darunter, auf demselben Bildschirm).\n- [x] Team-Modus, „teamgherkin\"-Stage (Debrief-Text): Klammer-Erklärung bei „Given/When/Then\" ergänzt.\n- [x] Team-Modus, „teamselect premortem\"-Stage (Debrief-Text): Klammer-Erklärung bei „Pre-mortem\" ergänzt.\n- [x] Team-Modus, „teamdor\"-Stage (Title): Klammer-Erklärung bei „Definition of Ready\" ergänzt (hier stand der Begriff — anders als im Agenten-Modus — nur im Title, nicht im Setup-Text; deshalb dort ergänzt).\n- [x] Alle übrigen Fundstellen (Infoboxen, Team-Chat-Hinweis, Rework-Eintrag, Abschluss-Aufschlüsselung) unverändert gelassen, wie im Scope festgelegt — automatisiert gegengeprüft (siehe Testplan).\n- [x] `GAME_VERSION` von „1.19.0\" auf „1.20.0\" erhöht (Minor, sichtbare neue Funktion, analog FEATURE-004/005/006/007/010/011/012).\n\n**Testplan:**\n- [x] Neue dauerhafte Testdatei `tests/FEATURE-013.test.js` (tatsächlich ausgeführt, grün, 4/4 Checks): prüft für Agenten- und Team-Modus je einzeln, dass der erwartete Erklärungstext an der jeweils richtigen Stage vorhanden ist — **nicht** per Klickdurchlauf durch die vorherigen Stufen (bei einer reinen Textänderung ohne Ablaufabhängigkeit unverhältnismäßig), sondern direkt über die echten Render-Funktionen (`buildStages()`/`buildTeamStages()` liefern die reale Stage-Konfiguration, `stageHead()`/`debriefHTML()` erzeugen daraus das tatsächliche HTML) — das deckt denselben Rendering-Code ab wie ein Klickdurchlauf, ohne unnötig Spiellogik mitzusimulieren, die dieses Ticket gar nicht berührt. Zusätzlich geprüft: bestehender Wortlaut zeichengleich erhalten (reine Ergänzung, kein Reword), jede Erklärungsphrase kommt im Quelltext exakt zweimal vor, keine der drei Phrasen taucht in `renderModePicker()` auf.\n- [x] `node --check` auf das extrahierte `<script>`-Innere: fehlerfrei.\n- [x] Pflicht-Regressionslauf gegen alle 14 bestehenden Testdateien, von mir selbst ausgeführt: 10 grün, 4 (`FEATURE-009.test.js`, `FEATURE-010.test.js`, `FEATURE-011.test.js`, `FEATURE-012.test.js`) schlagen ausschließlich an ihrer eigenen, fest einprogrammierten alten `GAME_VERSION`-Zeile fehl (erwarten „1.16.0\"/„1.17.0\"/„1.18.0\"/„1.19.0\") — dasselbe bekannte, bereits mehrfach akzeptierte Muster wie bei jedem früheren Versionssprung; keine dieser vier Dateien wurde angefasst. Kein inhaltlicher Funktionsverlust in irgendeiner der 14 Dateien.\n- [x] **Begründung Testabdeckung:** reine Textänderung ohne Berührung gemeinsamer Berechnungs- oder Ablauflogik; die sechs betroffenen Stellen sind unabhängig vom gewählten Szenario identisch (Prüfung erfolgte gegen `SCENARIOS[0]`, stellvertretend für alle 21), ein Durchspielen aller 21 Szenarien ist dafür nicht nötig.\n- [ ] Echter Blick im Browser (Desktop und Handy-Breite) bleibt offener Punkt, bis Stephan ihn selbst bestätigt — insbesondere ob die Klammer-Erklärungen auf Handy-Breite zu störenden Zeilenumbrüchen führen (siehe offenes AK oben).\n\n**Implementierungsnotizen:**\nUmgesetzt in `public/index.html` (Basis: HEAD `8513672`, `GAME_VERSION` „1.19.0\", vor Beginn per `git log`/`git status` geprüft — sauberer Stand). An den 6 in der Analyse identifizierten Stellen wurde der jeweils bestehende String um eine Klammer-Erklärung ergänzt, ohne ein Zeichen des Originaltexts zu verändern: Agenten-„build\"-Stage (`debrief.take`), Agenten-„select premortem\"-Stage (`debrief.take`), Agenten-Boss-Stage (`setup`), Team-„teamgherkin\"-Stage (`debrief.take`), Team-„teamselect premortem\"-Stage (`debrief.take`), Team-„teamdor\"-Stage (`title`). Alle drei Erklärungstexte durchgängig mit dem im restlichen Spiel vorherrschenden typografischen Apostroph (’) geschrieben, keine deutschen Anführungszeichen verwendet (Abgrenzung zu BUG-003). `GAME_VERSION` „1.19.0\" → „1.20.0\". Neue dauerhafte Testdatei `tests/FEATURE-013.test.js`. Diese Sitzung lief als Cloud-Sandbox ohne Zugriff auf Stephans echtes Repo/Mac (nur ein anonymer, push-rechtloser Lese-Klon von GitHub) — `public/index.html`, `tests/FEATURE-013.test.js` und die aktualisierte `Backlog.md` werden Stephan direkt als Dateien zugestellt, damit er sie selbst in sein Repo übernehmen kann.\n\n**Release:** Als v1.20.0 released (Commit `d1000c5`, gemergt aus `feature-013`). GitHub Action „Deploy to Firebase Hosting on merge\" (Run 18) grün. Live-Verifikation per eigenständigem Chrome-Browser-Subagenten: `agent-contract-game.web.app` und `learning.stephanschumann.com` zeigen beide „v1.20.0\"; alle drei Erklärungen (Given/When/Then, Pre-mortem, Definition of Ready) in Agent- und Team-Modus per echtem Browser-JS gegen die reale Render-Funktion (`debriefHTML()`/`stageHead()`) bestätigt; keine Konsolenfehler aus dem Spiel selbst. Stephan hat das Ticket auf Done gesetzt; der einzige im Testplan offen gebliebene Punkt (Handy-Breite/Zeilenumbruch der Klammer-Erklärungen) wurde dabei nicht gesondert rückgemeldet — nicht als „geprüft\" zu verstehen, nur als von Stephan nicht mehr blockierend eingestuft.\n\n**Bezug:** Ersteindruck-Testlauf 23.07.2026 (Finding 3)."}, {"id": "FEATURE-012", "title": "Die übrigen 20 Bank-Themen auch im Team-Modus spielbar machen", "type": "Feature", "priority": "Mittel", "lane": "done", "created": "2026-07-23", "started": "", "done_at": "", "body": "| Feld | Wert |\n|------|------|\n| **Typ** | Feature |\n| **Priorität** | Mittel |\n| **Status** | Done |\n| **Erstellt** | 2026-07-23 |\n| **Done seit** | 2026-07-23 |\n\n**Beschreibung:** Der Team-Modus (FEATURE-008) läuft heute technisch fest auf genau einem der 21 Bank-Themen („Second approver for large payments\", intern `four-eyes`) — das war beim ursprünglichen Vertical-Slice-Ticket bewusst so begrenzt und ausdrücklich als eigenes Folgeticket vorgemerkt („die übrigen 20 Szenarien im Team-Modus\"). Am echten Code nachgeprüft (nicht angenommen): Der komplette Team-Modus-Ablauf selbst — Besetzung, Meeting mit Kategorien-Sortierung, Formulierungsübung, zwei Weggabelungen, Vorausschau, Abgrenzung, Checkliste, Übergabe, Abschluss — verarbeitet die Inhalte eines Themas bereits durchgängig generisch, genau wie es der Agenten-Modus für alle 21 Themen tut. Es fehlt im Kern nur eine Stelle, an der für den Team-Modus überhaupt eines der 21 Themen ausgewählt wird, statt immer dasselbe zu verwenden.\n\n**User Story:** Als Moderator:in/Spielerin möchte ich im Team-Modus zwischen allen 21 Bank-Themen wählen (oder eines auswürfeln lassen) können — genau wie im Agenten-Modus —, damit ich eine zur Runde passende Geschichte wählen kann und der Team-Modus nicht dauerhaft auf ein einziges, immer gleiches Thema beschränkt bleibt.\n\n**Scope:**\nEingeschlossen: alle 21 im Spiel bereits vorhandenen Bank-Themen werden im Team-Modus spielbar, mit demselben Ablauf, derselben Anzahl und Reihenfolge an Schritten wie beim bisherigen einen Thema; ein eigener Auswahlbildschirm vor dem Meeting-Start, auf dem eines der 21 Themen bewusst gewählt oder ausgewürfelt werden kann (Option A, siehe Optionenvergleich — von Stephan am 23.07.2026 entschieden).\nAusgeschlossen: die geplante thematische Gruppierung der 21 Themen auf dem Startbildschirm (eigenes, separates Ticket FEATURE-009, noch nicht umgesetzt) — eine neue Team-Auswahl zeigt die 21 Themen zunächst flach, genau wie aktuell auch im Agenten-Modus; eigene Facilitator-Hinweistexte für den Team-Modus (bereits an anderer Stelle als eigenes Folgeticket vorgemerkt); jede Änderung an der Grundpreis-/Schätz-Logik für die „Fast Start\"-Vergleichszeile, die bereits bewusst themenunabhängig gestaltet ist und unverändert für alle 21 Themen gilt; jede Änderung am Agenten-Modus über das reine Nachlesen hinaus.\n\n**Akzeptanzkriterien:**\n- [x] Im Team-Modus lässt sich vor dem Meeting jedes der 21 Bank-Themen auswählen (oder zufällig auswürfeln) — nicht mehr nur das eine bisherige Thema. Neuer Auswahlbildschirm (`renderTeamPicker()`) automatisiert bestätigt.\n- [x] Jedes der 21 Themen ist strukturell bestätigt spielbar (automatisierte Formprüfung aller 21); tatsächlich per echtem Klick bis ins Finale durchgespielt wurden 3 unterschiedliche, verteilte Themen (Index 0/10/20) — **nicht alle 21 einzeln bis zum Abschlussbildschirm**, das wäre unverhältnismäßig gegenüber dem strukturellen Nachweis. Ein echter Blick auf ein paar weitere Themen im Browser bleibt Stephan überlassen (siehe Testplan).\n- [x] Bei jedem der 21 Themen zeigen Meeting-Board, Vorausschau und Abgrenzung tatsächlich zum jeweiligen Thema passende Inhalte — für die 3 tatsächlich gespielten Themen automatisiert bestätigt (kein „undefined\", enthält den echten Szenario-Kurztext im Finale); für die übrigen 18 durch die identische, bereits geprüfte generische Rendering-Logik plus die bestätigte Datenform gedeckt.\n- [x] Der Agenten-Modus verhält sich unverändert (alle 21 Themen weiterhin da, keine Regressionen) — vollständiger Regressionslauf bestätigt dies (siehe Testplan).\n- [x] Bei keinem der 21 Themen taucht im Team-Modus ein Agentenbezug (Text oder 🤖-Symbol) auf — Fundstellen-Sweep nach der Implementierung wiederholt, neuer Bildschirm frei von Agentenbezug.\n- [x] Keine Konsolenfehler bei irgendeinem der 21 Themen; die Versionsanzeige wird erhöht (jetzt „1.19.0\"). Konsolenfehler-Freiheit automatisiert (jsdom) geprüft; ein echter Browser-Konsolencheck steht wie immer noch aus (siehe Testplan).\n\n**Fundstellen-Sweep:** Gesucht nach `TEAM_SCENARIO_ID`/`findTeamScenario` (die Stelle, die den Team-Modus heute auf ein Thema festlegt): genau 1 Fundstelle. Zusätzlich programmatisch geprüft (Node-Skript gegen die echte, aktuelle Themenliste im Code, alle 21 Einträge einzeln durchlaufen): jedes der 21 Themen hat exakt dieselbe Datenform wie das bisher genutzte „four-eyes\" — 8 Meeting-Board-Karten (1 Ziel/3 Regeln/2 Beispiele/2 offene Fragen), 6 Vorausschau-Punkte, 7 Abgrenzungspunkte, vollständige Verhaltens-Beispiele für den glücklichen Fall, den Fehlerfall und einen Randfall — ausnahmslos bei allen 21, keine Lücke. Das bedeutet: der gesamte bestehende Team-Ablauf braucht inhaltlich keine Anpassung pro Thema, er verarbeitet heute schon jedes beliebige Thema gleich. Zusätzlich gesucht nach „four-eyes\" im gesamten Code: nur die 2 erwarteten Fundstellen (die Themendefinition selbst und die genannte Konstante) — keine weitere Stelle im Code ist an dieses eine Thema gebunden. Keine weiteren Fundstellen.\n\n**Zustands-Check:** Wartezustand: Die Auswahl eines Themas ist — wie im Agenten-Modus — ein sofortiger Klick ohne Ladezeit, kein eigener Wartezustand nötig. Leerzustand: nicht relevant, alle 21 Themen sind immer vorhanden, es gibt keinen Fall „kein Thema verfügbar\". Fehlerfall: rein clientseitig, kein Netzwerkzugriff nötig, daher kein neues Fehlerverhalten vorgesehen. Das einzige echte Risiko wäre ein künftig neu angelegtes 22. Thema, das nicht der heute bei allen 21 bestätigten Datenform entspricht (z. B. nur eine statt zwei offene Fragen) — dafür ist ein automatisierter Test vorgesehen, der diese Form für jedes Thema in der Liste prüft, statt sich nur auf die heutige Stichprobe zu verlassen (siehe Testplan).\n\n**Pre-Mortem:**\n- 💀 Ein künftig neu hinzugefügtes Thema hält sich nicht an die heute bei allen 21 bestätigte Datenform und der Team-Modus zeigt dafür einen leeren oder kaputten Text, ohne dass es auffällt → Gegenmaßnahme: automatisierter Test, der diese Form für jedes einzelne Thema prüft, nicht nur stichprobenartig, fester Bestandteil jedes künftigen Regressionslaufs.\n- 💀 Ein neuer Auswahlbildschirm für den Team-Modus verändert den Klick-Ablauf direkt nach „Work as a Team\" — die neun bestehenden, aufbewahrten Testdateien zum Team-Modus gehen bisher davon aus, dass direkt danach die Besetzungsliste erscheint, und würden ohne Anpassung fehlschlagen → Gegenmaßnahme: siehe Optionenvergleich; eine Anpassung dieser Testdateien erfolgt nur rein additiv (ein zusätzlicher Auswahl-Klick-Schritt, keine bestehende Prüfung wird entfernt oder abgeschwächt) und nur mit Stephans ausdrücklicher Freigabe.\n- 💀 Der neue Team-Auswahlbildschirm übernimmt versehentlich Agenten-Wortlaut oder die lila Agenten-Farbe statt der Team-Sprache/-Farbe → Gegenmaßnahme: eigener Fundstellen-Sweep auf „Agent\"/🤖 im neuen Bildschirm, eigenes Akzeptanzkriterium, durchgängig die bestehende Team-Akzentfarbe.\n- 💀 Beim Entfernen der festen Themen-Festlegung bleibt eine Restabhängigkeit stehen und der Agenten-Modus verliert versehentlich eines der 21 Themen oder verändert sein Verhalten → Gegenmaßnahme: vollständiger Regressionslauf inklusive aller bestehenden Agenten-Modus-Prüfungen vor jeder Auslieferung, wie bei jedem bisherigen Team-Modus-Ticket.\n- 💀 Die Versionsanzeige wird bei dieser sichtbaren Änderung vergessen zu erhöhen → Gegenmaßnahme: fester Bestandteil der Implementierungsnotizen, wie bei jedem bisherigen Ticket.\n\n**Optionenvergleich:**\n\n*Option A – Eigener Team-Auswahlbildschirm vor der Besetzung (empfohlen):* Ein neuer, team-typisch gestalteter Bildschirm (eigene Render-Funktion, gleiche Karten-Mechanik wie der bestehende Themen-Bildschirm des Agenten-Modus, aber eigener Wortlaut/eigene Farbe, kein Agentenbezug) erscheint nach Klick auf „Work as a Team\" und vor der Besetzungsliste; dort wird eines der 21 Themen bewusst gewählt oder ausgewürfelt. Vorteil: echte Wahlfreiheit, genau gleichwertig zum Agenten-Modus — entspricht auch am genauesten Deiner ursprünglichen Formulierung „die anderen 20 Szenarien … auch verfügbar\". Kosten: verändert den Klick-Ablauf direkt nach „Work as a Team\" — die neun bestehenden Team-Modus-Testdateien brauchen dafür je einen zusätzlichen, rein mechanischen Klick-Schritt, was nur mit Deiner ausdrücklichen Freigabe umgesetzt wird (siehe Pre-Mortem).\n\n*Option B – Zufällige Auswahl aus allen 21, kein neuer Bildschirm:* „Work as a Team\" verhält sich exakt wie heute (sofortiger Start direkt in die Besetzungsliste), zieht dabei aber zufällig eines von 21 Themen statt immer dasselbe. Vorteil: keine der bestehenden Testdateien muss angefasst werden, der Klick-Ablauf bleibt unverändert. Nachteil: Moderator:innen können sich im Team-Modus — anders als im Agenten-Modus — nicht gezielt für ein zum Raum passendes Thema entscheiden, nur der Zufall entscheidet.\n\n*Option C – Team-Modus zieht weiterhin nur „four-eyes\", die übrigen 20 bleiben ungenutzt:* Kein Aufwand, aber löst die eigentliche Anforderung nicht — wird hier nur der Vollständigkeit halber als Nicht-Option benannt.\n\n✅ **Empfehlung:** Option A — sie ist die einzige, die Deine ursprüngliche Anforderung (die 20 übrigen Themen tatsächlich verfügbar machen, mit echter Wahl statt nur Zufall) vollständig erfüllt. Der Preis dafür (neun bestehende Testdateien brauchen einen zusätzlichen Klick-Schritt) ist real und wird hier bewusst nicht kleingeredet — das ist der zentrale Punkt, den ich Dir zur Entscheidung vorlege, bevor implementiert wird. Falls Dir der Eingriff in die bestehenden Tests zu groß ist, ist Option B ein risikoärmerer Rückfall ohne Testaufwand, nur eben ohne gezielte Themenwahl im Team-Modus.\n\n✅ **Entscheidung (Stephan, 23.07.2026):** Option A. Damit ist zugleich die in Option A benannte Konsequenz ausdrücklich freigegeben: die neun bestehenden Team-Modus-Testdateien dürfen um den zusätzlichen, rein additiven Auswahl-Klick-Schritt ergänzt werden — keine bestehende Prüfung wird dabei entfernt oder abgeschwächt, nur um einen Schritt vor der Besetzungsliste ergänzt.\n\n**Analyse & Planung:**\n- [x] Repo-Stand vor Beginn geprüft: HEAD `2b86fc6`, `GAME_VERSION` „1.18.0\", `git status` sauber, keine ausstehenden Änderungen.\n- [x] Kernbefund am echten Code: die Funktion, die aus einem Thema die Team-Modus-Schritte baut, sowie alle zugehörigen Anzeige-Funktionen (Besetzung, Meeting-Board, Formulierungsübung, beide Weggabelungen, Vorausschau/Abgrenzung, Checkliste, Übergabe, Abschluss) verarbeiten ausschließlich generische, pro Thema vorhandene Datenfelder (Meeting-Board-Karten, Verhaltens-Beispiele, Vorausschau, Abgrenzung) — identisch zu den Feldern, die der Agenten-Modus für alle 21 Themen nutzt. Programmatisch geprüft: alle 21 Themen haben exakt dieselbe Feldform (siehe Fundstellen-Sweep). Einzige tatsächliche Festlegung auf ein Thema: eine einzelne Konstante plus eine kleine Nachschlage-Funktion beim Start des Team-Modus.\n- [x] Umgesetzt: der Team-Modus-Start erhält das gewählte Thema übergeben, statt es fest nachzuschlagen; die feste Themen-Konstante und ihre Nachschlage-Funktion sind entfernt.\n- [x] Umgesetzt: neue Anzeige-Funktion für den Team-Auswahlbildschirm, zeigt dieselbe Themen-Karten-Liste wie der bestehende Agenten-Auswahlbildschirm (Titel/Kurztext je Thema, „Surprise us\"-Zufallsknopf), mit team-typischem Wortlaut und der bestehenden Team-Akzentfarbe (`.btn.team`) statt Agenten-Wortlaut/-Farbe. Eigene Element-IDs (`teamScenlist`/`teamStartBtn`/`teamRndBtn`), damit keine Kollision mit den Agenten-Picker-IDs entstehen kann.\n- [x] Die Grundpreis-/Schätz-Berechnung für die „Fast Start\"-Vergleichszeile bleibt unverändert (bereits bei ihrer eigenen Einführung bewusst themenunabhängig gestaltet).\n\n**Testplan:**\n- [x] Neue dauerhafte Testdatei `tests/FEATURE-012.test.js` (4 Prüfpunkte, tatsächlich ausgeführt, grün): (1) alle 21 Themen strukturell formgleich (8 Meeting-Karten im 1/3/2/2-Split, 6 Vorausschau-, 7 Abgrenzungspunkte, vollständiges Verhaltens-Beispiel), keine Ausnahme; (2) `GAME_VERSION` = „1.19.0\"; (3) Moduswahl → Team-Auswahlbildschirm → Besetzung-Gating (Besetzung erscheint nachweislich NICHT, bevor ein Thema gewählt wurde); (4) echter, per Klick auf die jeweilige Themen-Karte durchgespielter Team-Durchlauf für 3 unterschiedliche, verteilte Themen (Index 0/10/20, nicht nur „four-eyes\") bis zum echten Finale-Button, ohne „undefined\" in Besetzungs-/Meeting-/Finale-HTML.\n- [x] Pflicht-Regressionslauf gegen alle bestehenden Testdateien: von mir selbst nochmal unabhängig ausgeführt (nicht nur die Behauptung der Umsetzung übernommen) — 12 von 15 Dateien grün. Die 3 verbleibenden (`FEATURE-009.test.js`, `FEATURE-010.test.js`, `FEATURE-011.test.js`) schlagen ausschließlich an ihrer eigenen, fest einprogrammierten alten `GAME_VERSION`-Zeile fehl (erwarten „1.16.0\"/„1.17.0\"/„1.18.0\") — dasselbe bekannte, bereits mehrfach akzeptierte Muster wie bei jedem früheren Versionssprung in diesem Projekt; keine dieser drei Dateien wurde angefasst (nur Stephan darf das). Kein inhaltlicher Funktionsverlust in irgendeiner der 15 Dateien.\n- [x] Syntax-Check (`node --check`) fehlerfrei.\n- **Begründung Testabdeckung:** Diese Änderung berührt eine geteilte, bereits für alle 21 Themen genutzte Ablauflogik sowie den bisher auf ein Thema festgelegten Auswahlmechanismus — der Testdurchlauf über 3 unterschiedliche Themen plus die strukturelle Formprüfung aller 21 belegt „funktioniert für alle 21\", ohne jedes einzeln bis zum Finale spielen zu müssen.\n- [x] Die tatsächlich betroffenen Testdateien mit dem Klick auf „Work as a Team\" (11 Dateien, nicht 9 wie in der ursprünglichen Schätzung — echter `grep`-Befund, siehe Scope-Änderungen unten) bekamen je einen zusätzlichen, rein additiven Auswahl-Schritt direkt danach ergänzt — von mir per `git diff --numstat` gegengeprüft: ausschließlich Zeilen hinzugefügt (0 gelöscht) in allen 11 Dateien, keine bestehende Prüfung entfernt oder abgeschwächt.\n- [x] Echter Blick im Browser durch Stephan durchgeführt und bestanden (neuer Team-Auswahlbildschirm und mehrere der neu spielbaren Themen) — Freigabe 23.07.2026.\n\n**Scope-Änderungen** *(chronologisches Log):*\n- Die ursprüngliche Spec ging von „neun bestehenden Testdateien\" mit `pickTeamMode`-Klick aus; der tatsächliche `grep`-Befund bei der Umsetzung ergab 11 Dateien (21 Einzel-Vorkommen) — die beiden zusätzlichen (`FEATURE-009-visual.test.js` zählt nicht, aber zwei in der ursprünglichen Schätzung übersehene Dateien taten es) wurden identisch behandelt, keine Ausnahme.\n- Die ursprünglich angenommene „ein zusätzlicher Klick-Schritt\" pro Testdatei reichte nicht aus: der neue Zufallsknopf wählt nur ein Thema aus und aktiviert den Start-Button, startet die Runde aber nicht selbst (exakt wie beim bereits bestehenden Vorbild im Agenten-Modus). Es waren zwei zusätzliche, weiterhin rein additive Klicks nötig (Zufallsknopf, dann Start-Button), um wieder deterministisch bei der Besetzungsliste anzukommen — inhaltlich dieselbe Freigabe, nur ein Schritt mehr als ursprünglich geschätzt.\n- Neu im Repo: `package.json`/`package-lock.json` (pinnt `jsdom` als Abhängigkeit) — existierte vorher nicht in diesem Projekt. Laut Implementierungs-Skill-Konvention beim ersten Ticket, das dies braucht, kurz mit Stephan abzustimmen, ob das zum Ticket-Scope gehören soll — hiermit explizit zur Kenntnis vorgelegt, nicht stillschweigend vorausgesetzt.\n\n**Implementierungsnotizen:**\nUmgesetzt in `public/index.html` (Basis: HEAD `2b86fc6`, `GAME_VERSION` „1.18.0\", vor Beginn per `git log`/`git status` geprüft). `TEAM_SCENARIO_ID` und `findTeamScenario()` entfernt. `startTeamMode()` → `startTeamMode(sc)`, nutzt den übergebenen Parameter statt der entfernten Nachschlage-Funktion; der restliche Funktionskörper ist unverändert. Neue Funktion `renderTeamPicker()` (gleiche Karten-Mechanik wie `renderPicker()`, eigene IDs `teamScenlist`/`teamStartBtn`/`teamRndBtn`, Team-Wortlaut ohne Agentenbezug, `.btn.team`-Akzentfarbe, bewusst ohne Facilitator-Aufklapper) zwischen Moduswahl und Besetzungsliste eingefügt; `renderModePicker()`s `pickTeamMode`-Klick ruft jetzt `renderTeamPicker()` statt direkt `startTeamMode()`. `GAME_VERSION` von „1.18.0\" auf „1.19.0\" angehoben (Minor, sichtbare neue Funktion, analog FEATURE-004/005/006/007/010/011). Fundstellen-Sweep nach der Änderung wiederholt: „four-eyes\" kommt im Code jetzt nur noch als Szenario-eigenes `id`-Feld in `SCENARIOS` vor, keine weitere Bindung an dieses eine Thema. Neue dauerhafte Testdatei `tests/FEATURE-012.test.js`; 11 bestehende Testdateien um je zwei additive Klick-Zeilen ergänzt (siehe Scope-Änderungen). Implementiert über einen Subagenten (volle Kontrolle über Code und Tests), Ergebnis von mir eigenständig gegengelesen (Diff Zeile für Zeile, `git diff --numstat` für die additive Eigenschaft der Testdatei-Änderungen, kompletter Regressionslauf selbst nochmal ausgeführt statt nur der Agenten-Meldung vertraut).\n\n**Bezug:** Chat-Anfrage 23.07.2026 („Feature 12: Jetzt benötigen wir die anderen 20 Szenarien aus dem Agent Modus auch im Team Modus.\"); Entscheidung für Option A 23.07.2026."}, {"id": "FEATURE-006", "title": "Einladungs-Overlay vor dem Startbildschirm", "type": "Feature", "priority": "Mittel", "lane": "done", "created": "2026-07-22", "started": "", "done_at": "", "body": "| Feld | Wert |\n|------|------|\n| **Typ** | Feature |\n| **Priorität** | Mittel |\n| **Status** | Done |\n| **Erstellt** | 2026-07-22 |\n| **Done seit** | 2026-07-23 |\n\n**Beschreibung:** Vor dem bisherigen Startbildschirm soll ein kurzes, einladendes Overlay erscheinen (Headline, kurze Erklärung, Spielstart-Button), das man wegklicken kann. Solange das Overlay sichtbar ist, soll der dahinterliegende Startbildschirm-Text nicht sichtbar sein, um nicht abzulenken. Die Anzahl unnötiger Klicks bis zum Spielstart soll dabei möglichst gering bleiben – das Overlay soll den Weg zum Spielstart nicht um einen zusätzlichen Klick-Umweg verlängern.\n\n**User Story:** Als Spielerin/Spieler möchte ich beim ersten Öffnen des Spiels eine kurze Einladung sehen, bevor der eigentliche Startbildschirm erscheint, sodass ich weiß, worum es geht, ohne dass sich der Weg zum eigentlichen Spielstart verlängert.\n\n**Scope:**\nEingeschlossen: Ein neues, wegklickbares Einladungs-Overlay erscheint unmittelbar beim ersten Öffnen des Spiels, bevor der bisherige Startbildschirm (Szenario-Auswahl) zu sehen ist. Solange es sichtbar ist, ist der Startbildschirm dahinter nicht vorhanden – nicht nur optisch verdeckt, sondern schlicht noch nicht aufgebaut. Drei gleichwertige Wege zum Schließen: der Haupt-Button, das im Spiel bereits bekannte ×, und ein Klick auf den abgedunkelten Hintergrund – alle drei führen unmittelbar, ohne weiteren Zwischenschritt, zum bisherigen Startbildschirm. Inhalt: kurze Einladung mit Überschrift, ein bis zwei erklärende Sätze und dem Schließen-Button, im selben visuellen Muster wie die bereits vorhandenen Overlays (Badges, Rework-Log, Rückblick).\nAusgeschlossen: Der Rückweg zur Szenario-Auswahl über „Pick another scenario“ nach einer fertig gespielten Runde bleibt unverändert – dort erscheint die Einladung nicht erneut (sonst würde sie bei jedem neuen Durchlauf in derselben Sitzung stören). Keine Änderung an Spielmechanik, den 21 Szenarien, der Wertung oder den übrigen Bildschirmen. Kein dauerhaftes „schon gesehen“-Merken für Wiederbesuche (passend zur bestehenden Vorgabe, dass nichts dauerhaft im Browser gespeichert wird) – die Einladung erscheint bei jedem neuen Laden der Seite.\n\n**Akzeptanzkriterien:**\n- [x] Beim ersten Öffnen des Spiels erscheint zuerst die Einladung; die Szenario-Auswahl (bisheriger Startbildschirm) ist zu diesem Zeitpunkt nicht zu sehen.\n- [x] Die Einladung lässt sich auf drei Arten wegklicken: über den Haupt-Button, über das gewohnte × oben rechts, und über einen Klick auf den abgedunkelten Bereich außerhalb der Box – alle drei führen direkt zur Szenario-Auswahl, ohne weitere Zwischenschritte.\n- [x] Nach dem Wegklicken sieht die Szenario-Auswahl genauso aus wie bisher vor dieser Änderung (die anzeigende Funktion selbst wurde nicht verändert).\n- [x] Nach einer fertig gespielten Runde führt „Pick another scenario“ weiterhin direkt zur Szenario-Auswahl, ohne die Einladung erneut zu zeigen (automatisiert über denselben Code-Pfad geprüft; siehe Testplan-Einschränkung).\n- [x] Live per Chrome-Browser-Subagent auf `https://agent-contract-game.web.app/` bestätigt (Desktop, 1498×812): Einladung erscheint sofort, Startbildschirm dahinter nicht sichtbar (nur der abgedunkelte, verschwommene Hintergrund erkennbar), Klick auf „Let's begin\" schließt die Einladung und zeigt die Szenario-Auswahl korrekt, `GAME_VERSION` zeigt „v1.7.0\", keine Konsolenfehler beim frischen Laden.\n- [x] Auf einem schmalen Bildschirm (Handy-Breite) bleibt die Einladung vollständig lesbar und der Haupt-Button erreichbar, auch wenn der Text dafür gescrollt werden muss. Von Stephan selbst auf dem Handy bestätigt (23.07.2026) — der Chrome-Browser-Subagent konnte die Fensterbreite in der ursprünglichen Sitzung technisch nicht zuverlässig auf Handy-Breite verkleinern, Stephans eigener Blick war der zuverlässige Weg.\n- [x] Keine Konsolenfehler beim Öffnen, beim Wegklicken auf jede der drei Arten, und beim anschließenden normalen Spielstart (bis auf die bekannte, unabhängige jsdom-Canvas-Einschränkung, siehe Testplan).\n\n**Fundstellen-Sweep:** Gesucht nach allen Aufrufen der Funktion, die den Startbildschirm aufbaut (`renderPicker(`): 3 Treffer – die Definition selbst, der ursprüngliche Aufruf beim ersten Laden der Seite (ganz am Ende des Skripts), und der Aufruf hinter dem Button „Pick another scenario“ auf der Abschlussseite. Nur der erste (initiale Seitenaufbau) soll die neue Einladung zeigen; der zweite (Rückweg nach einer fertig gespielten Runde) bleibt bewusst unverändert – sonst würde die Einladung bei jedem neuen Durchlauf in derselben Sitzung erneut erscheinen, was der Anforderung „möglichst wenige unnötige Klicks“ widerspricht. Keine weiteren Fundstellen.\n\n**Zustands-Check:** Kein Wartezustand nötig – das Schließen der Einladung und der Aufbau der Szenario-Auswahl passieren ohne Ladezeit oder Netzwerkzugriff. Kein Leerzustand relevant – der Inhalt der Einladung ist immer derselbe feste Text, unabhängig von Spielstand oder Szenario. Fehlerfall: kein neues Fehlerverhalten vorgesehen; sollte einer der drei Schließen-Wege aus einem Programmierfehler nicht reagieren, bliebe das Spiel blockiert – deshalb werden im Testplan alle drei Wege einzeln geprüft, nicht nur einer stellvertretend für alle.\n\n**Pre-Mortem:**\n- 💀 Einer der drei Schließen-Wege (Haupt-Button, ×, Hintergrund-Klick) funktioniert wegen eines Tippfehlers nicht und blockiert den Zugang zum Spiel → Gegenmaßnahme: alle drei Wege einzeln im Testplan geprüft, nicht nur einer angenommen.\n- 💀 „Pick another scenario“ zeigt die Einladung versehentlich erneut und nervt beim wiederholten Spielen in einer Workshop-Sitzung → Gegenmaßnahme: bewusst nur der initiale Aufruf zeigt die Einladung (siehe Fundstellen-Sweep), eigenes Akzeptanzkriterium dafür.\n- 💀 Der abgedunkelte, leicht durchscheinende Hintergrund lässt die Szenario-Auswahl doch noch schemenhaft erkennbar wirken, obwohl „nicht sichtbar“ gefordert ist → Gegenmaßnahme: die Szenario-Auswahl wird technisch gar nicht erst aufgebaut, solange die Einladung offen ist – dahinter ist buchstäblich nichts vorhanden, nicht nur optisch verdeckt.\n- 💀 Die Versionsanzeige wird nicht erhöht, obwohl sich sichtbares Verhalten ändert → Gegenmaßnahme: eigenes Akzeptanzkriterium in den Implementierungsnotizen, Versionssprung analog zu früheren sichtbaren Funktionen.\n- 💀 Auf dem Handy sprengt der Einladungstext die Box, oder der Haupt-Button ist nicht erreichbar → Gegenmaßnahme: eigenes Akzeptanzkriterium für Handy-Breite, bestehendes Scroll-Verhalten der Overlays wird wiederverwendet.\n\n**Optionenvergleich:**\n\n*Option A – Startbildschirm wird erst nach dem Schließen aufgebaut (empfohlen):* Die Einladung erscheint sofort; die Szenario-Auswahl wird technisch erst erzeugt, sobald die Einladung geschlossen wird. Vorteil: „nicht sichtbar“ ist damit wörtlich erfüllt, nicht nur optisch abgedunkelt. Nutzt das bereits vorhandene, bewährte Overlay-Muster praktisch unverändert – sehr kleiner, gut abgegrenzter Eingriff nur an der Stelle, an der das Spiel startet. Kein erkennbarer Nachteil.\n\n*Option B – Startbildschirm wird wie gewohnt sofort aufgebaut, Einladung nur optisch darübergelegt:* Technisch am einfachsten, aber die Szenario-Auswahl liegt dann nur abgedunkelt/verschwommen dahinter statt tatsächlich zu fehlen – erfüllt die Anforderung „nicht sichtbar“ nicht zuverlässig.\n\n✅ **Empfehlung:** Option A – einzige Option, die „nicht sichtbar“ wörtlich erfüllt, und dabei trotzdem minimal-invasiv, weil sie das bestehende Overlay-Muster eins zu eins wiederverwendet.\n\n**Analyse & Planung:**\n- [x] Repo-Stand vor Beginn geprüft: HEAD `900dc1f` (v1.6.1), `git status` zeigt nur die erwarteten, unabhängig von diesem Ticket entstandenen Änderungen (Backlog.md/Backlog-Archive.md/tools/ aus TASK-002) – kein zwischenzeitlicher Fremdstand am Spielcode.\n- [x] Bestehendes Overlay-Muster am echten Code verifiziert: drei existierende Overlays (Badges, Rework-Log, Rückblick) sind statische `<div class=\"overlay\">…<div class=\"modal\">…<\/div><\/div>`-Elemente, standardmäßig unsichtbar (`display:none`), werden per `.show`-Klasse eingeblendet. Ein bereits vorhandener, generischer Mechanismus schließt jedes Overlay sowohl über ein `×` mit `data-close` als auch über einen Klick auf den Hintergrund außerhalb der Box.\n- [x] Startbildschirm-Aufbau verifiziert: eine eigene Funktion füllt den Inhaltsbereich der Seite; sie wird aktuell genau einmal beim ersten Laden der Seite aufgerufen (ganz am Ende des Skripts) und ein zweites Mal über „Pick another scenario“ auf der Abschlussseite (siehe Fundstellen-Sweep).\n- [x] Implementierungsansatz: neues Overlay nach demselben Muster wie die drei bestehenden anlegen; der ursprüngliche Aufruf beim ersten Laden der Seite wird durch „Einladung anzeigen“ ersetzt; der Startbildschirm wird erst gebaut, wenn die Einladung auf einem der drei Wege geschlossen wird. Der zweite bestehende Aufruf (Rückweg nach einer Runde) bleibt unverändert.\n- [x] Aufwand: klein – reine Ergänzung im Boot-Ablauf, keine Berührung der szenario-spezifischen Logik oder der 21 Szenario-Inhalte.\n\n**Testplan:**\n- [x] Automatisiert (jsdom, echtes Ausführen der Seite im echten DOM wie bei früheren Tickets): 14 Einzelprüfungen – beim ersten Laden zeigt die Einladung die „show“-Klasse und die Szenario-Auswahl ist noch nicht im Inhaltsbereich vorhanden; danach jeweils einzeln über Haupt-Button, × und Hintergrund-Klick geschlossen und geprüft, dass die Szenario-Auswahl danach korrekt erscheint und die Einladung die „show“-Klasse verloren hat; zusätzlich geprüft, dass ein Klick INNERHALB der Box sie nicht schließt (bestehender genereller Mechanismus). Alle 14 Prüfungen grün.\n- [x] Regressionstest: statt eines vollständigen 21-Schritte-Durchlaufs wurde die anzeigende Funktion nach dem ersten Wegklicken ein zweites Mal direkt aufgerufen – genau der Code-Pfad, den „Pick another scenario“ auch nutzt. Die Einladung bekam dabei NICHT die „show“-Klasse zurück, die Szenario-Auswahl erschien direkt. **Einschränkung:** kein vollständiger End-to-End-Durchlauf über die echte Abschlussseite bis zum Klick auf den echten Button – das deckt denselben Code-Pfad ab, aber nicht den kompletten Klickweg dorthin.\n- [x] Syntax-Check (`node --check`) fehlerfrei.\n- **Be

gründung Testabdeckung:** Diese Änderung berührt keine der 21 szenario-spezifischen Datenstrukturen und keine geteilte Kategorie-Konstante, sondern ausschließlich den einen, szenario-unabhängigen Einstiegspunkt der Seite. Ein Testdurchlauf deckt daher strukturell alle 21 Szenarien ab, weil die Änderung vor jeder Szenario-Auswahl greift, nicht danach.\n- Keine gespeicherte Testsuite aus früheren Tickets im Projekt vorhanden (wie bereits bei BUG-001 vermerkt) – der jsdom-Test für dieses Ticket ist neu.\n- **Bekannte, vom Fix unabhängige Testumgebungs-Einschränkung:** jsdom unterstützt `<canvas>` nicht (Konfetti-Effekt) – ohne einen Stub dafür bricht das gesamte Skript beim ersten Laden ab, bevor überhaupt etwas geprüft werden kann. Für den Test wurde `getContext` daher testseitig auf No-op-Methoden gestubbt (reine Testumgebungs-Anpassung, keine Änderung am echten Spielcode) – dieselbe Einschränkung wurde bereits bei BUG-001 dokumentiert.\n- [x] Echter Blick im Browser (Desktop) durchgeführt und bestanden (siehe Akzeptanzkriterien). Handy-Breite technisch nicht automatisiert prüfbar – Stephans eigener Blick steht noch aus.\n\n**Scope-Änderungen** *(chronologisches Log):*\n*(keine – der zusätzliche Absatz zu Analysis/Cycle/Lead Time im Einladungstext wurde noch vor Implementierungsbeginn während der Textabstimmung ergänzt, nicht nachträglich als Scope-Änderung.)*\n\n**Implementierungsnotizen:**\nUmgesetzt in `public/index.html` (Basis: v1.6.1 / Commit `900dc1f`, vor dem Schreiben per `git status`/Datei-Zeitstempel geprüft – kein zwischenzeitlicher Fremdstand). Neues, statisches Overlay `#ovIntro` nach dem bestehenden Muster der drei vorhandenen Overlays (`ovBadges`/`ovRework`/`ovReview`) direkt im HTML ergänzt, mit `class=\"overlay show\"` von Anfang an sichtbar. Der ursprüngliche, einzelne Aufruf der startbildschirm-aufbauenden Funktion beim ersten Laden der Seite wurde entfernt; `#stageHost` bleibt dadurch leer, bis die Einladung geschlossen wird. Eine neue Funktion `startGame()` entfernt die „show“-Klasse und baut danach den Startbildschirm auf; sie ist an drei Stellen verdrahtet: den Haupt-Button, das ×-Element (bewusst ohne das generische `data-close`-Attribut, damit es eigenständig sowohl schließt als auch den Startbildschirm aufbaut) und – nach den bereits bestehenden generischen Overlay-Handlern platziert, damit die eigene Zuweisung die generische überschreibt – einen Klick auf den Hintergrund des neuen Overlays selbst. Der zweite, bestehende Aufruf derselben Aufbau-Funktion (hinter „Pick another scenario“ auf der Abschlussseite) wurde nicht angefasst. `GAME_VERSION` von „1.6.1“ auf „1.7.0“ angehoben (Minor, da eine echte neue sichtbare Funktion, analog FEATURE-004/005). Einladungstext exakt wie mit Stephan abgestimmt (inkl. des ergänzten Absatzes zu Analysis/Cycle/Lead Time).\n\n**Release:** Als v1.7.0 released (Commit `385029b`). Erster `git push`-Versuch von Stephan scheiterte zweimal an einem lokalen DNS-Problem auf seinem Mac („Could not resolve host: github.com“), unabhängig von diesem Projekt – nach einem DNS-Cache-Reset (`dscacheutil -flushcache`/`killall -HUP mDNSResponder`) erfolgreich gepusht. Vor dem `git add -A` lag eine verwaiste `.git/index.lock` von mehreren `git status`-Aufrufen während der Analyse im Weg (kein laufender Git-Prozess mehr, gefahrlos entfernt). GitHub Action `firebase-hosting-merge.yml` lief grün durch (36s). Live-Verifikation per eigenständigem Chrome-Browser-Subagenten gegen `agent-contract-game.web.app` (Desktop) erfolgreich – siehe Akzeptanzkriterien/Testplan oben. Handy-Breite konnte der Chrome-Subagent in dieser Sitzung nicht zuverlässig erzwingen (Fenster blieb trotz gemeldetem Erfolg in Desktop-Breite) – Stephans eigener Blick auf dem Handy steht noch aus, bevor das Ticket auf Done gesetzt wird."}, {"id": "FEATURE-011", "title": "Lead-Time-Retrospektive: Analyse-/Cycle-Time-Aufschlüsselung im Finale", "type": "Feature", "priority": "Mittel", "lane": "done", "created": "2026-07-23", "started": "", "done_at": "", "body": "| Feld | Wert |\n|------|------|\n| **Typ** | Feature |\n| **Priorität** | Mittel |\n| **Status** | Done |\n| **Erstellt** | 2026-07-23 |\n| **Done seit** | 2026-07-23 |\n\n**Beschreibung:** Der Abschluss-Screen (Agent- und Team-Modus) zeigt heute drei Vergleichsbalken — „The fast start\", „Your run\" und „What it could have been\" — jeweils mit einer Analyse- und einer Cycle-Time-Zahl. Stephan möchte, dass Teams diesen Screen für eine echte Retrospektive nutzen können: nicht nur die Endzahlen sehen, sondern nachvollziehen, welche konkreten Entscheidungen im Durchlauf dazu geführt haben, dass die Zahlen genau so und nicht anders herauskamen. Ausgangspunkt war die Bitte: „Mach mir einen Vorschlag, wie wir den Teams auf der letzten Seite die aktuelle und theoretische Lead Time (mit Details zur Cycle Time und Analysis Time) erklären können — es wäre gut zu wissen, welche Entscheidungen dazu geführt haben, dass sich die jeweiligen Werte so berechnet haben. Das wäre für eine Retrospektive der Spielenden sehr, sehr gut.\"\n\n**User Story:** Als Team, das gerade einen Durchlauf abgeschlossen hat, möchte ich auf dem Abschluss-Screen direkt unter den Vergleichsbalken nachlesen können, welche einzelnen Entscheidungen zur tatsächlichen Analyse- und Cycle-Time geführt haben — und welche zusätzlichen Entscheidungen im bestmöglichen Fall dazugekommen wären —, damit wir das in unserer eigenen Retrospektive konkret besprechen können, statt nur die Endsumme zu sehen.\n\n**Offene Punkte aus der Ticket-Anlage — von Stephan entschieden (23.07.2026):**\n- „Theoretisch\" bedeutet der bestmögliche Lauf überhaupt: jede Entscheidung richtig, keine Abkürzung, kein Rework — nicht (wie die Berechnung bisher tatsächlich arbeitete) der eigene tatsächliche Lauf abzüglich des selbst verursachten Reworks.\n- Umzusetzen ist **Variante B**: die drei bestehenden Vergleichsbalken bleiben unverändert stehen; Cycle-Time- und Analyse-Time-Aufschlüsselung klappen direkt unter den jeweiligen Balken auf (statt wie bisher nur über die kleinen Badge-/Rework-Chip-Overlays weiter oben auf der Seite erreichbar zu sein).\n- Freigabe erteilt, die betroffenen Assertions in `tests/FEATURE-009-consequences.test.js` (Zeilen 243–244, sowie 162–163 zur Konsistenz) auf die neue Definition umzuschreiben — siehe „Zielkonflikt mit bestehendem Test\" unten.\n\n**Zielkonflikt mit bestehendem Test (geklärt, 23.07.2026):** Der bestehende Test `tests/FEATURE-009-consequences.test.js` prüfte für den „What it could have been\"-Balken bisher exakt die alte Definition: im Szenario „everythingBad\" (vier Abkürzungen genommen, dadurch nur 3 von 7 möglichen Analyse-Tagen verdient) erwartete die Assertion in Zeile 243–244, dass der Ideal-Balken `analysisAtHandoff` (die tatsächlich verdiente, reduzierte Zahl — 3d) statt der maximal möglichen Zahl (7d) zeigt. Das widerspricht der jetzt von Stephan festgelegten Definition von „theoretisch\". Da bestehende Tests laut Projektregel nicht ohne Stephans Freigabe geändert werden dürfen, wurde dieser Konflikt offen angesprochen; Stephan hat die Freigabe erteilt, die betroffenen Zeilen (162–163 und 243–244) auf die neue Definition umzuschreiben (siehe Implementierungsnotizen für die konkrete neue Erwartung).\n\n**Fundstellen-Sweep:** `completeStep(st,container,extra,noCredit)` (Zeile ~376) vergibt Analyse-Tage/Badge nur, wenn `noCredit` nicht gesetzt ist — bei einer Abkürzung (Team-Modus: Map-Timeout, vage Verhaltensbeschreibung, geratener Business-Value, vertagte Frage) wird die Gutschrift komplett übersprungen, taucht aber später als eigener, benannter Rework-Eintrag in `S.rework` wieder auf (`renderTeamImpl`). `S.badges` (Array `{e,name,i}`) verzeichnet nur tatsächlich vergebene Gutschriften, keine verpassten. `STAGES` (von `buildStages`/`buildTeamStages` erzeugt) trägt an jeder Analyse-Stufe ein festes `analysisDays`-Feld (im aktuellen Datenstand durchgehend 1) — das ist unabhängig davon, ob die Stufe später tatsächlich Gutschrift bekommt, und eignet sich deshalb als robuste Quelle für „maximal mögliche Analyse-Tage in diesem Lauf\" (Summe über `STAGES`, nicht über `S.badges`). `renderFinale()` (Agent-Modus, Zeile ~550) und `renderTeamFinale()` (Team-Modus, Zeile ~1157) berechnen beide `idealCycle=Math.max(0,actualCycle-reworkTotal)` — das ergibt bereits rechnerisch exakt den festen Bau-Grundpreis (`buildDays`, isBoss-Stufe) ohne jedes Rework, also bereits „kein Rework\" im Sinne von Stephans Definition; **nur die Analyse-Seite des Ideal-Balkens war falsch** (bisher `analysis` = tatsächlich verdiente Zahl statt der maximal möglichen). Im Agent-Modus ist das faktisch nie sichtbar, weil dort jede Analyse-Stufe (Kategorisieren/Bauen/Auswählen) so lange wiederholt werden muss, bis sie korrekt gelöst ist — es gibt keinen Pfad, auf dem Analyse-Gutschrift verlorengeht; `analysis` und die maximal mögliche Zahl sind dort immer identisch. Im Team-Modus dagegen kann durch die vier möglichen Abkürzungen tatsächlich eine Lücke entstehen (siehe Zielkonflikt oben) — dort war der Fehler real sichtbar.\n\n**Zustands-Check:** Kein neuer Wartezustand (rein clientseitige Berechnung aus bereits vorhandenem `S`/`STAGES`-Zustand). Kein neuer Leerzustand nötig — auch ein Lauf ganz ohne jede Abkürzung liefert eine sinnvolle (dann leere „nichts verpasst\")-Aufschlüsselung. Kein neues Fehlerverhalten.\n\n**Scope:**\nEingeschlossen: (1) Korrektur der „Ideal\"/„theoretisch\"-Berechnung in `renderFinale()` und `renderTeamFinale()`, sodass die Analyse-Seite des „What it could have been\"-Balkens immer die maximal mögliche Analyse-Zeit dieses Laufs zeigt (Summe der `analysisDays` über alle `STAGES`), nicht die tatsächlich verdiente. (2) Neue, direkt unter dem „Your run\"- und dem „What it could have been\"-Balken aufklappbare Aufschlüsselung (Variante B): pro Balken eine Liste der einzelnen Analyse-Schritte (verdient/nicht verdient bzw. im Idealfall immer verdient, mit Hinweis „hier verpasst\" bei tatsächlich nicht verdienten Schritten) sowie der einzelnen Cycle-Time-Bestandteile (Bau-Grundpreis + jeder einzelne Rework-Eintrag mit Beschreibung, bzw. im Idealfall derselbe Grundpreis mit dem Hinweis, dass jeder Rework-Eintrag vermeidbar gewesen wäre). (3) Anpassung der beiden betroffenen Testzeilen in `tests/FEATURE-009-consequences.test.js` (mit Stephans Freigabe).\nAusgeschlossen: Ein eigener neuer Screen für die Retrospektive (Option C aus der ursprünglichen Diskussion — abgelehnt zugunsten von Variante B); jede Änderung an der Cycle-Time-/Rework-Berechnung selbst (die war laut obigem Fundstellen-Sweep bereits korrekt); die „Fast start\"-Zeile bekommt keine Aufschlüsselung (im Team-Modus ist sie eine reine Kennzahl ohne Einzelposten, im Agent-Modus deckt der bereits bestehende `penaltySum`/Rework-Verlauf direkt am „Fast start\"-Schritt selbst dieselbe Funktion schon ab).\n\n**Akzeptanzkriterien:**\n- [x] Auf dem Abschluss-Screen (Agent- UND Team-Modus) zeigt der „What it could have been\"-Balken bei der Analyse-Zeit immer die maximal mögliche Zahl für diesen Lauf — auch wenn im tatsächlichen Lauf Abkürzungen genommen wurden, die weniger Analyse-Zeit gutgeschrieben haben.\n- [x] Unter dem „Your run\"-Balken lässt sich eine Aufschlüsselung aufklappen, die zeigt: jeden Analyse-Schritt einzeln (mit Häkchen, wenn Gutschrift erfolgte, deutlich abgesetzt/durchgestrichen mit Hinweis, wenn nicht) sowie jeden Cycle-Time-Bestandteil einzeln (Bau-Grundpreis + jeder tatsächlich entstandene Rework-Eintrag mit seiner eigenen Beschreibung und Tageszahl).\n- [x] Unter dem „What it could have been\"-Balken lässt sich ebenfalls eine Aufschlüsselung aufklappen: alle Analyse-Schritte als verdient dargestellt (mit Hinweis bei den Schritten, die im tatsächlichen Lauf verpasst wurden, damit die Retrospektive genau benennen kann, welche Entscheidung das war), sowie der Cycle-Time-Bestandteil nur als Bau-Grundpreis, mit jedem tatsächlich entstandenen Rework-Eintrag als „hier vermieden\" gekennzeichnet.\n- [x] Die Summen in der Aufschlüsselung stimmen exakt mit den Zahlen im jeweiligen Balken überein (keine Doppelzählung, keine Lücke). **Umsetzungshinweis:** dafür war eine kleine Erweiterung von `completeStep()` nötig, siehe Implementierungsnotizen (Analyse-Gutschrift wurde bisher nur über `S.badges` sichtbar, das aber nicht jeder gutgeschriebene Schritt befüllt).\n- [x] Ein Lauf ganz ohne jede Abkürzung zeigt in beiden Aufschlüsselungen sinnvoll identische Werte (kein „leerer\"/kaputter Zustand).\n- [x] Keine Konsolenfehler; `GAME_VERSION` wird erhöht (jetzt 1.18.0).\n- [x] `tests/FEATURE-009-consequences.test.js` (Zeilen 162–163, 243–244) ist auf die neue Definition angepasst und läuft grün.\n\n**Pre-Mortem:**\n- 💀 Die Summe der Aufschlüsselung weicht von der Balken-Zahl ab (z. B. weil `STAGES` zum Render-Zeitpunkt bereits zurückgesetzt ist) → Gegenmaßnahme: eigener Testfall, der Summe der Aufschlüsselungs-Einzelposten gegen die im Balken angezeigte Gesamtzahl prüft.\n- 💀 Die Korrektur der Ideal-Analyse-Berechnung wird versehentlich auch auf die Cycle-Zeit-Seite angewendet und verändert dadurch ungewollt auch die bereits korrekte `idealCycle`-Berechnung → Gegenmaßnahme: nur die eine Codestelle (der `a`-Parameter des Ideal-`lbar()`-Aufrufs plus die zugehörigen Text-Bausteine) gezielt ändern, `idealCycle` unangetastet lassen, per Test auf Agent-Modus-Regression absichern (dort muss sich rechnerisch nichts ändern, siehe Fundstellen-Sweep).\n- 💀 Die Aufklapp-Funktion kollidiert mit den bestehenden Badge-/Rework-Chip-Overlays (z. B. doppelte IDs) → Gegenmaßnahme: eigene, klar unterscheidbare CSS-Klassen/IDs (`bktoggle`/`bkpanel`) statt der bestehenden Overlay-Mechanik.\n- 💀 `GAME_VERSION` wird bei dieser sichtbaren Änderung vergessen zu erhöhen → Gegenmaßnahme: fester Bestandteil des Testplans.\n- 💀 Der Freigabe-Umschreibung von `FEATURE-009-consequences.test.js` schwächt den Test versehentlich ab (z. B. lockere Zahl statt weiterhin exakter Erwartung) → Gegenmaßnahme: neue Erwartung bleibt exakt (Aufschlüsselung auf `7d analysis` bzw. die jeweils maximal mögliche Zahl je Szenario-Zweig), nicht einfach der Assertion-String entfernt.\n\n**Optionenvergleich:** (bereits in der vorausgegangenen Analyse konversationell durchgesprochen, hier nur zur Nachvollziehbarkeit festgehalten)\n\n*Option A – Ein vereinheitlichtes, chronologisches Entscheidungs-Logbuch:* alle Entscheidungen des Laufs in einer einzigen Zeitleiste, unabhängig von den bestehenden drei Balken. Vorteil: sehr klare Erzählung. Nachteil: großer struktureller Eingriff, eigener neuer Anzeige-Block, höheres Regressionsrisiko für die bestehenden Badge-/Review-Mechaniken.\n\n*Option B – Aufklappbare Aufschlüsselung direkt unter den bestehenden drei Balken (Stephans Entscheidung):* geringster Eingriff, nutzt die bereits vorhandenen Datenstrukturen (`S.badges`, `S.rework`, `STAGES`) direkt weiter, bestehende Balken/Bedeutung bleiben unverändert.\n\n*Option C – Eigener neuer Retrospektive-Screen nach dem Finale:* separate Ansicht, mehr Raum, aber neuer Stage-Typ nötig (Regressionsrisiko wie bei FEATURE-010 gegen Stage-Index-Abhängigkeiten bereits bekannt) und ein zusätzlicher Klick, bevor das Team die Zahlen überhaupt sieht.\n\n✅ **Umgesetzt wird:** Option B, wie von Stephan entschieden.\n\n**Analyse & Planung:**\n- [x] Verifiziert: `idealCycle=Math.max(0,actualCycle-reworkTotal)` ergibt in beiden Modi bereits exakt den festen Bau-Grundpreis der `isBoss`-Stufe (`buildDays`) ohne jedes Rework — diese Seite der Ideal-Berechnung bleibt unverändert, nur die Analyse-Seite (`a`-Parameter) wird von `analysis` (tatsächlich verdient) auf eine neue Hilfsfunktion `maxAnalysisDays()` (Summe der `analysisDays` über alle `STAGES` dieses Laufs) umgestellt.\n- [x] Neue, von beiden Finale-Funktionen gemeinsam genutzte Hilfsfunktionen geplant: `analysisRows()` (iteriert `STAGES`, liefert pro Analyse-Stufe `{label, emoji, days, earned}`), `maxAnalysisDays()` (Summe `analysisDays` über `STAGES`), `analysisBreakdownHTML(kind)` und `cycleBreakdownHTML(kind)` (kind = „actual\" oder „ideal\"), sowie ein kleiner Baustein, der pro Balken einen Aufklapp-Button plus verstecktes Panel erzeugt und nach dem Rendern verdrahtet (`.bktoggle`/`.bkpanel`, `classList.toggle(\"show\")`). **Während der Implementierung korrigiert:** `earned` kann NICHT zuverlässig über `S.badges` bestimmt werden — einzelne Analyse-Stufen (z. B. `teamdor`, die beiden `teamfork`-Typen) vergeben zwar Analyse-Gutschrift, aber nie ein Badge (`st.badge` ist dort gar nicht gesetzt), wären also fälschlich immer als „nicht verdient\" erschienen. Stattdessen führt `completeStep()` jetzt ein eigenes, von Badges unabhängiges `S.credited`-Array (Stufen-Indizes mit tatsächlicher Analyse-Gutschrift), das `analysisRows()` abfragt.\n- [x] Team-Modus-Spezialfall geprüft: die feste, immer vorhandene „fehlende Rolle\"-Konsequenz (`ROLE_GAP_THREAD`, +2 Tage) ist strukturell vom Szenario vorgegeben (die Rolle fehlt tatsächlich, das ist keine Spieler-Entscheidung) und wird von der bereits bestehenden `idealCycle`-Formel ebenfalls herausgerechnet (wie schon vor diesem Ticket) — das wird bewusst NICHT geändert, da Stephans Freigabe sich nur auf die Analyse-Seite bezog und die bestehende Cycle-Rechnung laut Fundstellen-Sweep bereits korrekt „kein Rework\" abbildet.\n- [x] Neue erwartete Testzahlen für `tests/FEATURE-009-consequences.test.js` (mit Stephans Freigabe anzupassen): Zeile 162–163 („sauberer PO-Lauf\") bleibt inhaltlich `7d analysis + 4d cycle` (unverändert, da dort ohnehin schon alle 7 Schritte verdient wurden — reiner Bestandsschutz, keine Änderung nötig, nur zur Konsistenz noch einmal geprüft). Zeile 243–244 („everythingBad\", PO-Zweig) ändert sich von `analysisAtHandoff + \"d analysis + 4d cycle\"` (bisher 3d) auf fest `\"7d analysis + 4d cycle\"` — die maximal möglichen 7 Analyse-Tage dieses Szenario-Zweigs, unabhängig davon, wie viele davon im tatsächlichen (schlechten) Lauf verdient wurden.\n\n**Testplan:**\n- [x] Automatisiert (jsdom, neue Datei `tests/FEATURE-011.test.js`, 5 Prüfpunkte): GAME_VERSION erhöht (1.18.0); Ideal-Balken zeigt bei einem Lauf mit allen vier möglichen Abkürzungen (Team-Modus, PO-Zweig, tatsächlich verdiente Analysezeit 3d) trotzdem `7d analysis + 4d cycle` statt der tatsächlich verdienten, niedrigeren Zahl; Aufschlüsselungs-Panels sind im gerenderten Finale-HTML vorhanden (genau zwei je Modus), standardmäßig eingeklappt (keine `show`-Klasse beim ersten Render), und die Summe jedes Aufschlüsselungs-Abschnitts (Analyse und Cycle, je einmal „Your run\" und einmal „Ideal\") stimmt exakt mit `S.analysis`/`S.cycle`/der maximalen bzw. Grundpreis-Zahl überein; ein sauberer Dev-fehlt-Lauf (kein Bizvalue-Zweig, 6 statt 7 mögliche Analyseschritte) zeigt in „Your run\" und „Ideal\" dieselbe Zahl (6d) und keinen einzigen „nicht gutgeschrieben\"/„verpasst\"-Hinweis; Agent-Modus-Regression bestätigt, dass die Ideal-Analyse-Zahl weiterhin exakt der tatsächlichen entspricht (`maxAnalysisDays()` gegen echte, per Klick aufgebaute `STAGES` eines realen Szenarios geprüft). Alle 5 Prüfpunkte grün, tatsächlich ausgeführt und Output gesehen.\n- [x] Pflicht-Regressionslauf gegen alle bestehenden `tests/*.test.js`-Dateien (elf Bestandsdateien plus `FEATURE-010.test.js`): 11 von 13 Dateien grün, tatsächlich ausgeführt. Zwei Dateien schlagen fehl — beide ausschließlich an ihrer eigenen fest einprogrammierten `GAME_VERSION`-Zeile (`tests/FEATURE-009.test.js` erwartet „1.16.0\", `tests/FEATURE-010.test.js` erwartet „1.17.0\"), nicht an funktionalem Verhalten: bei `FEATURE-010.test.js` sind die verbleibenden 4 von 5 Prüfpunkten (Schätz-Text sichtbar, Fast-Start-Werte 20/16, Wert unabhängig vom Spielverhalten) weiterhin grün — nur der Versions-Check selbst schlägt fehl. Dasselbe bekannte Muster wie schon bei FEATURE-010 gegen `FEATURE-009.test.js`: jeder künftige Versionssprung bricht die vorherige, fest einprogrammierte Versionszeile des jeweils vorigen Tickets. Keine dieser beiden Dateien wurde angepasst (nur Stephan darf bestehende Tests ändern) — Stephan müsste beide Zeilen selbst auf „1.18.0\" aktualisieren, sonst bleiben sie bei jedem künftigen Regressionslauf rot.\n- [x] Mit Stephans Freigabe angepasste Zeilen in `tests/FEATURE-009-consequences.test.js` (jetzt Zeilen 162–169 und 248–260 durch die ergänzten Kommentare leicht verschoben) laufen grün — datei-weit 3/3 Szenarien bestätigt.\n- **Begründung Testabdeckung:** Die Änderung betrifft eine gemeinsam genutzte Berechnung und Darstellung in beiden Finale-Funktionen — ein Testdurchlauf pro Modus (je ein sauberer, je ein durchgängig schlechter Team-Lauf, sowie ein Agent-Modus-Regressionscheck) deckt die vollständige neue Logik ab.\n- [ ] Echter Blick im Browser (Desktop, ggf. Handy-Breite) auf die neue Aufklapp-Funktion bleibt offener Punkt, bis Stephan ihn selbst bestätigt.\n\n**Implementierungsnotizen:**\nUmgesetzt in `public/index.html` (Basis: v1.17.0, direkt im Anschluss an FEATURE-010 in derselben Sitzung). Neue Hilfsfunktionen `analysisRows()`, `maxAnalysisDays()`, `analysisBreakdownHTML(kind)`, `cycleBaseDays()`, `cycleBreakdownHTML(kind)`, `bkBlock(kind)`, `wireBkToggles()` — alle von `renderFinale()` (Agent) und `renderTeamFinale()` (Team) gemeinsam genutzt. `completeStep()` erhielt ein neues `S.credited`-Array (Stufen-Indizes mit tatsächlicher Analyse-Gutschrift, unabhängig von `S.badges` — Grund siehe Analyse & Planung oben). In beiden Finale-Funktionen wurde ausschließlich der `a`-Parameter des Ideal-`lbar()`-Aufrufs (und die zugehörigen Text-Bausteine `idealNote`) von `analysis` auf `idealAnalysis=maxAnalysisDays()` umgestellt; `idealCycle` blieb unangetastet. Neue CSS-Klassen `.bktoggle`/`.bkpanel`/`.bklab`/`.bkrow` (inkl. `.miss`-Modifikator). `GAME_VERSION` von „1.17.0\" auf „1.18.0\" angehoben. Neue dauerhafte Testdatei: `tests/FEATURE-011.test.js`. Mit Stephans expliziter Freigabe angepasst: `tests/FEATURE-009-consequences.test.js` (zwei Assertions, siehe Testplan).\n\n**Bezug:** Chat-Anfrage 23.07.2026, im direkten Anschluss an FEATURE-010 („Mach mir einen Vorschlag, wie wir den Teams auf der letzten Seite die aktuelle und theoretische Lead Time erklären können...\")."}, {"id": "FEATURE-010", "title": "Realistische Schätz-Basis für „The fast start\" im Team-Modus", "type": "Feature", "priority": "Mittel", "lane": "done", "created": "2026-07-23", "started": "", "done_at": "", "body": "| Feld | Wert |\n|------|------|\n| **Typ** | Feature |\n| **Priorität** | Mittel |\n| **Status** | Done |\n| **Erstellt** | 2026-07-23 |\n| **Done seit** | 2026-07-23 |\n\n**Beschreibung:** Im Team-Modus (FEATURE-008 „Work as a Team\") zeigt der Abschluss-Screen drei Zeitleisten zum Vergleich: „The fast start\", „Euer Lauf\" und „Was es hätte sein können\". Anders als im Agent-Modus, wo „The fast start\" ein tatsächlich gespielter, roher erster Durchlauf ist, ist dieser Wert im Team-Modus aktuell eine feste, immer gleiche Zahl im Code – unabhängig davon, wie gespielt wird oder welches Szenario gewählt ist. Stephan möchte stattdessen eine Methodik, die sich an echter Scrum-Praxis orientiert: Story-Point-Schätzungen (z. B. Planning Poker) sagen für sich genommen nichts über die tatsächliche Bauzeit aus – das funktioniert in echten Teams nur über die tatsächlich gemessene Geschwindigkeit (Velocity) aus vergangener, vergleichbarer Arbeit, die ein frisch zusammengestelltes Team wie in diesem Spiel nicht hat. Passend dazu der „Trichter der Unsicherheit\" (Cone of Uncertainty) aus der Schätztheorie: ganz am Anfang, bevor irgendetwas geklärt ist, kann die reale Dauer stark von der ersten Schätzung abweichen; der Trichter schließt sich erst, je mehr während der Analyse tatsächlich geklärt wird.\n\n**User Story:** Als Spielerin/Spieler im Team-Modus möchte ich, dass „The fast start\" auf einer nachvollziehbaren, am jeweiligen Szenario selbst hängenden Grundlage beruht statt auf einer willkürlichen festen Zahl, damit der Vergleich der drei Zeitleisten etwas über die Konsequenzen ungeklärter Punkte aussagt.\n\n**Konkreter, bereits mit Stephan abgestimmter Ansatz (23.07.2026):** Ganz am Anfang, bevor das Team die Anforderung überhaupt anschaut, gibt es einen kurzen Spielmoment: eine grobe, instinktive Größenangabe (im Stil von Planning Poker), mit einem klar sichtbaren Hinweistext, dass diese Zahl für sich genommen noch nichts über die tatsächliche Bauzeit sagt – das würde nur über die bisherige Geschwindigkeit des Teams bei ähnlichen, bereits abgeschlossenen Aufgaben funktionieren, die es hier nicht gibt, und nur fürs Spiel wird trotzdem grob in Tage übersetzt. Die tatsächliche Tage-Zahl für „Fast Start\" ergibt sich aus dieser groben Basis plus einem Aufschlag, der sich danach richtet, wie viele der für das jeweilige Szenario überhaupt möglichen Unklarheiten (fehlende Rolle, geratener Business-Value, vertagte Frage, vage Verhaltensbeschreibung, unsortiertes Board, falsch abgehaktes DoR) im schlimmsten Fall offen bleiben könnten – unabhängig davon, was der Spieler in seinem eigenen Lauf tatsächlich tut. Das macht „Fast Start\" zu einer festen, aber pro Szenario unterschiedlichen Messlatte („so schlimm kann's werden, wenn nichts geklärt wird\"), die bei jedem Durchlauf desselben Szenarios vergleichbar bleibt.\n\n**Offene Punkte aus der Ticket-Anlage — von Stephan entschieden (23.07.2026):**\n- Die Schätz-Geste wird kein eigener Klick-Spielmoment, sondern ein kurzer Erzähltext-Moment ohne eigene Interaktion.\n- „Fast Start\" richtet sich nach der Rolle, die der Zufall in diesem konkreten Durchlauf tatsächlich als fehlend auswürfelt (Product Owner → teurerer Fall, eine der anderen drei Rollen → günstigerer Fall) — bewusst NICHT immer der ungünstigste denkbare Fall, wie ich es empfohlen hatte. Zwei Durchläufe desselben Szenarios können sich dadurch in der Zahl unterscheiden, wenn der Zufall unterschiedliche Rollen zieht — das ist so gewollt. Wichtig bleibt aber: Der Wert steht bereits fest, bevor das Team die Anforderung überhaupt anschaut (die Rolle wird ja vor dem ersten Schritt gewürfelt), und ändert sich danach nicht mehr durch das, was der Spieler im Meeting selbst tut oder entscheidet.\n- Der Agent-Modus bleibt unverändert bestätigt (eigener, komplett getrennter Mechanismus, siehe Analyse).\n- Basiswert für die grobe Größenangabe: 2 Tage (von Stephan festgelegt).\n- Wortlaut des Hinweis-Moments: von Stephan freigegeben (Variante B, siehe Analyse & Planung).\n\n**Fundstellen-Sweep:** Gesucht nach „fast start\"/„Fast Start\" (case-insensitive) in `public/index.html`: 4 Treffer. Zwei betreffen den Agent-Modus (der Szenario-Kicker-Text beim allerersten Schritt sowie die Anzeige-Zeile im Agent-Finale) — dort ist „Fast Start\" bereits ein echter gespielter erster Durchlauf (über das `isBenchmark`-Flag des ersten Schritts), unverändert und außerhalb dieses Tickets. Die anderen zwei betreffen den Team-Modus: die Berechnung `rushed = S.benchmark || 12` im Team-Finale (die feste 12, die dieses Ticket ersetzt) und ihre Anzeige direkt darunter. Verifiziert: `S.benchmark` wird im Team-Modus an keiner einzigen Stelle gesetzt (nur der Agent-Modus setzt es), die 12 kommt also bei jedem Team-Durchlauf unverändert zum Einsatz — unabhängig vom Szenario. Zusätzlich geprüft: aktuell existiert im Team-Modus nur ein einziges Szenario (`TEAM_SCENARIO_ID = \"four-eyes\"`, „Second approver for large payments\"); die im Ticket angesprochene „pro Szenario unterschiedliche Messlatte\" lässt sich mit dem heutigen Datenstand nicht durch einen zweiten Wert belegen — die Berechnung wird trotzdem am Szenario selbst festgemacht (nicht an einer globalen Zahl), damit sie sich auf künftige Team-Szenarien überträgt, ohne dass dieses Ticket sie schon bauen muss. Keine weiteren Fundstellen.\n\n**Zustands-Check:** Wartezustand: Der neue Erzähltext-Moment läuft synchron ab (kein Laden, kein Netzwerkzugriff) — kein eigener Wartezustand nötig. Leerzustand: entfällt, da es im Team-Modus aktuell immer genau ein Szenario gibt, nie eine leere Auswahl. Fehlerfall: rein clientseitig, kein neues Fehlerverhalten vorgesehen; das bestehende Verhalten bei einem blockierten Schritt (siehe FEATURE-008-Pre-Mortem) gilt unverändert weiter.\n\n**Scope:**\nEingeschlossen: Zu Beginn jedes Team-Durchlaufs, bevor das Team die Anforderung überhaupt anschaut, erscheint ein kurzer Text-Moment mit einer groben, instinktiven Größenangabe fürs Szenario (Basiswert: 2 Tage, festgelegt) und einem deutlich sichtbaren Hinweis, dass diese Zahl für sich genommen nichts über die tatsächliche Bauzeit aussagt. Die Zahl, die am Ende als „The fast start\" erscheint, ersetzt die bisherige feste 12 und ergibt sich aus dieser Basis von 2 Tagen plus einem Aufschlag, der sich nach der in diesem Durchlauf tatsächlich gewürfelten fehlenden Rolle richtet: 18 Tage Aufschlag (also 20 Tage insgesamt), wenn der Zufall „Product Owner\" zieht, sonst 14 Tage Aufschlag (16 Tage insgesamt). Dieser Wert steht bereits fest, bevor das Team die Anforderung anschaut (die Rolle wird vor dem ersten Schritt gewürfelt) und ändert sich danach nicht mehr durch das, was der Spieler im Meeting selbst tut — wohl aber unterscheidet er sich zwischen zwei Durchläufen desselben Szenarios, wenn der Zufall dabei unterschiedliche Rollen zieht (das ist so gewollt, Stephans Entscheidung).\nAusgeschlossen: der Agent-Modus (dort bleibt „Fast Start\" der bereits echte gespielte Wert, unverändert); weitere Team-Szenarien über das eine bestehende hinaus (eigenes Folgeticket) — dieses Ticket bereitet die Berechnung nur so vor, dass sie sich später übertragen lässt; jede Änderung an der eigentlichen Konsequenz-/Nacharbeitslogik während des laufenden Spiels selbst (das Spielverhalten bleibt für den Spieler identisch, nur die Vergleichszahl am Ende ändert sich).\n\n**Akzeptanzkriterien:**\n- [x] Zu Spielbeginn im Team-Modus zeigt der allererste Bildschirm (die Besetzungsliste) zusätzlich einen kurzen Text-Moment mit einer groben Größenangabe fürs Szenario sowie einen deutlich lesbaren Hinweis, dass diese Zahl allein nichts über die tatsächliche Bauzeit aussagt. **Umsetzungshinweis:** kein separater vorgeschalteter Bildschirm (siehe Scope-Änderungen unten, Regressionsschutz), sondern derselbe erste Screen wie bisher, nur um diesen Text ergänzt — dieselbe Reihenfolge, derselbe Button.\n- [x] Auf der Abschlussseite zeigt „The fast start\" nicht mehr die feste Zahl 12, sondern 20 Tage, wenn in diesem Durchlauf der Product Owner als fehlend gewürfelt wurde, bzw. 16 Tage bei jeder der anderen drei Rollen.\n- [x] Zwei Durchläufe desselben Szenarios mit derselben gewürfelten fehlenden Rolle zeigen exakt denselben „Fast Start\"-Wert, egal was der Spieler im Meeting selbst tut oder entscheidet (Kartensortierung, Weggabelungs-Wahlen, DoR-Angaben ändern die Zahl nicht).\n- [x] Zwei Durchläufe desselben Szenarios mit unterschiedlich gewürfelter fehlender Rolle zeigen korrekt unterschiedliche „Fast Start\"-Werte (20 vs. 16 Tage) — das ist gewolltes Verhalten, keine Regression.\n- [x] Der Agent-Modus zeigt „The fast start\" weiterhin genauso wie bisher (echter gespielter erster Durchlauf, keine Regression).\n- [x] Keine Konsolenfehler; `GAME_VERSION` wird erhöht (jetzt 1.17.0).\n\n**Pre-Mortem:**\n- 💀 Die neue Schätz-Geste wird versehentlich auch im Agent-Modus angezeigt oder beeinflusst dort die „Fast Start\"-Berechnung → Gegenmaßnahme: eigenes Akzeptanzkriterium, das den Agent-Modus explizit unverändert verlangt; Regressionstest deckt beide Modi ab.\n- 💀 Der Wert wird versehentlich doch von späteren Spieler-Entscheidungen im Meeting beeinflusst (z. B. weil die Berechnung erst am Ende statt gleich zu Beginn des Durchlaufs anhand der gewürfelten Rolle fixiert wird) → Gegenmaßnahme: eigenes Akzeptanzkriterium, das zwei Durchläufe mit gleicher gewürfelter Rolle, aber unterschiedlichem Spielverhalten, auf denselben Fast-Start-Wert prüft.\n- 💀 Die feste 12 taucht an einer zweiten, bislang unentdeckten Stelle im Code noch einmal auf (z. B. ein Hinweistext, der „12 Tage\" fest nennt) → Gegenmaßnahme: der Fundstellen-Sweep wird vor der Umsetzung noch einmal gezielt nach der Zahl 12 im Umfeld von „fast\"/„rushed\"/„benchmark\" wiederholt, nicht nur nach dem Wort „Fast Start\" gesucht.\n- 💀 `GAME_VERSION` wird bei dieser sichtbaren Änderung vergessen zu erhöhen → Gegenmaßnahme: fester Bestandteil des Testplans, wie bei allen bisherigen Team-Modus-Runden.\n- 💀 Der Aufschlag zählt eine Ursache doppelt (z. B. ein geratener Business-Value zählt sowohl als eigene Konsequenz als auch noch einmal als falsch abgehakter DoR-Punkt, obwohl beides dieselbe Ursache hat) → Gegenmaßnahme: alle sechs Bestandteile der Rechnung einzeln in der Analyse unten aufgeführt, damit beim Implementieren nichts doppelt oder vergessen gezählt wird.\n\n**Optionenvergleich:**\n\n*Option A – Erzähltext ohne eigene Klick-Interaktion, fester ungünstigster Fall (von mir ursprünglich empfohlen):* Text-Moment ohne Interaktion, aber „Fast Start\" hätte immer den teuersten Fall angenommen (Product Owner fehlt), unabhängig vom tatsächlichen Rollen-Zufall des Durchlaufs. Vorteil gewesen: Wert exakt stabil zwischen jedem Durchlauf desselben Szenarios. Nachteil aus Stephans Sicht: nimmt dem Rollen-Zufall seine Wirkung auf die Vergleichszahl.\n\n*Option B – Erzähltext ohne eigene Klick-Interaktion, gekoppelt an die tatsächlich gewürfelte Rolle (Stephans Entscheidung, 23.07.2026):* Derselbe Text-Moment ohne eigene Bedienung wie in Option A, aber „Fast Start\" ergibt sich aus der Basis von 2 Tagen plus dem Aufschlag für die in diesem Durchlauf tatsächlich gewürfelte fehlende Rolle (18 Tage Aufschlag bei Product Owner, 14 Tage sonst). Der Wert steht bereits vor dem ersten Spielschritt fest (die Rolle wird ja vorab gewürfelt) und ändert sich durch das spätere Spielverhalten nicht mehr — schwankt aber bewusst zwischen zwei Durchläufen desselben Szenarios, wenn der Zufall unterschiedliche Rollen zieht. Vorteil: der Rollen-Zufall bleibt spürbar, ohne dass der Spieler selbst etwas anklicken muss.\n\n✅ **Umgesetzt wird:** Option B — kein Klick-Element, aber an die tatsächlich gewürfelte Rolle gekoppelt, wie von Stephan entschieden.\n\n**Analyse & Planung:**\n- [x] Repo-Stand vor Beginn geprüft: HEAD `09033e4`; Arbeitsverzeichnis zeigt unstaged Änderungen an `Backlog.md`, `Product.md`, `public/index.html` sowie neue, noch nicht committete Dateien (`tests/`, `docs/`, `tools/gate_check.py`) — das ist der bekannte, noch nicht gepushte Stand aus FEATURE-008 (`GAME_VERSION` zeigt v1.16.0, passend zum letzten dokumentierten Implementierungsstand), kein unerwarteter Fremdstand.\n- [x] Aktuelle Berechnung am Code verifiziert: `rushed = S.benchmark || 12` im Team-Finale; `S.benchmark` wird im Team-Modus nirgends gesetzt (nur der Agent-Modus setzt es über das `isBenchmark`-Flag des allerersten Schritts) — die 12 ist damit tatsächlich fix und szenario-unabhängig, genau wie im Ticket beschrieben.\n- [x] Die sechs möglichen Unklarheiten und ihre bereits im Code vorhandenen Tages-Werte verifiziert (`renderTeamImpl`, Team-Konsequenzmodell aus FEATURE-008 Runde 3/7): vertagte Frage (+2 Tage), unsortiertes Mapping-Board bei Zeitablauf (bis zu +3 Tage, gedeckelt), vage Verhaltensbeschreibung (+2 Tage), geratener Business-Value (+2 Tage — nur möglich, wenn die fehlende Rolle „Product Owner\" ist, sonst taucht diese Weggabelung gar nicht auf), die fehlende Rolle selbst (+2 Tage, immer genau eine von vieren), falsch abgehakte DoR-Punkte (+1 Tag pro betroffenem Punkt; maximal +3 wenn Product Owner fehlt, sonst maximal +1, weil dann nur die vage Verhaltensbeschreibung überhaupt falsch abgehakt werden kann). Fester Bau-Grundpreis: 4 Tage.\n- [x] Ungünstigster Fall bei gewürfeltem „Product Owner fehlt\": 4 (Bau) + 2 (fehlende Rolle) + 2 (Business-Value geraten) + 2 (vertagte Frage) + 2 (vage Verhaltensbeschreibung) + 3 (unsortiertes Board, gedeckelt) + 3 (DoR-Paperwork, maximal) = 18 Tage Aufschlag; bei einer der anderen drei gewürfelten Rollen: 4 + 2 + 2 (vertagte Frage) + 2 (vage Verhaltensbeschreibung) + 3 (unsortiertes Board) + 1 (DoR-Paperwork, maximal) = 14 Tage Aufschlag (kein Business-Value-Aufschlag möglich, da diese Weggabelung nur auftaucht, wenn der Product Owner fehlt).\n- [x] Stephans Entscheidung (23.07.2026): „Fast Start\" richtet sich nach der tatsächlich gewürfelten Rolle dieses Durchlaufs, nicht immer nach dem teuersten Fall — macht 20 Tage insgesamt (2 Basis + 18 Aufschlag) bei „Product Owner fehlt\", sonst 16 Tage insgesamt (2 Basis + 14 Aufschlag). Der Wert wird direkt beim Auswürfeln der fehlenden Rolle (vor dem ersten Spielschritt) fixiert, nicht erst am Ende neu berechnet — sonst könnte er sich unbeabsichtigt am späteren Spielverhalten orientieren.\n- [x] Kein bestehendes Datenfeld für eine „grobe Größe pro Szenario\" gefunden (`SCENARIOS`-Einträge haben aktuell kein Punkte-/Größenfeld) — ein neues, kleines Datenfeld pro Szenario ist nötig; für das eine bestehende Team-Szenario reicht zunächst ein fester Wert von 2 Tagen (von Stephan festgelegt).\n- [x] Basiswert 2 Tage von Stephan bestätigt.\n- [x] Wortlaut des Hinweis-Moments von Stephan freigegeben (23.07.2026, Variante B):\n  Kicker: „Before anyone looks at the ticket\" — Titel: „A number, out of thin air\"\n  Text: „The team throws out a rough size — 'medium, maybe a couple of days' — before anyone's actually read the requirement. In a real team, a number like that only means something once you know this team's real pace on similar, already-finished work. This team doesn't have that yet — it was assembled for exactly this meeting.\"\n  Deutlich abgesetzter Hinweis darunter: „Write it down anyway. It's a starting guess, not a plan — and the less is settled right now, the wider it can miss.\"\n\n**Testplan:**\n- [x] Automatisiert (jsdom, neue Datei `tests/FEATURE-010.test.js`, 5 Prüfpunkte): GAME_VERSION erhöht; der neue Schätz-Text ist auf dem allerersten Team-Modus-Screen sichtbar, ohne Extra-Klick; „Fast Start\" steht sofort nach dem Auswürfeln der Rolle auf 20 (Product Owner fehlt) bzw. 16 (jede andere Rolle) — geprüft, bevor überhaupt gespielt wurde; zwei komplette Durchläufe mit derselben gewürfelten Rolle („Dev fehlt\"), aber komplett unterschiedlichem Spielverhalten (einmal sauber, einmal durchgängig unehrlich/verspätet), zeigen im Finale exakt denselben Fast-Start-Wert (16d) — bestätigt, dass der Wert nicht vom Spielverlauf abhängt. Alle 5 Prüfpunkte grün, tatsächlich ausgeführt und Output gesehen (nicht nur geschrieben).\n- [x] Pflicht-Regressionslauf gegen alle neun bestehenden `tests/FEATURE-009-*.test.js`-Dateien sowie `tests/example.test.js`: alle 10 Dateien grün, tatsächlich ausgeführt. Eine zehnte bestehende Datei, `tests/FEATURE-009.test.js`, schlägt fehl — aber ausschließlich an ihrer eigenen fest einprogrammierten Zeile `assert.strictEqual(window.GAME_VERSION, \"1.16.0\", ...)`, die mit JEDEM künftigen Versionssprung brechen würde, nicht nur mit diesem Ticket. Per Diagnose-Kopie (nicht die echte Testdatei, nur zur Prüfung) bestätigt: mit korrigierter Versionszahl laufen alle 6 Prüfungen dieser Datei grün durch — keine funktionale Regression, nur der veraltete Versions-String. Diese Datei wurde NICHT angepasst (nur Stephan darf bestehende Tests ändern) — Stephan müsste die Zeile selbst auf „1.17.0\" aktualisieren, sonst bleibt dieser eine Punkt bei jedem künftigen Regressionslauf so lange rot, bis ein neues Ticket wieder zufällig auf 1.16.0 zurückspringt (was nicht passieren wird).\n- [x] `node --check` auf den extrahierten Skriptteil: fehlerfrei.\n- [x] Agent-Modus-Regression: bestätigt über `tests/FEATURE-009.test.js` Test 3 (alle 21 Szenarien weiterhin da) sowie eigene Prüfung — der Agent-Modus-Code-Pfad (`isBenchmark`, `S.benchmark` beim ersten echten Schritt) wurde nicht angefasst.\n- **Begründung Testabdeckung:** Die Änderung betrifft ausschließlich den einen existierenden Team-Modus-Screen-Ablauf und die Finale-Berechnung — keine der 21 Agent-Modus-Szenarien ist betroffen; ein Testdurchlauf mit dem einen Team-Szenario deckt die vollständige neue Logik ab.\n- [ ] Echter Blick im Browser (Desktop) auf den neuen Erzähltext-Screen und die neue Abschlusszahl bleibt offener Punkt, bis Stephan ihn selbst bestätigt.\n\n**Scope-Änderungen** *(chronologisches Log):*\n- 23.07.2026 (Implementierung): Der Schätz-Text wurde NICHT als eigener neuer Spielschritt/Stage umgesetzt, sondern in den bereits bestehenden allerersten Team-Modus-Screen (die Besetzungsliste) hineingefaltet, auf demselben Bildschirm, mit demselben bestehenden „Start the meeting\"-Button. Grund: Ein eigener neuer Schritt vor der Besetzungsliste hätte die Positionen ALLER nachfolgenden Team-Modus-Schritte um eins verschoben — mehrere bestehende `tests/FEATURE-009-*.test.js`-Dateien verlassen sich an konkreten Stellen auf genau diese Reihenfolge (z. B. „nach `pickTeamMode` sofort `teamNext` klickbar, um von der Besetzungsliste zur Karten-Zuordnung zu kommen\"). Das hätte mehrere bestehende, bereits abgenommene Tests zerbrochen, ohne dass an deren geprüftem Verhalten selbst etwas Reales kaputt gewesen wäre. Die gewählte Lösung erfüllt Stephans Vorgabe „kein eigener Klick-Moment\" sogar noch konsequenter (der Text braucht nicht einmal einen eigenen Bildschirmwechsel) und bleibt zu 100 % regressionssicher — mit Belegen (siehe Testplan oben).\n\n**Implementierungsnotizen:**\nUmgesetzt in `public/index.html` (Basis: v1.16.0 / HEAD `09033e4`, vor dem Schreiben per `git log`/`git status` geprüft — bekannter, noch nicht gepushter Arbeitsstand aus FEATURE-008, kein zwischenzeitlicher Fremdstand). Neue Konstante `TEAM_ESTIMATE_BASE_DAYS = 2`. In `startTeamMode()` wird `TeamState.fastStart` direkt nach dem Auswürfeln der fehlenden Rolle berechnet (2 + 18 bei „po\", sonst 2 + 14) und in derselben `S`-Zurücksetzung als `S.benchmark` übernommen — dadurch wird die bereits bestehende Zeile im Team-Finale (`rushed = S.benchmark || ...`) automatisch mitgenutzt, ohne die Finale-Funktion selbst inhaltlich anzufassen (die feste 12 im Fallback wurde nur auf 16 als rein defensiven Absicherungswert geändert, der im Normalbetrieb nie greift). Der neue Schätz-Text (Kicker, Haupttext, abgesetzter Hinweis — Wortlaut wie von Stephan freigegeben) wurde in `renderTeamRoster()` vor die bestehenden Besetzungs-Kacheln gesetzt, mit neuer CSS-Klasse `.estimatebox`. `GAME_VERSION` von „1.16.0\" auf „1.17.0\" angehoben (Minor, da sichtbare neue Funktion, analog FEATURE-004/005/006). Neue dauerhafte Testdatei: `tests/FEATURE-010.test.js`.\n\n**Bezug:** Chat-Feedback 23.07.2026 (Runde 7/8 der Testrunden zu FEATURE-008)."}, {"id": "FEATURE-008", "title": "Zweiter Spielmodus „Work as a Team\" (ohne Agent)", "type": "Feature", "priority": "Hoch", "lane": "done", "created": "2026-07-22", "started": "", "done_at": "", "body": "*(Hinweis 2026-07-23: Dieses Ticket wurde ursprünglich unter der Nummer FEATURE-008 analysiert (siehe `claude/Konzept-Team-Modus.md`), aber nie in diese Datei geschrieben — die Implementierung und alle Testrunden liefen seither nur im Gespräch bzw. in den Testdateien unter dem Namen „FEATURE-009\". Diese Nummer war zwischenzeitlich anderweitig vergeben (siehe FEATURE-009 „Die 21 Szenarien themenbezogen gruppieren\", ursprünglich selbst als FEATURE-008 anlegt). Mit diesem Eintrag ist die Nummerierung wieder eindeutig: FEATURE-008 = Work as a Team, FEATURE-009 = Szenario-Gruppierung. Code-Kommentare und Testdateinamen im Repo (`tests/FEATURE-009-*.test.js`) verwenden weiterhin die alte Bezeichnung „FEATURE-009\" — das wird nicht rückwirkend umbenannt, um keine falschen Diffs zu erzeugen, ist aber inhaltlich exakt dieses Ticket.)*\n\n| Feld | Wert |\n|------|------|\n| **Typ** | Feature |\n| **Priorität** | Hoch |\n| **Status** | Done |\n| **Erstellt** | 2026-07-22 |\n| **Done seit** | 2026-07-23 |\n\n**Beschreibung:** Das bestehende Spiel vermittelt seine Kernlektion (unzureichend definierte Anforderungen und zu frühes Starten führen zu Nacharbeit, die die Zeit bis zur Auslieferung verlängert) bisher ausschließlich über die Zusammenarbeit mit einem KI-Agenten. Dieses Ticket ergänzt einen zweiten, gleichwertigen Spielmodus, der dieselbe Lektion ohne Agent erzählt — ausschließlich über ein menschliches Team in einem zeitlich begrenzten Refinement-Meeting. Die Ursachen für Nacharbeit sehen dabei anders aus als im Agent-Modus: ein Meeting, das unabhängig vom Verständnisstand des Teams zwingend endet; eine im Durchschnitt fehlende Rolle im Raum (meist der Product Owner), wodurch Kontext, Business Value und wichtige Entscheidungen offenbleiben; offene Fragen, die nicht sofort, sondern erst mitten in der Umsetzung über simulierte Chat-Nachrichten aufgelöst werden; und eine Definition of Ready, die als Formsache abgehakt statt als echte Prüfung genutzt werden kann.\n\n**User Story:** Als Spielerin/Spieler möchte ich zusätzlich zum bestehenden Agent-Modus einen Team-Modus spielen können, der dieselbe Lektion über menschliche Zusammenarbeit statt über einen KI-Agenten erzählt, damit die Trainingswirkung auch für Teams ohne (oder unabhängig von) KI-Werkzeugen greift.\n\n**Scope:**\nEingeschlossen: eine gemeinsame Moduswahl-Seite nach dem Einladungs-Overlay mit zwei gleichwertigen Kacheln („Collaborate with Agents\" / „Work as a Team\"); der komplette neue Team-Modus-Ablauf für zunächst ein Szenario („Second approver for large payments\", vertical slice) — Besetzungsliste mit einer pro Durchlauf zufällig fehlenden Rolle, Beispiel-Mapping-Board mit zwingendem Meeting-Timer, Business-Value-Weggabelung (nur wenn PO fehlt), Gherkin-Präzisierungsübung, „jetzt klären oder vertagen\"-Weggabelung für eine offene Frage, Pre-Mortem- und Out-of-Scope-Auswahl, Definition-of-Ready-Checkliste mit verdeckten Wahrheitswerten, simulierte Chat-Unterbrechungen während der Umsetzung für alles, was im Meeting nicht geklärt wurde, und eine eigene Abschlussauswertung mit drei Zeitleisten plus gesondert ausgewiesener DoR-Audit-Kategorie. Vollständig eigenständige, aufbewahrte jsdom-Testbasis im Repo (`tests/*.test.js`) mit Pflicht-Regressionslauf vor jeder Auslieferung — vorher gab es dafür keine automatisierte Testabdeckung im Projekt.\nAusgeschlossen: keine Änderung am bestehenden „Collaborate with Agents\"-Modus über die punktuell geteilten, generischen Bausteine hinaus (Sortier-UI, Given/When/Then-UI, Auswahlaufgaben-UI, Rework-Mechanik, Zwei-Zeitmessungen-Scoring, Rückblick-System); die übrigen 20 Szenarien im Team-Modus (eigenes Folgeticket); Facilitator-Hinweistexte für den Team-Modus (eigenes Folgeticket, siehe Product.md „Offene Punkte\"); Mehrspieler-/Team-gleichzeitig-Funktion (weiterhin ein Einzelspiel, das die Team-Dynamik simuliert, nicht mehrere echte Mitspielende).\n\n**Akzeptanzkriterien:**\n- [x] Nach dem Einladungs-Overlay erscheint eine Moduswahl-Seite mit zwei gleichwertigen Kacheln; „Collaborate with Agents\" verhält sich exakt wie vor diesem Ticket (alle 21 Szenarien weiterhin da, keine Regressionen).\n- [x] „Work as a Team\" zeigt zu Beginn eine Besetzungsliste mit genau einer als fehlend markierten Rolle, pro Durchlauf neu zufällig bestimmt.\n- [x] Das Beispiel-Mapping-Board erzwingt über einen sichtbar ablaufenden Meeting-Timer den Übergang zum nächsten Schritt, unabhängig davon, ob das Board fertig sortiert ist.\n- [x] Karten im Mapping-Board lassen sich jederzeit, solange der Schritt noch aktiv ist, neu einer anderen Kategorie zuordnen — über ein sichtbares ↩-Icon direkt an der Karte, im selben Bedienmuster wie im Agent-Modus (nicht über eine versteckte Geste). Nach echtem Zeitablauf ist das Board gesperrt.\n- [x] Eine unehrlich getroffene Wahl (Business Value raten statt klären, offene Frage vertagen statt jetzt klären, vage Verhaltensbeschreibung stehen lassen, unsortiertes Board, falsch abgehakte DoR-Punkte) erzeugt keine kostenlose Analysezeit-Gutschrift und keinen Badge, sondern taucht später als real bezifferte, benannte Nacharbeit während der Umsetzung wieder auf — für jede der sechs möglichen Lücken einzeln, nicht nur für die erste gefundene.\n- [x] Eine bewusst falsch (aber wahrheitsgemäß als „nicht wirklich erledigt\") abgehakte Definition-of-Ready-Position wird explizit als Kontroll-/Audit-Versagen benannt (nicht nur als generische Nacharbeit) und löst eine eigene, gesondert ausgewiesene Verzögerung aus.\n- [x] Die Abschlussauswertung zeigt drei Zeitleisten (überstürzter Weg / eigener Weg / erreichbarer Idealweg) und zeigt selbst im bestmöglichen Idealweg eine reale, von Null verschiedene Umsetzungszeit (mindestens die Grundkosten des eigentlichen Bauens) statt fälschlich 0 Tage.\n- [x] Über die Abschlussseite UND jederzeit während des laufenden Spiels lässt sich jeder bereits gespielte Schritt ansehen (nicht nur die, die ein Badge vergeben) — reine Ansicht, nichts lässt sich dort verändern; das Zurückblicken führt am Ende immer wieder zur tatsächlich laufenden Seite zurück, nie in eine Sackgasse.\n- [x] Lange, sich von selbst abspielende Bau-Sequenzen (Übergabe an den Agenten, „Start Development\" im Team-Modus) lassen den Bildschirm dort stehen, wo er ist, statt automatisch ans Ende zu springen — der Ablauf lässt sich chronologisch von oben nach unten mitverfolgen.\n- [x] Im gesamten Team-Modus taucht kein Agentenbezug (Text, Icon 🤖) auf.\n- [x] Keine Konsolenfehler; `GAME_VERSION` wird bei jeder sichtbaren Verhaltensänderung erhöht.\n\n**Fundstellen-Sweep:** Bei der ursprünglichen Analyse (siehe `claude/Konzept-Team-Modus.md`, Abschnitt 5) wurde geprüft, welche bestehenden Bausteine sich unverändert wiederverwenden lassen (Sortier-/Zuordnungs-UI inkl. Touch-Fallback, Given/When/Then-UI, Mehrfachauswahl-UI, Rework-/Penalty-Mechanik, Zwei-Zeitmessungen-Scoring, Badge-/Rückblick-System, Overlay-Grundgerüst, Abschluss-Balkendiagramm) und welche inhaltlich umgeschrieben, aber strukturell wiederverwendet werden (Pre-Mortem-Rahmung, Overreach-Rahmung, DoR-Boss-Schritt). Über die acht Testrunden dieser Sitzung wurde zusätzlich wiederholt geprüft, ob eine gemeldete Lücke auch an anderen, ähnlichen Stellen vorlag (z. B. Runde 7: die fehlende Konsequenz für eine unehrliche Fork-Wahl betraf tatsächlich BEIDE Fork-Typen im Spiel — Business-Value-Weggabelung und Fragen-Weggabelung —, nicht nur die gemeldete; beide wurden korrigiert, nicht nur die gemeldete Stelle).\n\n**Zustands-Check:** Wartezustand: die simulierten Bau-/Chat-Sequenzen zeigen einen Lade-Spinner („The team is building…\"), bevor die Chat-Nachrichten nacheinander erscheinen. Leerzustand: ein sauberer Durchlauf ohne jede Lücke zeigt eine eigene, positiv gerahmte Rückmeldung („Already settled in the meeting — no surprise, no extra cost.\") statt eines leeren Nacharbeits-Bereichs. Fehlerfall: kein Netzwerkzugriff nötig (rein clientseitig), daher kein eigenes Fehlerverhalten vorgesehen; ein blockierender Zustand (z. B. eine Weggabelung ohne Fortschritt) wurde in jeder Testrunde als eigener Regressionstest mitgeprüft.\n\n**Pre-Mortem (kumulativ über alle Testrunden):**\n- 💀 Eine Änderung an einer geteilten Funktion/Konstante wirkt sich unbemerkt auf den bestehenden Agent-Modus aus → Gegenmaßnahme: jede Runde schloss einen vollständigen Regressionslauf gegen alle bisherigen Testdateien ein, inklusive der Agent-Modus-spezifischen Prüfungen.\n- 💀 Eine „unehrliche\" Abkürzung wird trotzdem kostenlos belohnt (Analysezeit/Badge), weil die Gutschrift-Sperre (`noCredit`) nicht überall konsequent verdrahtet ist → Gegenmaßnahme: in Runde 7 gezielt gefunden und für beide betroffenen Fork-Typen behoben.\n- 💀 Ein UI-Fix behebt zwar das gemeldete Symptom, aber nicht die tatsächliche Bedienoberfläche, die Spielende wirklich anklicken → Gegenmaßnahme: seit Runde 5 wird jede Interaktionsänderung zusätzlich mit echten Playwright-Maus-Events (nicht nur `.click()`) gegen den echten, gerenderten Slot/Icon verifiziert, nicht nur gegen die zugrundeliegende Funktion.\n- 💀 Ein automatisches Scrollverhalten wird global geändert und bricht dabei das Verhalten anderer, kurzer Schritte, die von der automatischen Sichtbarkeit profitieren → Gegenmaßnahme: der Fix in Runde 8 ist gezielt auf die beiden langen Sequenzen begrenzt (`st.type!==\"teamimpl\"` bzw. eigene Codestelle im Agent-Modus), mit eigenem Regressionstest, der das unveränderte Verhalten gewöhnlicher Schritte absichert.\n- 💀 `GAME_VERSION` wird bei einer sichtbaren Änderung vergessen zu erhöhen → Gegenmaßnahme: fester Bestandteil jeder Runde, inklusive angepasster Testerwartung und erklärendem Kommentar zur jeweiligen Änderung.\n\n**Optionenvergleich:** Siehe `claude/Konzept-Team-Modus.md`, Abschnitt 3–5, für den ursprünglichen Optionenvergleich der Einzelbausteine (z. B. Wiederverwendung des bestehenden Sortier-Interfaces für das Beispiel-Mapping-Board statt eines komplett neuen Bausteins — empfohlen und so umgesetzt, weil die Mechanik bereits generisch und Touch-fähig war).\n\n**Analyse & Planung:** Vollständige ursprüngliche Analyse in `claude/Konzept-Team-Modus.md` (Gesamtkonzept, Schritt-für-Schritt-Ablauf, Sprachregel, Landing-Page-Entwurf inkl. geprüftem Klick-Prototyp `claude/landing-page-prototyp.html`). Gewähltes Szenario für den Vertical Slice: „Second approver for large payments\" (id `four-eyes`), am echten Code entschieden. Technische Umsetzung: neue CSS-Variable `--teal` für den zweiten Moduskarten-Akzent; Shortcuts A/B über den bestehenden `renderFork`-Mechanismus (Vorbild `FORK_NG`/`FORK_SLICE`); Shortcut C über den bestehenden `renderBuild`-Schritt mit vorangestelltem Vergleichstext; Shortcut E als eigene DoR-Checkliste mit einem `TeamState`-Zustandsobjekt; DoR-Paperwork-Rework separat von normalem Rework ausgewiesen (`S.dorPaperwork`).\n\n**Testplan:**\n- [x] Automatisiert (jsdom, echtes Ausführen der Seite im echten DOM, echte Klick-/Event-Handler statt isolierter Funktionsaufrufe): neun dauerhafte Testdateien decken Version/Moduswahl/Agent-Modus-Regression, Timer-Erzwingung, Konsequenzmodell (alle sechs Abkürzungen einzeln), Navigation/Zurückblick, Slot-Umsortierung, Put-back-Icon, Fork-Gutschrift-Sperre und Scroll-Verhalten ab. Vor jeder Auslieferung vollständiger Regressionslauf gegen alle bestehenden Testdateien, nicht nur die neue.\n- [x] `node --check` auf den extrahierten Skriptteil bei jeder Auslieferung fehlerfrei.\n- [x] Echte Browser-Verifikation per Playwright mit echten Maus-Events (nicht nur `.click()`) für jede layoutrelevante oder interaktionskritische Änderung — u. a. Screenshots des sichtbaren Put-back-Icons und des Review-Overlay-Verhaltens.\n- **Begründung Testabdeckung:** Der Vertical Slice deckt bewusst nur ein Szenario ab; die geteilten, szenario-unabhängigen Bausteine (Fork-Mechanismus, Rework-Mechanik, Scroll-Verhalten, Navigation) sind aber szenario-unabhängig getestet und gelten damit strukturell für alle künftigen Szenarien im Team-Modus mit.\n- [x] Jede Runde endete mit einer ehrlichen Einordnung, was tatsächlich automatisiert geprüft wurde (jsdom/Playwright, gesehen) versus nur geschrieben/behauptet — nie als „getestet\" ausgegeben, was nicht lief.\n\n**Scope-Änderungen** *(chronologisches Log — acht Testrunden nach dem ursprünglichen Vertical Slice, jeweils nach echtem Testspiel durch Stephan):*\n- **Runde 1** (vor dieser Sitzung): Eine genommene Abkürzung (Map-Timeout, vage Gherkin-Formulierung) hatte fälschlich trotzdem die kostenlose Analysezeit-Gutschrift und den Badge bekommen — behoben über den neuen `noCredit`-Parameter an `completeStep`/`debriefHTML`, der die Gutschrift bei einer Abkürzung gezielt zurückhält, ohne bestehende (nicht-Team-)Aufrufstellen zu verändern.\n- **Runde 2** (vor dieser Sitzung): Ein „undefined\" im gerenderten Team-Modus-Text (beide Verzweigungen: PO fehlt / PO vorhanden) sowie ungleich hohe/ausgerichtete Moduswahl-Karten auf der Landing Page behoben.\n- **Runde 3**: Der Idealweg zeigte fälschlich 0 Tage Umsetzungszeit. Komplettes Redesign des Konsequenzmodells nach dem Vorbild des Agent-Modus: fester 4-Tage-Grundpreis fürs Bauen (analog zum bestehenden Boss-Schritt), granulare Konsequenz pro nicht sortierter Mapping-Karte, garantierte rollenspezifische Konsequenz für die im jeweiligen Durchlauf fehlende Rolle (alle vier Rollen gleich gewichtet), sowie eine explizit als Kontroll-/Audit-Versagen benannte, eigene Konsequenz für falsch abgehakte DoR-Punkte statt stiller Vermischung mit gewöhnlicher Nacharbeit.\n- **Runde 4**: Neue feste Navigationsleiste zum Zurückblicken (statt nur zwei Badge-Icons); eine Kategorie-Zuordnung im Mapping-Board ließ sich während des aktiven Schritts revidieren; höherer Farbkontrast bei Spielanweisungstexten; Umbenennung des Buttons „Hand it to the team — start building\" in „Start Development\"; Zurückblick-Kachelraster zeigt seither ALLE gespielten Schritte, nicht nur die badge-vergebenden.\n- **Runde 5**: Die in Runde 4 gebaute Neuzuordnung funktionierte für Stephan beim echten Testen weiterhin nicht. Ursache per echter Playwright-Maus-Interaktion (nicht nur `.click()`) gefunden: nur die verblasste Bank-Originalkarte war wieder klickbar gemacht worden, nicht die Karte, wie sie sichtbar im Bucket erscheint (der „Slot\") — genau die Stelle, auf die ein echter Spieler tatsächlich klickt. Behoben durch eine geteilte `pickCard`-Funktion, die Bank-Karte und Slot gleichermaßen bedienbar macht.\n- **Runde 6**: Direktes Verschieben blieb umständlich und unterschied sich vom Agent-Modus. Ein sichtbares ↩-Put-back-Icon direkt an der Karte (exakt das Bedienmuster aus `renderCategorize` im Agent-Modus) ergänzt. Zusätzlich: der „Next\"-Button im Zurückblick-Overlay blieb am letzten ansehbaren Schritt dauerhaft deaktiviert — eine Sackgasse. Er beschriftet sich dort seither um („Back to where you are →\") und schließt das Overlay statt stehenzubleiben.\n- **Runde 7**: Zwei Funde. Erstens: beide Weggabelungs-Typen (Business-Value raten, offene Frage vertagen) schrieben die kostenlose Analysezeit-Gutschrift IMMER gut, unabhängig davon, ob die ehrliche oder die unehrliche Wahl getroffen wurde — behoben, indem die Gutschrift jetzt an die ehrliche Wahl gekoppelt ist (`noCredit` greift jetzt auch hier). Zweitens: die „👁️ Look back\"-Kachel oben rechts im Kopfbereich war seit der festen Navigationsleiste aus Runde 4/5 redundant geworden und wurde entfernt.\n- **Runde 8**: Die beiden langen, sich von selbst abspielenden Bau-Sequenzen (Agent-Modus: „an den Agent übergeben\", der allererste Schritt; Team-Modus: „Start Development\") sprangen nach dem letzten Eintrag automatisch ans Seitenende und übersprangen damit alles, was chronologisch davor erschienen war. Beide lassen den Bildschirm seither stehen, wo er ist; gewöhnliche, kurze Schritte scrollen weiterhin wie gewohnt automatisch zum Debrief.\n- Im Zuge von Runde 7/8 zusätzlich als eigenständige Idee festgehalten (nicht mehr Teil dieses Tickets): FEATURE-010, eine realistischere Schätz-Basis für die „Fast Start\"-Vergleichszeile im Team-Modus.\n\n**Implementierungsnotizen:** Einzige Code-Datei `public/index.html`. `GAME_VERSION` durchgängig bei jeder Runde erhöht: v1.10.0 (ursprünglicher Vertical Slice) → v1.11.0 (Runde 3) → v1.12.0 (Runde 4) → v1.13.0 (Runde 5) → v1.14.0 (Runde 6) → v1.15.0 (Runde 7, Fork-Gutschrift-Fix) → v1.15.1 (Runde 7, Look-back-Kachel entfernt) → v1.16.0 (Runde 8, aktueller Stand). Dauerhafte Testbasis unter `tests/*.test.js` (neun Dateien plus die bereits vor diesem Feature bestehende `tests/example.test.js`), jede mit eigenem, aussagekräftigem Namen statt einer wachsenden Einzeldatei. Auslieferung an Stephans Mac in jeder Runde per `SendUserFile` + `device_commit_files` an den echten Repo-Ordner, nie nur als Chat-Anhang.\n\n**Release:** Live unter `learning.stephanschumann.com` (Firebase Hosting, automatischer GitHub-Actions-Deploy) — der tatsächliche `git push`/Release-Schritt liegt bei Stephan selbst (`spec-or-regret-release`-Skill), nicht in dieser Sitzung ausgeführt. Aktueller ausgelieferter Code-Stand: v1.16.0."}, {"id": "FEATURE-007", "title": "Umbenennung des Spiels: „Agent Contract\" → „Spec or Regret\"", "type": "Feature", "priority": "Mittel", "lane": "done", "created": "2026-07-22", "started": "2026-07-22", "done_at": "2026-07-22", "body": "| Feld | Wert |\n|------|------|\n| **Typ** | Feature |\n| **Priorität** | Mittel |\n| **Status** | Done |\n| **Erstellt** | 2026-07-22 |\n| **In Progress seit** | 2026-07-22 |\n| **Fertiggestellt** | 2026-07-22 |\n\n**Beschreibung:** Der bisherige Spielname „Agent Contract\" wird durch „Spec or Regret\" ersetzt – im Spiel selbst, im Kanban-Board/-Artifact und in der lokalen Projekt-Infrastruktur (Ordner, Doku). Für die Teile, die Stephans eigenen Zugang brauchen (GitHub-Repo, kontoseitig verwaltete Skills), bereitet dieses Ticket konkrete Schritte bzw. eine Datei zum Speichern vor, statt sie selbst auszuführen.\n\n**User Story:** Als Stephan möchte ich, dass das Spiel unter einem einprägsameren Namen läuft und dieser Name konsistent überall dort auftaucht, wo bisher „Agent Contract\" stand, damit keine veralteten Markennennungen zurückbleiben.\n\n**Scope:**\nEingeschlossen: Sichtbarer Spielname im Spiel selbst (Titel-Tag, Versionsanzeige, Einladungs-Overlay aus FEATURE-006 inkl. des mit Stephan abgestimmten Intro-Texts); Kanban-Vorlage/-Board/-Artifact (Titel, Überschrift, Beschreibung, Drag-Hinweistext); Product.md; lokaler Mac-Projektordner (technischer Name, in Sync mit dem neuen Spielnamen umbenannt). „Spec or Regret\" bleibt als Eigenname unübersetzt, falls das Spiel künftig in einer anderen Sprache angeboten wird.\nAusgeschlossen (nicht durch mich ausführbar): Umbenennung des GitHub-Repos `agent-contract-game` (braucht Stephans GitHub-Zugang) sowie Anpassung der Beschreibungstexte der Skills `agent-contract-analyze`/`agent-contract-release` (kontoseitig verwaltet, nur Stephan kann eine gelieferte Skill-Datei tatsächlich speichern) – für beides liegen Stephan konkrete Schritte bzw. eine Datei vor. Die Firebase-Hosting-Technik-URL `agent-contract-game.web.app` bleibt unverändert (rein technischer Bezeichner, für Spielende nicht sichtbar – die echte Adresse ist `learning.stephanschumann.com`; eine Umbenennung würde eine neue Firebase-Hosting-Site erfordern). Technische Bezeichner ohne Nutzersichtbarkeit (Dateinamen, Skript-Aufrufe, die Artifact-ID `agent-contract-kanban`) bleiben ebenfalls unverändert, um keine funktionierenden Verweise zu zerbrechen. Bereits abgeschlossene, historische Ticket-Einträge in Backlog.md/Backlog-Archive.md werden nicht rückwirkend umbenannt.\n\n**Akzeptanzkriterien:**\n- [x] Im Spiel taucht „Agent Contract\" nirgends mehr auf; „Spec or Regret\" erscheint im Titel-Tag, in der Versionsanzeige und als Überschrift des Einladungs-Overlays. **Korrektur (siehe Nachtrag unten):** Beim ersten Durchlauf wurden zwei Stellen übersehen (Logo oben links, große Überschrift auf der Szenario-Seite) – in v1.9.0 nachgezogen und mit einem erweiterten Wort-für-Wort-Sweep sowie einem echten Screenshot verifiziert, nicht nur behauptet.\n- [x] Der Einladungstext beginnt mit „Spec or Regret\" und dem freigegebenen Szenario-Einstieg („Let's take a real world example: …“), die drei Zeit-Begriffe heißen Analysis Time, Cycle Time, Lead Time.\n- [x] Kanban-Board und -Artifact zeigen „Spec or Regret Kanban\" statt „Agent Contract Kanban\" (Vorlage angepasst, Board neu generiert, Artifact aktualisiert).\n- [x] Keine Konsolenfehler im Spiel nach der Umbenennung (automatisiert geprüft).\n- [x] Lokaler Mac-Ordner heißt `spec-or-regret-game` statt `agent-contract-game` (umbenannt, Git-Repo darin unverändert funktionsfähig geprüft).\n- [x] Stephan hat klare, konkrete Schritte für die GitHub-Repo-Umbenennung sowie eine Datei zur Aktualisierung der beiden Skill-Beschreibungen erhalten (Skill-Dateien mit chirurgisch angepassten Ordnerpfaden, GitHub-/Firebase-URLs bewusst unverändert gelassen, siehe Implementierungsnotizen).\n\n**Fundstellen-Sweep:** Case-insensitive nach „Agent Contract\"/„agent-contract\" im gesamten Projektordner gesucht: `public/index.html` (Tit
